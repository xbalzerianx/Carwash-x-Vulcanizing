<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>KGCAR Live Rankings</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg:      #1E1E22;
      --bg2:     #2B2B31;
      --card:    #2B2B31;
      --red:     #D94A4A;
      --gold:    #D4AF37;
      --silver:  #B8BCC2;
      --bronze:  #B87333;
      --text:    #F7F7F7;
      --text2:   #7A7A85;
      --border:  rgba(255,255,255,0.08);
      --success: #22C55E;
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; }

    /* ── TABS ── */
    .rank-tabs { display:flex; gap:6px; margin-bottom:20px; background:var(--bg2); border-radius:12px; padding:4px; }
    .rank-tab  { flex:1; padding:10px; text-align:center; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; color:var(--text2); transition:all .2s; }
    .rank-tab.active { background:var(--red); color:#fff; }

    /* ── PODIUM ── */
    .podium-wrap  { display:flex; align-items:flex-end; justify-content:center; gap:8px; padding:0 12px; }
    .podium-slot  { flex:1; max-width:150px; display:flex; flex-direction:column; align-items:center; }
    .podium-crown { font-size:24px; margin-bottom:4px; animation:bounce 1.2s ease infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    .podium-bar   { width:100%; border-radius:10px 10px 0 0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; padding:12px 8px; }
    .podium-cars  { font-size:26px; font-weight:900; }
    .podium-clabel{ font-size:10px; font-weight:700; letter-spacing:1px; opacity:.7; }
    .podium-sales { font-size:12px; font-weight:700; margin-top:4px; opacity:.85; }
    .podium-name  { font-size:12px; font-weight:800; margin-bottom:6px; text-align:center; }
    .podium-avatar-wrap { position:relative; }

    /* ── RANKED LIST ── */
    .rank-list-item { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border); animation:fadeIn .4s ease both; }
    .rank-list-item:last-child { border-bottom:none; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .rl-pos  { width:36px; text-align:center; font-size:11px; font-weight:900; flex-shrink:0; }
    .rl-info { flex:1; min-width:0; }
    .rl-name { font-size:14px; font-weight:700; }
    .rl-bar  { margin:5px 0 3px; }
    .rl-stats{ font-size:11px; color:var(--text2); }
    .rl-right{ text-align:right; flex-shrink:0; }
    .rl-cars { font-size:22px; font-weight:900; }
    .rl-clabel{ font-size:10px; color:var(--text2); font-weight:700; letter-spacing:.5px; }
    .progress-bar  { height:5px; background:rgba(255,255,255,.08); border-radius:3px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:3px; transition:width .6s ease; }

    /* ── AVATAR ── */
    .av { border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; flex-shrink:0; }

    /* ── GAP BOARD ── */
    .gap-board { background:var(--bg2); border-radius:16px; padding:16px; border:1px solid var(--border); }
    .gap-board-title { font-size:12px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-bottom:14px; display:flex; align-items:center; gap:6px; }
    .gap-row   { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .gap-pos   { font-size:11px; font-weight:900; width:36px; text-align:center; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .gap-bar-wrap { flex:1; }
    .gap-bar-bg   { height:8px; background:rgba(255,255,255,.08); border-radius:4px; overflow:hidden; margin-top:4px; }
    .gap-bar-fill { height:100%; border-radius:4px; display:flex; align-items:center; padding-left:6px; transition:width .8s ease; }
    .gap-bar-label{ font-size:9px; font-weight:900; color:#fff; white-space:nowrap; }
    .gap-behind   { font-size:10px; color:var(--text2); }
    .leading      { color:var(--gold); font-weight:800; }

    /* ── LAYOUT ── */
    .page { max-width:640px; margin:0 auto; padding:16px; }
    .card { background:var(--card); border-radius:16px; border:1px solid var(--border); padding:16px; margin-bottom:16px; overflow:hidden; }
    .card.no-pad { padding:0; }
    .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .logo-wrap { display:flex; align-items:center; gap:10px; }
    .logo-icon { width:38px; height:38px; background:var(--red); border-radius:10px; display:flex; align-items:center; justify-content:center; }
    .logo-text { font-size:16px; font-weight:900; }
    .logo-sub  { font-size:11px; color:var(--text2); }
    .live-badge { display:flex; align-items:center; gap:5px; background:rgba(217,74,74,.12); border:1px solid rgba(217,74,74,.3); border-radius:20px; padding:5px 12px; font-size:11px; font-weight:700; color:var(--red); }
    .live-dot   { width:7px; height:7px; background:var(--red); border-radius:50%; animation:pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
    .clock { font-size:12px; color:var(--text2); font-weight:700; margin-top:2px; text-align:right; }
    .empty-state { text-align:center; padding:48px 24px; color:var(--text2); }
    .section-title { font-size:11px; font-weight:800; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-bottom:14px; }
    .comm-cards { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; }
    .comm-card  { flex-shrink:0; width:110px; background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:12px; padding:12px 8px; text-align:center; }
    .comm-rank  { font-size:10px; font-weight:900; margin-bottom:6px; }
    .comm-name  { font-size:12px; font-weight:700; margin-top:6px; margin-bottom:2px; }
    .comm-amt   { font-size:15px; font-weight:900; }
    .comm-cars  { font-size:10px; color:var(--text2); margin-top:2px; }
    .refresh-bar { font-size:10px; color:var(--text2); text-align:center; padding:8px 0; }
    .mb-4 { margin-bottom:16px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── CONFIG ──
const APP_ID   = '6a1c42f697e43e4ff43a5097';
const API_BASE = 'https://superagent-f43a5097.base44.app/functions/apiHandler';

async function fetchEntity(entity) {
  const r = await fetch(API_BASE, {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'x-base44-app-id': APP_ID },
    body: JSON.stringify({ action:'list', entity }),
  });
  const j = await r.json();
  return j.data || [];
}

const peso = n => `₱${(n||0).toLocaleString('en-PH',{minimumFractionDigits:0,maximumFractionDigits:0})}`;
const parseArr = v => {
  if (!v) return [];
  const arr = Array.isArray(v) ? v : [];
  return arr.map(item => {
    if (typeof item === 'string') { try { return JSON.parse(item); } catch { return null; } }
    return item;
  }).filter(Boolean);
};
const today = () => {
  const d = new Date();
  // Use Asia/Manila local date (UTC+8) not UTC
  return d.toLocaleDateString('en-CA', {timeZone:'Asia/Manila'}); // returns YYYY-MM-DD
};

function Av({ emp, size=40, fs=15 }) {
  const name   = emp?.full_name || '?';
  const colors = ['#D94A4A','#E8735A','#D4AF37','#22C55E','#3B82F6','#8B5CF6','#F97316','#06B6D4'];
  const bg     = emp?.avatar_color || colors[Math.abs(name.charCodeAt(0) + (name.charCodeAt(1)||0)) % colors.length];
  const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  return <div className="av" style={{width:size,height:size,background:bg,fontSize:fs,color:'#fff'}}>{initials}</div>;
}

function RankingPage() {
  const [tab,        setTab]        = useState('today');
  const [carWashes,  setCarWashes]  = useState([]);
  const [employees,  setEmployees]  = useState([]);
  const [campaigns,  setCampaigns]  = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [clock,      setClock]      = useState('');
  const [nextRefresh,setNextRefresh]= useState(30);
  const timerRef = useRef(null);

  const loadData = async () => {
    try {
      const [w, e, c] = await Promise.all([
        fetchEntity('CarWash'),
        fetchEntity('Employee'),
        fetchEntity('RewardCampaign'),
      ]);
      setCarWashes(w); setEmployees(e); setCampaigns(c);
    } catch(err) { console.error(err); }
    finally { setLoading(false); setNextRefresh(30); }
  };

  useEffect(() => {
    loadData();
    const refreshInterval = setInterval(loadData, 30000);
    const clockInterval   = setInterval(() => {
      const now = new Date();
      setClock(now.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
      setNextRefresh(n => n <= 1 ? 30 : n - 1);
    }, 1000);
    return () => { clearInterval(refreshInterval); clearInterval(clockInterval); };
  }, []);

  const now = new Date();
  const todayStr = today();
  // nowPH: same moment but shifted to compare month/year in PH local time
  const nowPH = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Manila'}));

  const filterWashes = () => {
    if (tab === 'today') return carWashes.filter(w=>{
      const raw = w.transaction_date||w.created_date||'';
      if (!raw) return false;
      const localDate = new Date(raw).toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
      return localDate === todayStr;
    });
    if (tab === '7days') {
      const cutoff = new Date(now.getTime() - 7*24*60*60*1000);
      return carWashes.filter(w=>new Date(w.transaction_date||w.created_date)>=cutoff);
    }
    return carWashes.filter(w=>{
      const d=new Date(w.transaction_date||w.created_date);
      // Compare month/year in PH timezone
      const dPH = new Date(d.toLocaleString('en-US',{timeZone:'Asia/Manila'}));
      return dPH.getMonth()===nowPH.getMonth()&&dPH.getFullYear()===nowPH.getFullYear();
    });
  };

  const buildBoard = () => {
    const map = {};
    employees.filter(e=>e.is_active).forEach(e=>{
      map[e.id]={id:e.id,name:e.full_name,emp:e,cars:0,sales:0,commission:0};
    });
    filterWashes().forEach(w=>{
      // 1 car per wash — credit all employees in commission_splits
      const splits = (()=>{ const arr=parseArr(w.commission_splits); return arr.length>0?arr:[{employee_id:w.employee_id,employee_name:w.employee_name,amount:w.commission_amount||0}]; })();
      splits.forEach((sp,idx)=>{
        const empId   = sp.employee_id || sp.id;
        const empName = sp.employee_name || sp.name || w.employee_name;
        if (!map[empId]) {
          const e=employees.find(x=>x.id===empId);
          map[empId]={id:empId,name:empName,emp:e||null,cars:0,sales:0,commission:0};
        }
        map[empId].cars++;
        if (idx===0) map[empId].sales+=(w.total_amount||0);
        map[empId].commission+=(sp.amount||0);
      });
    });
    return Object.values(map).sort((a,b)=>b.cars-a.cars||b.sales-a.sales);
  };

  const ranked   = buildBoard();
  const maxCars  = ranked[0]?.cars || 1;
  const posColor = ['var(--gold)','var(--silver)','var(--bronze)'];
  const posLabel = ['1ST','2ND','3RD'];
  const tabLabels= { today:'Today', '7days':'7 Days', month:'This Month' };
  const activeCampaign = campaigns.find(c=>c.is_active);

  const podiumOrder   = [ranked[1], ranked[0], ranked[2]];
  const podiumHeights = [110, 150, 90];
  const podiumColors  = ['rgba(184,188,194,.2)','rgba(212,175,55,.25)','rgba(184,115,51,.2)'];
  const podiumBorders = ['rgba(184,188,194,.4)','rgba(212,175,55,.5)','rgba(184,115,51,.4)'];

  if (loading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:14}}>
      <div className="logo-icon"><svg viewBox="0 0 24 24" fill="white" width="22" height="22"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg></div>
      <div style={{fontSize:16,fontWeight:800}}>Loading Rankings...</div>
    </div>
  );

  return (
    <div className="page">
      {/* Header */}
      <div className="header">
        <div className="logo-wrap">
          <div className="logo-icon"><svg viewBox="0 0 24 24" fill="white" width="20" height="20"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg></div>
          <div>
            <div className="logo-text">KGCAR Carwash</div>
            <div className="logo-sub">Live Leaderboard</div>
          </div>
        </div>
        <div style={{textAlign:'right'}}>
          <div className="live-badge"><div className="live-dot"></div>LIVE</div>
          <div className="clock">{clock}</div>
        </div>
      </div>

      {/* Period Tabs */}
      <div className="rank-tabs mb-4">
        {['today','7days','month'].map(t=>(
          <div key={t} className={`rank-tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
            {tabLabels[t]}
          </div>
        ))}
      </div>

      {ranked.filter(r=>r.cars>0).length === 0 ? (
        <div className="empty-state card">
          <div style={{fontSize:40,marginBottom:12,opacity:.4}}>🏆</div>
          <div style={{fontSize:16,fontWeight:700}}>No washes yet for {tabLabels[tab]}</div>
          <div style={{fontSize:13,marginTop:4}}>Get washing to claim the top spot!</div>
        </div>
      ) : (<>

        {/* Podium */}
        {ranked.filter(r=>r.cars>0).length >= 2 && (
          <div className="card mb-4" style={{paddingBottom:0}}>
            <div className="section-title" style={{textAlign:'center'}}>Podium — {tabLabels[tab]}</div>
            <div className="podium-wrap">
              {podiumOrder.map((r,idx)=>{
                if (!r) return <div key={idx} style={{flex:1,maxWidth:150}}></div>;
                const isFirst = idx===1;
                const pC = posColor[isFirst?0:idx===0?1:2];
                return (
                  <div key={r.id} className="podium-slot">
                    <div className="podium-avatar-wrap">
                      {isFirst && <div className="podium-crown">👑</div>}
                      <Av emp={r.emp||{full_name:r.name,avatar_color:'#D94A4A'}} size={isFirst?64:50} fs={isFirst?22:18}/>
                    </div>
                    <div className="podium-name" style={{color:pC,marginTop:8}}>{r.name.split(' ')[0]}</div>
                    <div className="podium-bar" style={{height:podiumHeights[idx],background:podiumColors[idx],border:`1.5px solid ${podiumBorders[idx]}`,borderBottom:'none',width:'100%'}}>
                      <div className="podium-cars" style={{color:pC}}>{r.cars}</div>
                      <div className="podium-clabel">CARS</div>
                      <div className="podium-sales" style={{color:pC}}>{peso(r.sales)}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Gap Board */}
        {ranked[0] && ranked[0].cars > 0 && (
          <div className="gap-board mb-4">
            <div className="gap-board-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="var(--red)" strokeWidth="2" width="14" height="14"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
              Gap to Leader — {ranked[0].name.split(' ')[0]}
            </div>
            {ranked.filter(r=>r.cars>0).map((r,i)=>{
              const pct     = maxCars>0?(r.cars/maxCars)*100:0;
              const gapCars = ranked[0].cars - r.cars;
              const barColor= i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':'var(--red)';
              return (
                <div key={r.id} className="gap-row">
                  <div className="gap-pos" style={{color:i<3?posColor[i]:'var(--text2)'}}>{i<3?posLabel[i]:`#${i+1}`}</div>
                  <div className="gap-bar-wrap">
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontSize:12,fontWeight:700}}>{r.name}</span>
                      {i===0
                        ? <span className="leading gap-behind">LEADER</span>
                        : <span className="gap-behind">-{gapCars} car{gapCars!==1?'s':''}</span>}
                    </div>
                    <div className="gap-bar-bg">
                      <div className="gap-bar-fill" style={{width:`${pct}%`,background:barColor}}>
                        {pct>18&&<span className="gap-bar-label">{r.cars} car{r.cars!==1?"s":""}</span>}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Commission Cards */}
        <div className="card mb-4">
          <div className="section-title">⚡ Commission Earned</div>
          <div className="comm-cards">
            {ranked.filter(r=>r.cars>0).map((r,i)=>(
              <div key={r.id} className="comm-card" style={{borderColor:i<3?`${[posColor[0],posColor[1],posColor[2]][i].replace('var(','').replace(')','')}`:'var(--border)'}}>
                <div className="comm-rank" style={{color:i<3?posColor[i]:'var(--text2)'}}>{i<3?posLabel[i]:`#${i+1}`}</div>
                <Av emp={r.emp||{full_name:r.name}} size={40} fs={14}/>
                <div className="comm-name">{r.name.split(' ')[0]}</div>
                <div className="comm-amt" style={{color:i<3?posColor[i]:'var(--text)'}}>{peso(r.commission)}</div>
                <div className="comm-cars">{r.cars} car{r.cars!==1?"s":""}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Full Standings */}
        <div className="card no-pad mb-4">
          <div style={{padding:'14px 16px 10px',borderBottom:'1px solid var(--border)'}}>
            <div className="section-title" style={{marginBottom:0}}>Full Standings</div>
          </div>
          {ranked.map((r,i)=>{
            const pct    = maxCars>0?(r.cars/maxCars)*100:0;
            const bColor = i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':'var(--red)';
            return (
              <div key={r.id} className="rank-list-item" style={{animationDelay:`${i*.05}s`}}>
                <div className="rl-pos" style={{color:i<3?posColor[i]:'var(--text2)'}}>{i<3?posLabel[i]:`#${i+1}`}</div>
                <Av emp={r.emp||{full_name:r.name}} size={38} fs={14}/>
                <div className="rl-info">
                  <div className="rl-name">{r.name}</div>
                  <div className="rl-bar"><div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`,background:bColor}}></div></div></div>
                  <div className="rl-stats">{peso(r.sales)} · comm {peso(r.commission)}</div>
                </div>
                <div className="rl-right">
                  <div className="rl-cars" style={{color:bColor}}>{r.cars}</div>
                  <div className="rl-clabel">{r.cars!==1?"cars":"car"}</div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Campaign Rewards */}
        {activeCampaign?.is_active && (
          <div style={{background:'rgba(212,175,55,.07)',border:'1px solid rgba(212,175,55,.25)',borderRadius:16,padding:20,marginBottom:16}}>
            <div style={{fontWeight:800,fontSize:14,color:'var(--gold)',marginBottom:14}}>
              🏅 Active Campaign — {activeCampaign.campaign_name}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
              {[
                {pos:'1ST',reward:activeCampaign.first_place_reward,color:posColor[0],emp:ranked[0]},
                {pos:'2ND',reward:activeCampaign.second_place_reward,color:posColor[1],emp:ranked[1]},
                {pos:'3RD',reward:activeCampaign.third_place_reward, color:posColor[2],emp:ranked[2]},
              ].map((x,i)=>(
                <div key={i} style={{background:'rgba(255,255,255,.04)',border:`1px solid ${['rgba(212,175,55,.3)','rgba(184,188,194,.25)','rgba(184,115,51,.25)'][i]}`,borderRadius:12,padding:14,textAlign:'center'}}>
                  <div style={{fontSize:11,fontWeight:700,color:x.color,marginBottom:6}}>{x.pos}</div>
                  {x.emp&&x.emp.cars>0&&<Av emp={x.emp.emp||{full_name:x.emp.name}} size={32} fs={12}/>}
                  <div style={{fontWeight:800,color:x.color,fontSize:16,marginTop:4}}>{peso(x.reward)}</div>
                  <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{x.emp&&x.emp.cars>0?x.emp.name.split(' ')[0]:'TBD'}</div>
                </div>
              ))}
            </div>
          </div>
        )}

      </>)}

      <div className="refresh-bar">Auto-refreshes every 30s · {nextRefresh}s until next refresh</div>
    </div>
  );
}

ReactDOM.render(<RankingPage/>, document.getElementById('root'));
</script>
</body>
</html>
