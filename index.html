function VlcDashboard({ vlcJobs, employees, vlcProducts, setPage }) {
  const vlcEmps = employees.filter(e=>e.business_type==='vulcanizing');
  const now = new Date();
  const [filter, setFilter] = React.useState('today');
  const [customFrom, setCustomFrom] = React.useState('');
  const [customTo,   setCustomTo]   = React.useState('');

  const manilaDate = dt => { const d=typeof dt==='string'&&!dt.endsWith('Z')&&!dt.includes('+') ? new Date(dt+'Z') : new Date(dt); return d.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}); };
  const manilaToday = () => new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});

  const getFiltered = () => {
    const todayStr = manilaToday();
    if (filter==='today') return vlcJobs.filter(j=>manilaDate(j.transaction_date||j.created_date)===todayStr);
    if (filter==='yesterday') {
      const yest = new Date(); yest.setDate(yest.getDate()-1);
      const yestStr = yest.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
      return vlcJobs.filter(j=>manilaDate(j.transaction_date||j.created_date)===yestStr);
    }
    if (filter==='7days') {
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-6); cutoff.setHours(0,0,0,0);
      return vlcJobs.filter(j=>new Date(j.transaction_date||j.created_date)>=cutoff);
    }
    if (filter==='14days') {
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-13); cutoff.setHours(0,0,0,0);
      return vlcJobs.filter(j=>new Date(j.transaction_date||j.created_date)>=cutoff);
    }
    if (filter==='month')  return vlcJobs.filter(j=>{const d=new Date(j.transaction_date||j.created_date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
    if (filter==='custom'&&customFrom&&customTo) return vlcJobs.filter(j=>{const s=manilaDate(j.transaction_date||j.created_date);return s>=customFrom&&s<=customTo;});
    return vlcJobs;
  };
  const filtered = getFiltered();

  const totalRev  = filtered.reduce((s,j)=>s+(j.total_amount||0),0);
  const totalComm = filtered.reduce((s,j)=>s+(j.commission_amount||0),0);
  const totalCost = filtered.reduce((s,j)=>s+(j.total_product_cost||0),0);
  const totalNet  = filtered.reduce((s,j)=>s+(j.net_amount||0),0);

  // Per-employee leaderboard for filtered period
  const empMap = {};
  filtered.forEach(j=>{
    const id = j.employee_id;
    if (!id) return;
    if (!empMap[id]) empMap[id]={id,name:j.employee_name||'—',jobs:0,sales:0,comm:0};
    empMap[id].jobs++;
    empMap[id].sales+=(j.total_amount||0);
    empMap[id].comm+=(j.commission_amount||0);
  });
  const ranking = Object.values(empMap).sort((a,b)=>b.jobs-a.jobs||b.sales-a.sales);
  const topEmp  = ranking[0]||null;

  const recent  = [...vlcJobs].sort((a,b)=>new Date(b.transaction_date||b.created_date)-new Date(a.transaction_date||a.created_date)).slice(0,5);
  const timeNow = now.toLocaleString('en-PH',{weekday:'long',month:'long',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'Asia/Manila'});
  const posColors=['var(--gold)','var(--silver)','var(--bronze)'];
  const posLabels=['1ST','2ND','3RD'];

  const filterLabel = {today:'Today',yesterday:'Yesterday','7days':'Last 7 Days','14days':'Last 14 Days',month:'This Month',custom:'Custom Range'}[filter]||'';

  return (
    <div>
      {/* Hero */}
      <div className="hero-header">
        <div style={{position:'relative',zIndex:1}}>
          <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}>{timeNow}</div>
          <div style={{fontSize:26,fontWeight:900,marginBottom:4}}>KG Car Services 🔧</div>
          <div style={{fontSize:13,color:'var(--text2)'}}>Vulcanizing business overview.</div>
        </div>
      </div>

      {/* Period filter */}
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14,padding:'0 2px'}}>
        {[{k:'today',l:'Today'},{k:'yesterday',l:'Yesterday'},{k:'7days',l:'7 Days'},{k:'14days',l:'14 Days'},{k:'month',l:'Month'},{k:'custom',l:'Custom'}].map(t=>(
          <button key={t.k}
            className={`btn btn-sm ${filter===t.k?'btn-primary':'btn-ghost'}`}
            onClick={()=>setFilter(t.k)}
            style={{borderRadius:20,fontSize:12,fontWeight:700,padding:'6px 14px'}}>
            {t.l}
          </button>
        ))}
      </div>
      {filter==='custom'&&(
        <div style={{display:'flex',gap:8,marginBottom:14,alignItems:'center',flexWrap:'wrap'}}>
          <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)}
            style={{flex:1,minWidth:130,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontSize:13}}/>
          <span style={{color:'var(--text2)',fontSize:12}}>to</span>
          <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)}
            style={{flex:1,minWidth:130,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontSize:13}}/>
        </div>
      )}

      {/* Stats */}
      <div className="stats-grid" style={{marginBottom:16}}>
        {[
          {label:'Jobs',         value:filtered.length,   sub:`${filterLabel}`,              cls:'stat-red',    color:'var(--red)'},
          {label:'Revenue',      value:peso(totalRev),    sub:`Net ${peso(totalNet)}`,        cls:'stat-green',  color:'var(--success)'},
          {label:'Commission',   value:peso(totalComm),   sub:`Costs ${peso(totalCost)}`,     cls:'stat-yellow', color:'var(--gold)'},
          {label:'Top Performer',value:topEmp?topEmp.name.split(' ')[0]:'—', sub:topEmp?`${topEmp.jobs} jobs · ${peso(topEmp.sales)}`:'No data yet', cls:'stat-gray', color:'var(--silver)'},
        ].map((s,i)=>(
          <div key={i} className={`stat-card ${s.cls}`}>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value" style={{color:s.color}}>{s.value}</div>
            <div className="stat-sub">{s.sub}</div>
          </div>
        ))}
      </div>

      <div className="grid-2">
        {/* Leaderboard */}
        <div className="card">
          <div className="section-title">{filterLabel} — Top Workers</div>
          {ranking.length===0
            ? <div style={{textAlign:'center',padding:'24px 0',color:'var(--text2)',fontSize:13}}>No jobs in this period</div>
            : ranking.slice(0,3).map((r,i)=>{
                const emp=vlcEmps.find(e=>e.id===r.id);
                return (
                  <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                    <div style={{fontSize:11,fontWeight:800,color:posColors[i]||'var(--text2)',minWidth:28,textAlign:'center'}}>{posLabels[i]||`#${i+1}`}</div>
                    <Av emp={emp||{full_name:r.name,avatar_color:'var(--red)'}} size={36} fs={13} />
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700}}>{r.name}</div>
                      <div style={{fontSize:11,color:'var(--text2)'}}>{peso(r.sales)} · {peso(r.comm)} comm</div>
                    </div>
                    <div style={{fontSize:18,fontWeight:900,color:posColors[i]||'var(--text2)'}}>{r.jobs}</div>
                    <div style={{fontSize:10,color:'var(--text2)'}}>jobs</div>
                  </div>
                );
              })}
          <button className="btn btn-ghost btn-sm" style={{width:'100%',marginTop:10}} onClick={()=>setPage('vlc-ranking')}>Full Leaderboard ↗</button>
        </div>

        {/* Recent jobs */}
        <div className="card">
          <div className="section-title">Recent Jobs</div>
          {recent.length===0
            ? <div style={{textAlign:'center',padding:'24px 0',color:'var(--text2)',fontSize:13}}>No jobs yet.</div>
            : recent.map((j,i)=>{
                const items=parseArr(j.products_used).map(p=>p.name||p).join(', ')||'—';
                return (
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                    <div style={{width:32,height:32,borderRadius:8,background:'rgba(217,74,74,0.12)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>🔧</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:600}}>{j.vehicle_info||j.customer_name||'Job'}</div>
                      <div style={{fontSize:11,color:'var(--text2)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{items}</div>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <div style={{fontSize:13,fontWeight:700,color:'var(--gold)'}}>{peso(j.total_amount||0)}</div>
                      <div style={{fontSize:10,color:'var(--text2)'}}>{j.employee_name||'—'}</div>
                    </div>
                  </div>
                );
              })}
          <button className="btn btn-ghost btn-sm" style={{width:'100%',marginTop:10}} onClick={()=>setPage('vlc-transactions')}>View All</button>
        </div>
      </div>

      {/* Quick action */}
      <div style={{marginTop:16,textAlign:'center'}}>
        <button className="btn btn-primary" style={{padding:'14px 40px',fontSize:15,fontWeight:800}} onClick={()=>setPage('vlc-record')}>
          🔧 Record New Job
        </button>
      </div>
    </div>
  );
}

/* ── RecordVlcJob ── */
function RecordVlcJob({ employees, services, vlcProducts, onSave, showToast }) {
  const vlcEmps = employees.filter(e=>e.is_active&&e.business_type==='vulcanizing');

  const emptyForm = { customer_name:'', vehicle_info:'', employee_id:'', products_used:[], notes:'' };
  const [form,setForm]=React.useState(emptyForm);
  const [saving,setSaving]=React.useState(false);
  const [isPaid,setIsPaid]=React.useState(true);
  const [showOK,setShowOK]=React.useState(false);
  const [lastJob,setLastJob]=React.useState(null);
  const [customName,setCustomName]=React.useState('');
  const [customPrice,setCustomPrice]=React.useState('');
  const [customCost,setCustomCost]=React.useState('');
  const [showCustom,setShowCustom]=React.useState(false);

  const selEmp  = vlcEmps.find(e=>e.id===form.employee_id);
  const commRate= selEmp ? (selEmp.commission_percentage||40) : 40;

  // Each product contributes its price (customer charge) and cost (material deduction)
  const addProduct = prod => {
    setForm(f=>({...f,products_used:[...f.products_used,{id:prod.id,name:prod.name,price:prod.price||0,cost:prod.default_cost||0}]}));
  };
  const removeProduct = idx => setForm(f=>({...f,products_used:f.products_used.filter((_,i)=>i!==idx)}));
  const updateField = (idx,field,val) => setForm(f=>({...f,products_used:f.products_used.map((p,i)=>i===idx?{...p,[field]:parseFloat(val)||0}:p)}));

  const addCustomItem = () => {
    const name = customName.trim();
    if (!name) return;
    const price = parseFloat(customPrice)||0;
    const cost  = parseFloat(customCost)||0;
    setForm(f=>({...f,products_used:[...f.products_used,{id:'custom_'+Date.now(),name,price,cost}]}));
    setCustomName(''); setCustomPrice(''); setCustomCost(''); setShowCustom(false);
  };

  const totalAmount   = form.products_used.reduce((s,p)=>s+(p.price||0),0);
  const totalProdCost = form.products_used.reduce((s,p)=>s+(p.cost||0),0);
  const netAmount     = Math.max(0, totalAmount - totalProdCost);
  // Commission is on NET amount (total minus material cost)
  const commissionAmt = Math.round(netAmount * commRate / 100);

  const handleSave = async () => {
    if (!form.employee_id)            { showToast('Select an employee','error'); return; }
    if (form.products_used.length===0){ showToast('Add at least one product','error'); return; }
    setSaving(true);
    try {
      const rec = {
        customer_name:      form.customer_name||'',
        vehicle_info:       form.vehicle_info||'',
        employee_id:        form.employee_id,
        employee_name:      selEmp?.full_name||'',
        employees:          [JSON.stringify({id:form.employee_id,name:selEmp?.full_name||''})],
        services:           [],
        products_used:      form.products_used.map(p=>JSON.stringify(p)),
        commission_splits:  [JSON.stringify({employee_id:form.employee_id,name:selEmp?.full_name||'',rate:commRate,amount:commissionAmt})],
        total_product_cost: totalProdCost,
        total_amount:       totalAmount,
        net_amount:         netAmount,
        amount_paid:        totalAmount,
        payment_status:     isPaid ? 'paid' : 'unpaid',
        commission_rate:    commRate,
        commission_amount:  commissionAmt,
        transaction_date:   new Date().toISOString(),
        notes:              form.notes||'',
      };
      const res = await api('create','VulcanizingJob',{data:rec});
      await logEvent({event_type:'vlc_job_created',title:'Vulcanizing Job Recorded',
        description:`${selEmp?.full_name||'—'} · ${form.products_used.map(p=>p.name).join(', ')} · ${peso(totalAmount)}`,
        actor_name:selEmp?.full_name||'',entity_id:res?.id||'',amount:totalAmount});
      setLastJob({ products: form.products_used, total: totalAmount, emp: selEmp?.full_name||'—' });
      setShowOK(true);
      setTimeout(()=>{ setShowOK(false); setLastJob(null); onSave(res); setForm(emptyForm); setIsPaid(true); }, 900);
    } catch(e) { showToast('Save failed: '+e.message,'error'); }
    finally { setSaving(false); }
  };

  const activeProds = vlcProducts.filter(p=>p.is_active!==false);

  if (showOK && lastJob) return (
    <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:9999,pointerEvents:'none'}}>
      <div style={{
        background:'var(--bg2)',
        border:'2px solid var(--red)',
        borderRadius:20,
        padding:'24px 36px',
        textAlign:'center',
        boxShadow:'0 8px 40px rgba(217,74,74,0.25)',
        animation:'popIn .15s ease-out',
        pointerEvents:'auto',
        minWidth:220,
      }}>
        <div style={{fontSize:40,marginBottom:6}}>✅</div>
        <div style={{fontSize:18,fontWeight:900,color:'var(--red)',marginBottom:4}}>Job Order Created!</div>
        <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:2}}>
          {lastJob.products.map(p=>p.name).join(' · ')||'Vulcanizing Job'}
        </div>
        <div style={{fontSize:14,fontWeight:800,color:'var(--gold)',marginTop:4}}>{peso(lastJob.total)}</div>
      </div>
    </div>
  );

  return (
    <div style={{maxWidth:560,margin:'0 auto'}}>
      <div className="section-title" style={{marginBottom:20}}>🔧 Record Vulcanizing Job</div>

      {/* Employee */}
      <div className="card" style={{marginBottom:12,padding:'14px 16px'}}>
        <div style={{fontSize:12,fontWeight:700,color:'var(--text2)',marginBottom:10}}>EMPLOYEE</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {vlcEmps.length===0
            ? <div style={{color:'var(--text2)',fontSize:13}}>No vulcanizing employees yet — add them in Employees section</div>
            : vlcEmps.map(e=>(
              <button key={e.id} onClick={()=>setForm(f=>({...f,employee_id:e.id}))}
                style={{padding:'8px 14px',borderRadius:20,border:'2px solid',fontSize:12,fontWeight:700,cursor:'pointer',transition:'all .15s',
                  borderColor:form.employee_id===e.id?'var(--red)':'var(--border)',
                  background:form.employee_id===e.id?'rgba(217,74,74,0.15)':'transparent',
                  color:form.employee_id===e.id?'var(--red)':'var(--text)'}}>
                {e.full_name}
              </button>
            ))}
        </div>
      </div>

      {/* Products — tap to add, editable price & cost inline */}
      <div className="card" style={{marginBottom:12,padding:'18px 18px',border:'1px solid rgba(34,197,94,0.2)',background:'rgba(34,197,94,0.03)'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:32,height:32,borderRadius:8,background:'rgba(34,197,94,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🔧</div>
            <div>
              <div style={{fontSize:14,fontWeight:800,color:'var(--text)',letterSpacing:.3}}>PRODUCTS / SERVICES</div>
              <div style={{fontSize:11,color:'var(--text2)',marginTop:1}}>Tap to add · Price = customer charge · Cost = material deduction</div>
            </div>
          </div>
          {form.products_used.length>0&&<div style={{fontSize:12,fontWeight:700,color:'var(--success)',background:'rgba(34,197,94,0.12)',padding:'3px 10px',borderRadius:20,border:'1px solid rgba(34,197,94,0.25)'}}>{form.products_used.length} item{form.products_used.length!==1?'s':''}</div>}
        </div>

        {/* Product picker chips */}
        {activeProds.length===0
          ? <div style={{color:'var(--text2)',fontSize:13,padding:'12px 0'}}>No products yet — add them in Products section</div>
          : <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:form.products_used.length>0?14:0,marginTop:10}}>
              {activeProds.map(prod=>(
                <button key={prod.id} onClick={()=>addProduct(prod)}
                  style={{padding:'10px 16px',borderRadius:24,border:'1px solid var(--border)',fontSize:13,fontWeight:700,
                    background:'rgba(255,255,255,0.05)',color:'var(--text)',cursor:'pointer',transition:'all .2s',
                    display:'flex',alignItems:'center',gap:6,whiteSpace:'nowrap',
                    minHeight:44,boxSizing:'border-box'}}
                  onMouseOver={e=>{e.currentTarget.style.borderColor='var(--success)';e.currentTarget.style.background='rgba(34,197,94,0.10)';e.currentTarget.style.color='var(--success)';}}
                  onMouseOut={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='rgba(255,255,255,0.05)';e.currentTarget.style.color='var(--text)';}}>
                  <span style={{fontSize:15,fontWeight:900,color:'var(--success)'}}>+</span>
                  <span>{prod.name}</span>
                  <span style={{color:'var(--success)',fontWeight:800,fontSize:13}}>₱{(prod.price||0).toLocaleString()}</span>
                </button>
              ))}
            </div>}

        {/* Custom service add button + inline form */}
        <div style={{marginTop:10}}>
          {!showCustom
            ? <button onClick={()=>setShowCustom(true)}
                style={{padding:'8px 16px',borderRadius:20,border:'1px dashed rgba(255,255,255,0.25)',fontSize:12,fontWeight:700,
                  background:'rgba(255,255,255,0.04)',color:'var(--text2)',cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:15}}>✏️</span> Add Custom Service
              </button>
            : <div style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:12,padding:'12px 14px'}}>
                <div style={{fontSize:11,fontWeight:800,color:'var(--text2)',marginBottom:8,letterSpacing:.5}}>CUSTOM SERVICE</div>
                <input placeholder="Service name (e.g. Flat Tire Repair)" value={customName} onChange={e=>setCustomName(e.target.value)}
                  style={{width:'100%',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 10px',
                    color:'var(--text)',fontSize:13,boxSizing:'border-box',marginBottom:8}}/>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
                  <div>
                    <div style={{fontSize:10,color:'var(--success)',fontWeight:700,marginBottom:4}}>PRICE (charge) ₱</div>
                    <input type="number" placeholder="0" value={customPrice} onChange={e=>setCustomPrice(e.target.value)}
                      style={{width:'100%',background:'var(--bg)',border:'2px solid rgba(34,197,94,0.4)',borderRadius:8,padding:'8px 10px',
                        color:'var(--success)',fontSize:14,fontWeight:800,textAlign:'center',boxSizing:'border-box'}}/>
                  </div>
                  <div>
                    <div style={{fontSize:10,color:'var(--red)',fontWeight:700,marginBottom:4}}>COST (material) ₱</div>
                    <input type="number" placeholder="0" value={customCost} onChange={e=>setCustomCost(e.target.value)}
                      style={{width:'100%',background:'var(--bg)',border:'2px solid rgba(217,74,74,0.4)',borderRadius:8,padding:'8px 10px',
                        color:'var(--red)',fontSize:14,fontWeight:800,textAlign:'center',boxSizing:'border-box'}}/>
                  </div>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={()=>{setShowCustom(false);setCustomName('');setCustomPrice('');setCustomCost('');}}
                    style={{flex:1,padding:'9px 0',borderRadius:8,border:'1px solid var(--border)',background:'transparent',color:'var(--text2)',fontSize:12,fontWeight:700,cursor:'pointer'}}>
                    Cancel
                  </button>
                  <button onClick={addCustomItem} disabled={!customName.trim()}
                    style={{flex:2,padding:'9px 0',borderRadius:8,border:'none',
                      background: customName.trim() ? 'var(--red)' : 'rgba(255,255,255,0.08)',
                      color: customName.trim() ? '#fff' : 'var(--text2)',
                      fontSize:13,fontWeight:800,cursor: customName.trim() ? 'pointer' : 'default'}}>
                    ✚ Add to Job
                  </button>
                </div>
              </div>
          }
        </div>

        {/* Added items list */}
        {form.products_used.length>0 && (
          <div style={{marginTop:12}}>
            {/* Column headers */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 90px 90px 36px',gap:8,marginBottom:6,padding:'0 6px'}}>
              <span style={{fontSize:10,color:'var(--text2)',fontWeight:800,letterSpacing:.5}}>ITEM</span>
              <span style={{fontSize:10,color:'var(--success)',fontWeight:800,textAlign:'center',letterSpacing:.5}}>PRICE ₱</span>
              <span style={{fontSize:10,color:'var(--red)',fontWeight:800,textAlign:'center',letterSpacing:.5}}>COST ₱</span>
              <span></span>
            </div>
            {form.products_used.map((p,i)=>(
              <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 90px 90px 36px',gap:8,alignItems:'center',
                marginBottom:8,background:'rgba(255,255,255,0.05)',borderRadius:10,padding:'10px 10px',
                border:'1px solid rgba(255,255,255,0.07)'}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>{p.name}</div>
                  <div style={{fontSize:11,color:'var(--success)',marginTop:1}}>net: ₱{((p.price||0)-(p.cost||0)).toLocaleString()}</div>
                </div>
                <input type="number" value={p.price} onChange={e=>updateField(i,'price',e.target.value)}
                  style={{width:'100%',background:'var(--bg2)',border:'2px solid rgba(34,197,94,0.5)',borderRadius:8,
                    padding:'8px 8px',color:'var(--success)',fontSize:14,textAlign:'center',fontWeight:800,
                    boxSizing:'border-box'}}/>
                <input type="number" value={p.cost} onChange={e=>updateField(i,'cost',e.target.value)}
                  style={{width:'100%',background:'var(--bg2)',border:'2px solid rgba(217,74,74,0.5)',borderRadius:8,
                    padding:'8px 8px',color:'var(--red)',fontSize:14,textAlign:'center',fontWeight:800,
                    boxSizing:'border-box'}}/>
                <button onClick={()=>removeProduct(i)}
                  style={{width:32,height:32,background:'rgba(217,74,74,0.1)',border:'1px solid rgba(217,74,74,0.25)',
                    borderRadius:8,color:'var(--red)',cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',
                    justifyContent:'center',padding:0,lineHeight:1,flexShrink:0}}>×</button>
              </div>
            ))}
          </div>
        )}
        {form.products_used.length===0 && activeProds.length>0 && (
          <div style={{marginTop:10,padding:'12px 14px',borderRadius:10,border:'1px dashed rgba(255,255,255,0.1)',
            textAlign:'center',color:'var(--text2)',fontSize:13}}>
            👆 Tap a product above to add it to this job
          </div>
        )}
      </div>

      {/* Details */}
      <div className="card" style={{marginBottom:12,padding:'14px 16px'}}>
        <div style={{fontSize:12,fontWeight:700,color:'var(--text2)',marginBottom:10}}>DETAILS</div>
        <input placeholder="Vehicle info (e.g. Honda Civic - front left)" value={form.vehicle_info}
          onChange={e=>setForm(f=>({...f,vehicle_info:e.target.value}))}
          style={{width:'100%',marginBottom:8,background:'var(--bg)',border:'1px solid var(--border)',
            borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13,boxSizing:'border-box'}}/>
        <input placeholder="Customer name (optional)" value={form.customer_name}
          onChange={e=>setForm(f=>({...f,customer_name:e.target.value}))}
          style={{width:'100%',marginBottom:8,background:'var(--bg)',border:'1px solid var(--border)',
            borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13,boxSizing:'border-box'}}/>
        <input placeholder="Notes (optional)" value={form.notes}
          onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
          style={{width:'100%',background:'var(--bg)',border:'1px solid var(--border)',
            borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13,boxSizing:'border-box'}}/>
      </div>

      {/* Live Summary */}
      {form.products_used.length>0&&(
        <div className="card" style={{marginBottom:12,padding:'14px 16px',background:'rgba(212,175,55,0.06)',border:'1px solid rgba(212,175,55,0.2)'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {[
              {l:'Total Charge',    v:peso(totalAmount),    c:'var(--text)'},
              {l:'Material Cost',   v:`- ${peso(totalProdCost)}`, c:'var(--red)'},
              {l:'Net Amount',      v:peso(netAmount),       c:'var(--gold)'},
              {l:`Commission (${commRate}%)`, v:peso(commissionAmt), c:'var(--success)'},
            ].map((x,i)=>(
              <div key={i} style={{textAlign:'center',padding:'8px 4px'}}>
                <div style={{fontSize:18,fontWeight:900,color:x.c}}>{x.v}</div>
                <div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>{x.l}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Payment Status */}
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <button onClick={()=>setIsPaid(true)}
          style={{flex:1,padding:'10px 0',borderRadius:10,border:'none',cursor:'pointer',fontWeight:800,fontSize:13,transition:'all .2s',
            background: isPaid ? 'rgba(34,197,94,0.18)' : 'rgba(255,255,255,0.05)',
            color:       isPaid ? 'var(--success)'       : 'var(--text2)',
            outline:     isPaid ? '2px solid var(--success)' : '2px solid transparent'}}>
          ✅ PAID
        </button>
        <button onClick={()=>setIsPaid(false)}
          style={{flex:1,padding:'10px 0',borderRadius:10,border:'none',cursor:'pointer',fontWeight:800,fontSize:13,transition:'all .2s',
            background: !isPaid ? 'rgba(217,74,74,0.18)' : 'rgba(255,255,255,0.05)',
            color:       !isPaid ? 'var(--red)'           : 'var(--text2)',
            outline:     !isPaid ? '2px solid var(--red)' : '2px solid transparent'}}>
          ❌ UNPAID
        </button>
      </div>

      <button className="btn btn-primary" style={{width:'100%',padding:'14px',fontSize:15,fontWeight:800}}
        onClick={handleSave} disabled={saving}>
        {saving?'Saving…':'🔧 Record Job'}
      </button>
    </div>
  );
}

/* ── VlcTransactions ── */
function VlcTransactions({ vlcJobs, employees, vlcProducts=[], onDelete, onRefresh, showToast, isAdmin=true }) {
  const [search,setSearch]=React.useState('');
  const [filter,setFilter]=React.useState('today');
  const [customFrom,setCustomFrom]=React.useState('');
  const [customTo,setCustomTo]=React.useState('');
  const [confirmDel,setConfirmDel]=React.useState(null);
  const [editJob,setEditJob]=React.useState(null);
  const [editForm,setEditForm]=React.useState(null);
  const [saving,setSaving]=React.useState(false);
  const [editCustomName,setEditCustomName]=React.useState('');
  const [editCustomPrice,setEditCustomPrice]=React.useState('');
  const [editCustomCost,setEditCustomCost]=React.useState('');
  const [showEditCustom,setShowEditCustom]=React.useState(false);

  const now=new Date();
  const manilaDate=dt=>{ const d=typeof dt==='string'&&!dt.endsWith('Z')&&!dt.includes('+') ? new Date(dt+'Z') : new Date(dt); return d.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}); };
  const todayStr=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});

  const vlcEmps=employees.filter(e=>e.business_type==='vulcanizing');
  const activeProds=vlcProducts.filter(p=>p.is_active!==false);

  const applyPeriod=list=>{
    if(filter==='today') return list.filter(j=>manilaDate(j.transaction_date||j.created_date)===todayStr);
    if(filter==='yesterday'){
      const y=new Date(); y.setDate(y.getDate()-1);
      const yStr=y.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
      return list.filter(j=>manilaDate(j.transaction_date||j.created_date)===yStr);
    }
    if(filter==='7days'){
      const cut=new Date(); cut.setDate(cut.getDate()-6); cut.setHours(0,0,0,0);
      return list.filter(j=>new Date(j.transaction_date||j.created_date)>=cut);
    }
    if(filter==='14days'){
      const cut=new Date(); cut.setDate(cut.getDate()-13); cut.setHours(0,0,0,0);
      return list.filter(j=>new Date(j.transaction_date||j.created_date)>=cut);
    }
    if(filter==='month') return list.filter(j=>{
      const d=new Date(j.transaction_date||j.created_date);
      return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    });
    if(filter==='custom'&&customFrom&&customTo) return list.filter(j=>{
      const s=manilaDate(j.transaction_date||j.created_date); return s>=customFrom&&s<=customTo;
    });
    return list;
  };

  const sorted=[...vlcJobs].sort((a,b)=>new Date(b.transaction_date||b.created_date)-new Date(a.transaction_date||a.created_date));
  const filtered=applyPeriod(sorted.filter(j=>{
    const q=search.toLowerCase();
    return !q||(j.employee_name||'').toLowerCase().includes(q)||(j.vehicle_info||'').toLowerCase().includes(q);
  }));

  const openEdit=j=>{
    const prods=parseArr(j.products_used).map(p=>({id:p.id||'',name:p.name||'',price:p.price||0,cost:p.cost||0}));
    setEditForm({
      customer_name:j.customer_name||'',
      vehicle_info:j.vehicle_info||'',
      employee_id:j.employee_id||'',
      products_used:prods,
      notes:j.notes||'',
      payment_status:j.payment_status||'paid',
    });
    setEditJob(j);
  };

  const addProdToEdit=prod=>{
    setEditForm(f=>({...f,products_used:[...f.products_used,{id:prod.id,name:prod.name,price:prod.price||0,cost:prod.default_cost||0}]}));
  };

  const addEditCustomItem=()=>{
    const name=editCustomName.trim(); if(!name) return;
    const price=parseFloat(editCustomPrice)||0; const cost=parseFloat(editCustomCost)||0;
    setEditForm(f=>({...f,products_used:[...f.products_used,{id:'custom_'+Date.now(),name,price,cost}]}));
    setEditCustomName(''); setEditCustomPrice(''); setEditCustomCost(''); setShowEditCustom(false);
  };
  const removeProdFromEdit=idx=>setEditForm(f=>({...f,products_used:f.products_used.filter((_,i)=>i!==idx)}));
  const updateEditField=(idx,field,val)=>setEditForm(f=>({...f,products_used:f.products_used.map((p,i)=>i===idx?{...p,[field]:parseFloat(val)||0}:p)}));

  const editTotal   = editForm ? editForm.products_used.reduce((s,p)=>s+(p.price||0),0) : 0;
  const editCost    = editForm ? editForm.products_used.reduce((s,p)=>s+(p.cost||0),0)  : 0;
  const editNet     = Math.max(0, editTotal - editCost);
  const editEmp     = editForm ? vlcEmps.find(e=>e.id===editForm.employee_id) : null;
  const editRate    = editEmp ? (editEmp.commission_percentage||40) : 40;
  const editComm    = Math.round(editNet * editRate / 100);

  const handleUpdate=async()=>{
    if(!editForm.employee_id){ showToast('Select an employee','error'); return; }
    if(editForm.products_used.length===0){ showToast('Add at least one product','error'); return; }
    setSaving(true);
    try{
      const data={
        customer_name:      editForm.customer_name||'',
        vehicle_info:       editForm.vehicle_info||'',
        employee_id:        editForm.employee_id,
        employee_name:      editEmp?.full_name||'',
        employees:          [JSON.stringify({id:editForm.employee_id,name:editEmp?.full_name||''})],
        services:           [],
        products_used:      editForm.products_used.map(p=>JSON.stringify(p)),
        commission_splits:  [JSON.stringify({employee_id:editForm.employee_id,name:editEmp?.full_name||'',rate:editRate,amount:editComm})],
        total_product_cost: editCost,
        total_amount:       editTotal,
        net_amount:         editNet,
        amount_paid:        editTotal,
        payment_status:     editForm.payment_status||'paid',
        commission_rate:    editRate,
        commission_amount:  editComm,
        notes:              editForm.notes||'',
      };
      await api('update','VulcanizingJob',{id:editJob.id,data});
      await logEvent({event_type:'vlc_job_updated',title:'Vulcanizing Job Edited',
        description:`${editEmp?.full_name||'—'} · ${editForm.products_used.map(p=>p.name).join(', ')} · ${peso(editTotal)}`,
        actor_name:editEmp?.full_name||'',entity_id:editJob.id,amount:editTotal});
      await onRefresh();
      setEditJob(null); setEditForm(null);
      showToast('Job updated!','success');
    }catch(e){showToast('Update failed: '+e.message,'error');}
    finally{setSaving(false);}
  };

  const doDelete=async()=>{
    if(!confirmDel)return;
    try{
      const j=vlcJobs.find(x=>x.id===confirmDel);
      await api('delete','VulcanizingJob',{id:confirmDel});
      await logEvent({event_type:'vlc_job_deleted',title:'Vulcanizing Job Deleted',
        description:`${j?.vehicle_info||j?.customer_name||'Job'} · ${peso(j?.total_amount||0)}`,
        actor_name:j?.employee_name||'',entity_id:confirmDel,amount:j?.total_amount||0});
      onDelete(confirmDel); showToast('Deleted','success');
    }
    catch(e){ showToast('Delete failed','error'); }
    finally{ setConfirmDel(null); }
  };

  return (
    <div>
      <div className="flex-between mb-3">
        <div className="section-title" style={{marginBottom:0}}>🔧 Vulcanizing Jobs ({filtered.length})</div>
        <div style={{fontSize:12,color:'var(--text2)'}}>{peso(filtered.reduce((s,j)=>s+(j.total_amount||0),0))}</div>
      </div>
      {/* Period filter pills */}
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
        {[{k:'today',l:'Today'},{k:'yesterday',l:'Yesterday'},{k:'7days',l:'7 Days'},{k:'14days',l:'14 Days'},{k:'month',l:'Month'},{k:'all',l:'All'},{k:'custom',l:'Custom'}].map(t=>(
          <button key={t.k} onClick={()=>setFilter(t.k)}
            style={{padding:'6px 14px',borderRadius:20,fontSize:12,fontWeight:700,cursor:'pointer',border:'none',transition:'all .15s',
              background: filter===t.k ? 'var(--red)' : 'rgba(255,255,255,0.06)',
              color:       filter===t.k ? '#fff'       : 'var(--text2)'}}>
            {t.l}
          </button>
        ))}
      </div>
      {filter==='custom'&&(
        <div style={{display:'flex',gap:8,marginBottom:10,alignItems:'center'}}>
          <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)}
            style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontSize:12}}/>
          <span style={{color:'var(--text2)',fontSize:12,fontWeight:700}}>–</span>
          <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)}
            style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontSize:12}}/>
        </div>
      )}
      {/* Search bar */}
      <div style={{position:'relative',marginBottom:12}}>
        <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--text2)',fontSize:13}}>🔍</span>
        <input placeholder="Search vehicle, employee, customer…" value={search} onChange={e=>setSearch(e.target.value)}
          style={{width:'100%',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px 8px 32px',
            color:'var(--text)',fontSize:12,boxSizing:'border-box'}}/>
      </div>
      {/* Summary stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14}}>
        {[
          {l:'Jobs',    v:filtered.length,                                                  c:'var(--red)'},
          {l:'Revenue', v:peso(filtered.reduce((s,j)=>s+(j.total_amount||0),0)),            c:'var(--gold)'},
          {l:'Comm.',   v:peso(filtered.reduce((s,j)=>s+(j.commission_amount||0),0)),       c:'var(--success)'},
        ].map((s,i)=>(
          <div key={i} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 12px',textAlign:'center'}}>
            <div style={{fontSize:16,fontWeight:900,color:s.c}}>{s.v}</div>
            <div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Date / Time</th><th>Employee</th><th>Vehicle</th><th>Products / Services</th><th>Total</th><th>Comm.</th><th>Status</th><th></th></tr></thead>
            <tbody>
              {filtered.length===0
                ? <tr><td colSpan={8} style={{textAlign:'center',padding:28,color:'var(--text2)'}}>No jobs found.</td></tr>
                : filtered.map(j=>{
                    const vEmp = employees.find(e=>e.id===j.employee_id);
                    const isPaid = !j.payment_status || j.payment_status==='paid';
                    const jSplits = parseArr(j.commission_splits);
                    const isTeamJ = jSplits.length > 1;
                    const dispEmpJ = isTeamJ ? {full_name:j.employee_name, avatar_color:'#D4AF37'} : (vEmp||{full_name:j.employee_name});
                    const dispNameJ = isTeamJ ? j.employee_name : (vEmp?.full_name||j.employee_name);
                    const prods = parseArr(j.products_used);
                    return (
                      <tr key={j.id} style={{opacity: isPaid ? 1 : 0.85}}>
                        <td style={{fontSize:11}}>
                          <div style={{fontWeight:600,color:'var(--text)'}}>{new Date(j.transaction_date||j.created_date).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric',timeZone:'Asia/Manila'})}</div>
                          <div style={{color:'var(--text2)',marginTop:1}}>{new Date(j.transaction_date||j.created_date).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Manila'})}</div>
                        </td>
                        <td>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <Av emp={dispEmpJ} size={30} fs={11} />
                            <div>
                              <div style={{fontWeight:800,color:'var(--text)',fontSize:14,lineHeight:1.2}}>{dispNameJ}</div>
                              {isTeamJ && <span style={{fontSize:9,fontWeight:800,background:'rgba(212,175,55,0.18)',color:'var(--gold)',border:'1px solid rgba(212,175,55,0.4)',borderRadius:4,padding:'1px 5px',letterSpacing:.5}}>TEAM</span>}
                            </div>
                          </div>
                        </td>
                        <td style={{fontWeight:700,color:'var(--text)'}}>{j.vehicle_info||j.customer_name||'—'}</td>
                        <td className='hide-xs' style={{color:'var(--text)',fontWeight:500}}>
                          <div>{prods.map(p=>p.name).join(', ')||'—'}</div>
                          {j.total_product_cost>0&&<div style={{fontSize:10,color:'var(--red)',marginTop:1}}>Cost: -{peso(j.total_product_cost||0)}</div>}
                        </td>
                        <td>
                          <div style={{fontWeight:800,color:'var(--gold)',fontSize:14}}>{peso(j.total_amount||0)}</div>
                          {j.net_amount>0&&j.net_amount!==j.total_amount&&<div style={{fontSize:10,color:'var(--text2)'}}>Net: {peso(j.net_amount)}</div>}
                        </td>
                        <td className='hide-xs' style={{color:'var(--success)',fontWeight:700}}>{peso(j.commission_amount||0)}</td>
                        <td>
                          <span style={{
                            display:'inline-block',padding:'3px 9px',borderRadius:20,fontSize:10,fontWeight:800,letterSpacing:.3,
                            background: isPaid ? 'rgba(34,197,94,0.15)'  : 'rgba(217,74,74,0.15)',
                            color:       isPaid ? 'var(--success)'        : 'var(--red)',
                            border:      isPaid ? '1px solid rgba(34,197,94,0.4)' : '1px solid rgba(217,74,74,0.4)'}}>
                            {isPaid ? '✓ PAID' : '✗ UNPAID'}
                          </span>
                        </td>
                        <td>
                          <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
                            {isAdmin && <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(j)} style={{padding:'5px 8px'}} title="Edit">{Ic.edit}</button>}
                            {isAdmin && <button className="btn btn-danger btn-sm" onClick={()=>setConfirmDel(j.id)} style={{padding:'5px 8px'}}>{Ic.trash}</button>}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
            </tbody>
          </table>
        </div>
      </div>

      {/* ── Edit Modal ── */}
      {editJob&&editForm&&(
        <div className="modal-overlay" onClick={()=>{setEditJob(null);setEditForm(null);}}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:520,padding:0,overflow:'hidden',maxHeight:'90vh',display:'flex',flexDirection:'column'}}>
            <div style={{background:'var(--bg2)',padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{fontWeight:800,fontSize:15}}>🔧 Edit Vulcanizing Job</div>
              <button onClick={()=>{setEditJob(null);setEditForm(null);}} style={{background:'none',border:'none',color:'var(--text2)',fontSize:20,cursor:'pointer',lineHeight:1}}>×</button>
            </div>
            <div style={{padding:'16px 20px',overflowY:'auto',flex:1}}>
              {/* Employee */}
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',marginBottom:8}}>EMPLOYEE</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {vlcEmps.map(e=>(
                    <button key={e.id} onClick={()=>setEditForm(f=>({...f,employee_id:e.id}))}
                      style={{padding:'6px 12px',borderRadius:20,border:'2px solid',fontSize:11,fontWeight:700,cursor:'pointer',
                        borderColor:editForm.employee_id===e.id?'var(--red)':'var(--border)',
                        background:editForm.employee_id===e.id?'rgba(217,74,74,0.15)':'transparent',
                        color:editForm.employee_id===e.id?'var(--red)':'var(--text)'}}>
                      {e.full_name}
                    </button>
                  ))}
                </div>
              </div>

              {/* Products */}
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',marginBottom:6}}>PRODUCTS / SERVICES</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
                  {activeProds.map(prod=>(
                    <button key={prod.id} onClick={()=>addProdToEdit(prod)}
                      style={{padding:'5px 10px',borderRadius:20,border:'1px solid var(--border)',fontSize:10,fontWeight:600,
                        background:'rgba(255,255,255,0.04)',color:'var(--text)',cursor:'pointer'}}>
                      + {prod.name} <span style={{color:'var(--success)'}}>₱{prod.price||0}</span>
                    </button>
                  ))}
                </div>
                {/* Custom service */}
                {!showEditCustom
                  ? <button onClick={()=>setShowEditCustom(true)}
                      style={{padding:'5px 12px',borderRadius:20,border:'1px dashed rgba(255,255,255,0.2)',fontSize:10,fontWeight:700,
                        background:'rgba(255,255,255,0.03)',color:'var(--text2)',cursor:'pointer',marginBottom:8}}>
                      ✏️ Custom Service
                    </button>
                  : <div style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:10,padding:'10px 12px',marginBottom:8}}>
                      <div style={{fontSize:10,fontWeight:800,color:'var(--text2)',marginBottom:6}}>CUSTOM SERVICE</div>
                      <input placeholder="Service name" value={editCustomName} onChange={e=>setEditCustomName(e.target.value)}
                        style={{width:'100%',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 10px',
                          color:'var(--text)',fontSize:12,boxSizing:'border-box',marginBottom:6}}/>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:8}}>
                        <input type="number" placeholder="Price ₱" value={editCustomPrice} onChange={e=>setEditCustomPrice(e.target.value)}
                          style={{background:'var(--bg)',border:'1px solid rgba(34,197,94,0.4)',borderRadius:8,padding:'6px 8px',
                            color:'var(--success)',fontSize:12,fontWeight:800,textAlign:'center',boxSizing:'border-box',width:'100%'}}/>
                        <input type="number" placeholder="Cost ₱" value={editCustomCost} onChange={e=>setEditCustomCost(e.target.value)}
                          style={{background:'var(--bg)',border:'1px solid rgba(217,74,74,0.4)',borderRadius:8,padding:'6px 8px',
                            color:'var(--red)',fontSize:12,fontWeight:800,textAlign:'center',boxSizing:'border-box',width:'100%'}}/>
                      </div>
                      <div style={{display:'flex',gap:6}}>
                        <button onClick={()=>{setShowEditCustom(false);setEditCustomName('');setEditCustomPrice('');setEditCustomCost('');}}
                          style={{flex:1,padding:'7px 0',borderRadius:8,border:'1px solid var(--border)',background:'transparent',color:'var(--text2)',fontSize:11,fontWeight:700,cursor:'pointer'}}>
                          Cancel
                        </button>
                        <button onClick={addEditCustomItem} disabled={!editCustomName.trim()}
                          style={{flex:2,padding:'7px 0',borderRadius:8,border:'none',
                            background: editCustomName.trim()?'var(--red)':'rgba(255,255,255,0.08)',
                            color: editCustomName.trim()?'#fff':'var(--text2)',fontSize:12,fontWeight:800,
                            cursor: editCustomName.trim()?'pointer':'default'}}>
                          ✚ Add
                        </button>
                      </div>
                    </div>
                }
                {editForm.products_used.length>0&&(
                  <div style={{borderTop:'1px solid var(--border)',paddingTop:8}}>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 68px 68px 20px',gap:4,marginBottom:4,padding:'0 2px'}}>
                      <span style={{fontSize:10,color:'var(--text2)',fontWeight:700}}>ITEM</span>
                      <span style={{fontSize:10,color:'var(--success)',fontWeight:700,textAlign:'center'}}>PRICE</span>

                    </div>

                            padding:'3px 5px',color:'var(--success)',fontSize:12,textAlign:'right',fontWeight:700}}/>
                        <input type="number" value={p.cost} onChange={e=>updateEditField(i,'cost',e.target.value)}

                      </div>
                    ))}
                  </div>
                )}

              {/* Details */}
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',marginBottom:8}}>DETAILS</div>
                <input placeholder="Vehicle info" value={editForm.vehicle_info}
                  onChange={e=>setEditForm(f=>({...f,vehicle_info:e.target.value}))}
                  style={{width:'100%',marginBottom:8,background:'var(--bg)',border:'1px solid var(--border)',
                    borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13,boxSizing:'border-box'}}/>
                <input placeholder="Customer name (optional)" value={editForm.customer_name}
                  onChange={e=>setEditForm(f=>({...f,customer_name:e.target.value}))}
                  style={{width:'100%',marginBottom:8,background:'var(--bg)',border:'1px solid var(--border)',
                    borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13,boxSizing:'border-box'}}/>
                <input placeholder="Notes (optional)" value={editForm.notes}
                  onChange={e=>setEditForm(f=>({...f,notes:e.target.value}))}
                  style={{width:'100%',background:'var(--bg)',border:'1px solid var(--border)',
                    borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13,boxSizing:'border-box'}}/>
                {/* Payment status */}
                <div style={{display:'flex',gap:8,marginTop:10}}>
                  {[{v:'paid',label:'✅ PAID',bg:'rgba(34,197,94,0.18)',c:'var(--success)',b:'rgba(34,197,94,0.4)'},
                    {v:'unpaid',label:'❌ UNPAID',bg:'rgba(217,74,74,0.18)',c:'var(--red)',b:'rgba(217,74,74,0.4)'}].map(opt=>{
                    const sel=editForm.payment_status===opt.v;
                    return(
                      <button key={opt.v} onClick={()=>setEditForm(f=>({...f,payment_status:opt.v}))}
                        style={{flex:1,padding:'9px 0',borderRadius:10,border:'none',cursor:'pointer',fontWeight:800,fontSize:12,transition:'all .2s',
                          background: sel ? opt.bg : 'rgba(255,255,255,0.05)',
                          color:       sel ? opt.c  : 'var(--text2)',
                          outline:     sel ? `2px solid ${opt.b}` : '2px solid transparent'}}>
                        {opt.label}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Live summary */}
              {editForm.products_used.length>0&&(
                <div style={{background:'rgba(212,175,55,0.06)',border:'1px solid rgba(212,175,55,0.2)',borderRadius:12,padding:'12px 16px',marginBottom:14}}>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                    {[
                      {l:'Total Charge',   v:peso(editTotal),  c:'var(--text)'},
                      {l:'Material Cost',  v:`- ${peso(editCost)}`, c:'var(--red)'},
                      {l:'Net Amount',     v:peso(editNet),    c:'var(--gold)'},
                      {l:`Commission (${editRate}%)`,v:peso(editComm),c:'var(--success)'},
                    ].map((x,i)=>(
                      <div key={i} style={{textAlign:'center',padding:'6px 4px'}}>
                        <div style={{fontSize:15,fontWeight:900,color:x.c}}>{x.v}</div>
                        <div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>{x.l}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
            <div style={{padding:'12px 20px',borderTop:'1px solid var(--border)',display:'flex',gap:10,background:'var(--bg2)'}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>{setEditJob(null);setEditForm(null);}}>Cancel</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={handleUpdate} disabled={saving}>
                {saving?'Saving…':'Save Changes'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Delete Confirm ── */}
      {confirmDel&&(
        <div className="modal-overlay" onClick={()=>setConfirmDel(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:340,textAlign:'center'}}>
            <div style={{fontSize:36,marginBottom:8}}>🗑️</div>
            <div style={{fontSize:16,fontWeight:800,marginBottom:6}}>Delete this job?</div>
            <div style={{fontSize:13,color:'var(--text2)',marginBottom:20}}>This cannot be undone.</div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setConfirmDel(null)}>Cancel</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={doDelete}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── VlcRanking (in-app preview) ── */
function VlcRanking({ vlcJobs, employees }) {
  const vlcEmps=employees.filter(e=>e.business_type==='vulcanizing');
  const now=new Date();
  const board=vlcEmps.map(e=>{
    const jobs=vlcJobs.filter(j=>j.employee_id===e.id);
    const monthJobs=jobs.filter(j=>{const d=new Date(j.transaction_date||j.created_date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});

      jobs:monthJobs.length,sales:monthJobs.reduce((s,j)=>s+(j.total_amount||0),0),
      comm:monthJobs.reduce((s,j)=>s+(j.commission_amount||0),0)};

  return (
    <div>
      <div className="flex-between mb-4">
        <div className="section-title" style={{marginBottom:0}}>🏆 Vulcanizing Rankings — {now.toLocaleString('en-PH',{month:'long',year:'numeric',timeZone:'Asia/Manila'})}</div>

        ? <div className="card" style={{textAlign:'center',padding:40,color:'var(--text2)'}}>No data yet this month</div>
        : board.map((e,i)=>{
          const medals=['🥇','🥈','🥉'];
          return(
            <div key={e.id} className="card" style={{marginBottom:8,padding:'14px 16px',display:'flex',alignItems:'center',gap:14,
              border:i===0?'1px solid rgba(212,175,55,0.4)':undefined}}>

                <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{e.jobs} job{e.jobs!==1?'s':''} · {peso(e.sales)}</div>

                <div style={{fontWeight:800,color:'var(--gold)',fontSize:14}}>{peso(e.comm)}</div>

/* ── VlcReports ── */
function VlcReports({ vlcJobs, employees, payouts, showToast }) {
  const now = new Date();
  const vlcEmps = employees.filter(e=>e.business_type==='vulcanizing');
  const [period, setPeriod]       = React.useState('month');
  const [customFrom, setCustomFrom] = React.useState('');
  const [customTo,   setCustomTo]   = React.useState('');

  const getFiltered = () => {
    const t = new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
    if (period==='today')  return vlcJobs.filter(j=>new Date(j.transaction_date||j.created_date).toLocaleDateString('en-CA',{timeZone:'Asia/Manila'})===t);
    if (period==='7days')  return vlcJobs.filter(j=>new Date(j.transaction_date||j.created_date)>=new Date(now-7*86400000));
    if (period==='month')  return vlcJobs.filter(j=>{const d=new Date(j.transaction_date||j.created_date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
    if (period==='custom'&&customFrom&&customTo) {
      const from=new Date(customFrom+'T00:00:00'), to=new Date(customTo+'T23:59:59');
      return vlcJobs.filter(j=>{const d=new Date(j.transaction_date||j.created_date);return d>=from&&d<=to;});
    }
    return vlcJobs;
  };

  const filtered   = getFiltered();
  const tRevenue   = filtered.reduce((s,j)=>s+(j.total_amount||0),0);
  const tCost      = filtered.reduce((s,j)=>s+(j.total_product_cost||0),0);
  const tNet       = filtered.reduce((s,j)=>s+(j.net_amount||0),0);
  const tComm      = filtered.reduce((s,j)=>s+(j.commission_amount||0),0);

  // Per-employee breakdown
  const empStats = vlcEmps.map(e=>{
    const jobs = filtered.filter(j=>j.employee_id===e.id);
    const earned = jobs.reduce((s,j)=>s+(j.commission_amount||0),0);
    const paid   = (payouts||[]).filter(p=>p.employee_id===e.id).reduce((s,p)=>s+(p.amount||0),0);
    return {...e, jobs:jobs.length, revenue:jobs.reduce((s,j)=>s+(j.total_amount||0),0), earned, paid, balance:earned-paid};
  }).filter(e=>e.jobs>0).sort((a,b)=>b.jobs-a.jobs);

  // Product popularity
  const prodMap = {};
  filtered.forEach(j=>parseArr(j.products_used).forEach(p=>{
    const key = p.name||p.id||'?';
    if (!prodMap[key]) prodMap[key]={name:key,count:0,revenue:0,cost:0};
    prodMap[key].count++;
    prodMap[key].revenue+=(p.price||0);
    prodMap[key].cost+=(p.cost||0);
  }));
  const prodRows = Object.values(prodMap).sort((a,b)=>b.count-a.count);

  const exportCSV = () => {
    const rows = [
      ['Date','Employee','Vehicle','Customer','Products','Total','Product Cost','Net','Commission','Notes'],
      ...filtered.map(j=>[
        (j.transaction_date||j.created_date||'').slice(0,10),
        j.employee_name||'',
        j.vehicle_info||'',
        j.customer_name||'',
        parseArr(j.products_used).map(p=>p.name).join('; '),
        j.total_amount||0,
        j.total_product_cost||0,
        j.net_amount||0,
        j.commission_amount||0,
        j.notes||''
      ])
    ];
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));
    a.download=`vlc-report-${new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'})}.csv`;
    a.click();
    showToast('CSV exported!','success');
  };

  const periodLabel={today:'Today','7days':'Last 7 Days',month:'This Month',custom:'Custom Range'}[period];

  return (
    <div>
      {/* Header */}
      <div className="flex-between mb-4" style={{flexWrap:'wrap',gap:10}}>
        <div className="section-title" style={{marginBottom:0}}>📊 Vulcanizing Reports</div>
        <button className="btn btn-ghost btn-sm" onClick={exportCSV}>Export CSV</button>
      </div>

      {/* Period tabs */}
      <div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}}>
        {[{key:'today',label:'Day'},{key:'7days',label:'7 Days'},{key:'month',label:'Month'},{key:'custom',label:'Custom'}].map(t=>(
          <button key={t.key}
            className={`btn ${period===t.key?'btn-primary':'btn-ghost'} btn-sm`}
            onClick={()=>setPeriod(t.key)}>{t.label}
          </button>
        ))}
      </div>
      {period==='custom'&&(
        <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
          <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)}
            style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 10px',color:'var(--text)',fontSize:12}}/>
          <span style={{color:'var(--text2)',alignSelf:'center'}}>to</span>
          <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)}
            style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 10px',color:'var(--text)',fontSize:12}}/>
        </div>
      )}

      {/* Summary cards */}
      <div className="stats-grid" style={{marginBottom:20}}>
        {[
          {label:'Jobs',          value:filtered.length,  sub:periodLabel,          cls:'stat-red',    color:'var(--red)'},
          {label:'Total Revenue', value:peso(tRevenue),   sub:`Cost: -${peso(tCost)}`,cls:'stat-green', color:'var(--success)'},
          {label:'Net Amount',    value:peso(tNet),       sub:'After product costs', cls:'stat-yellow', color:'var(--gold)'},
          {label:'Commission',    value:peso(tComm),      sub:'All employees',       cls:'stat-gray',   color:'var(--silver)'},
        ].map((s,i)=>(
          <div key={i} className={`stat-card ${s.cls}`}>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value" style={{color:s.color}}>{s.value}</div>
            <div className="stat-sub">{s.sub}</div>
          </div>
        ))}
      </div>

      {/* Employee breakdown */}
      <div className="section-title" style={{marginBottom:10}}>Employee Breakdown</div>
      {empStats.length===0
        ? <div className="card" style={{textAlign:'center',padding:28,color:'var(--text2)',marginBottom:16}}>No data for this period</div>
        : empStats.map(e=>(
          <div key={e.id} className="card" style={{marginBottom:10,padding:'14px 16px'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
              <Av emp={e} size={38} fs={13} />
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14}}>{e.full_name}</div>
                <div style={{fontSize:11,color:'var(--text2)'}}>{e.jobs} job{e.jobs!==1?'s':''} · {peso(e.revenue)} revenue</div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,textAlign:'center'}}>
              {[
                {l:'Earned',  v:peso(e.earned),  c:'var(--gold)'},
                {l:'Paid Out',v:peso(e.paid),     c:'var(--success)'},
                {l:'Balance', v:peso(e.balance),  c:e.balance>0?'var(--red)':'var(--text2)'},
              ].map((x,i)=>(
                <div key={i} style={{background:'var(--glass,rgba(255,255,255,0.04))',borderRadius:8,padding:'8px 4px'}}>
                  <div style={{fontWeight:800,color:x.c,fontSize:14}}>{x.v}</div>
                  <div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>{x.l}</div>
                </div>
              ))}
            </div>
          </div>
        ))}

      {/* Product popularity */}
      {prodRows.length>0&&(
        <>
          <div className="section-title" style={{marginBottom:10,marginTop:4}}>Product Usage</div>
          <div className="card" style={{padding:'4px 0'}}>
            {prodRows.map((p,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 16px',borderBottom:i<prodRows.length-1?'1px solid var(--border)':'none'}}>
                <div style={{width:28,height:28,borderRadius:8,background:'rgba(217,74,74,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0}}>🔩</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13}}>{p.name}</div>
                  <div style={{fontSize:11,color:'var(--text2)'}}>{p.count} use{p.count!==1?'s':''}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontWeight:700,color:'var(--gold)',fontSize:13}}>{peso(p.revenue)}</div>
                  <div style={{fontSize:10,color:'var(--red)'}}>cost: {peso(p.cost)}</div>
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

/* ── VlcActivityLogs ── */
function VlcActivityLogs({ logs=[], employees=[], onRefresh }) {
  const [filter, setFilter] = React.useState('all');
  const [search, setSearch] = React.useState('');

  const vlcTypes = ['vlc_job_created','vlc_job_updated','vlc_job_deleted'];

  // Only show vlc-related logs
  const vlcLogs = logs.filter(l=>
    vlcTypes.includes(l.event_type) ||
    (l.event_type||'').startsWith('vlc_')
  );

  const typeConfig = {
    vlc_job_created: { label:'New Job',    color:'#60A5FA', bg:'rgba(96,165,250,.12)', icon:'🔧' },
    vlc_job_updated: { label:'Job Edited', color:'#F59E0B', bg:'rgba(245,158,11,.1)',  icon:'✏️' },
    vlc_job_deleted: { label:'Job Deleted',color:'var(--red)', bg:'rgba(217,74,74,.08)', icon:'🗑️' },
  };

  const sorted = [...vlcLogs].sort((a,b)=>new Date(b.created_date)-new Date(a.created_date));

  const filtered = sorted.filter(l=>{
    if (filter!=='all' && l.event_type!==filter) return false;
    if (search) {
      const q=search.toLowerCase();
      return (l.title||'').toLowerCase().includes(q)||(l.description||'').toLowerCase().includes(q)||(l.actor_name||'').toLowerCase().includes(q);
    }
    return true;
  });

  const fmtAgo = d => {
    if (!d) return '';
    // Force UTC parse — Base44 returns dates without Z suffix
    const utc = s => new Date(typeof s==='string'&&!s.endsWith('Z')&&!s.includes('+') ? s+'Z' : s);
    const diff=Date.now()-utc(d).getTime();
    const mins=Math.floor(diff/60000), hours=Math.floor(diff/3600000);
    const todayMNL = new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
    const entryMNL = utc(d).toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
    if (mins<1) return 'just now';
    if (mins<60) return `${mins}m ago`;
    if (todayMNL===entryMNL) return `${hours}h ago`;
    return utc(d).toLocaleString('en-PH',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Manila'});
  };

  const todayCount  = sorted.filter(l=>utcDate(l.created_date||0).toLocaleDateString('en-CA',{timeZone:'Asia/Manila'})===new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'})).length;
  const createdCount= sorted.filter(l=>l.event_type==='vlc_job_created').length;
  const editCount   = sorted.filter(l=>l.event_type==='vlc_job_updated').length;
  const totalRev    = sorted.filter(l=>l.event_type==='vlc_job_created').reduce((s,l)=>s+(l.amount||0),0);

  const categories = [
    {key:'all',             label:'All'},
    {key:'vlc_job_created', label:'New Jobs'},
    {key:'vlc_job_updated', label:'Edits'},
    {key:'vlc_job_deleted', label:'Deleted'},
  ];

  return (
    <div>
      <div className="flex-between mb-4">
        <div className="section-title" style={{marginBottom:0}}>🔧 Activity Log — Vulcanizing</div>
        <div style={{fontSize:12,color:'var(--text2)'}}>{filtered.length} of {vlcLogs.length} events</div>
      </div>

      {/* Stats strip */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
        {[
          {l:'Today',    v:todayCount,        c:'#60A5FA'},
          {l:'Jobs Rec.',v:createdCount,      c:'var(--success)'},
          {l:'Edits',    v:editCount,         c:'#F59E0B'},
          {l:'Revenue',  v:peso(totalRev),    c:'var(--gold)'},
        ].map((s,i)=>(
          <div key={i} className="card" style={{textAlign:'center',padding:'12px 8px'}}>
            <div style={{fontSize:18,fontWeight:900,color:s.c}}>{s.v}</div>
            <div style={{fontSize:10,color:'var(--text2)',marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* Filter chips */}
      <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
        {categories.map(c=>(
          <button key={c.key} className={`btn btn-sm ${filter===c.key?'btn-primary':'btn-ghost'}`}
            onClick={()=>setFilter(c.key)}>{c.label}</button>
        ))}
      </div>

      {/* Search */}
      <div className="form-group mb-4" style={{position:'relative'}}>
        <div style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--text2)',width:15,height:15}}>{Ic.search}</div>
        <input className="form-input" placeholder="Search logs..." value={search}
          onChange={e=>setSearch(e.target.value)} style={{paddingLeft:34}}/>
      </div>

      {/* Log feed */}
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        {filtered.length===0 ? (
          <div style={{textAlign:'center',padding:'40px 24px',color:'var(--text2)'}}>
            <div style={{fontSize:40,marginBottom:10,opacity:.3}}>🔧</div>
            <div style={{fontWeight:700}}>No vulcanizing activity yet</div>
            <div style={{fontSize:13,marginTop:4}}>Events are logged as jobs are recorded, edited, or deleted</div>
          </div>
        ) : filtered.map((log,i)=>{
          const cfg = typeConfig[log.event_type] || {label:log.event_type,color:'var(--text2)',bg:'rgba(255,255,255,.04)',icon:'📋'};
          return (
            <div key={log.id||i} style={{
              display:'flex',alignItems:'flex-start',gap:12,padding:'14px 16px',
              borderBottom:i<filtered.length-1?'1px solid var(--border)':'none',
              background:'transparent',transition:'background .15s',
            }}

/* ── VlcProducts — manage the products list (PP1, Sealant, etc.) ── */
function VlcProducts({ vlcProducts, showToast, onRefresh }) {
  const emptyForm = {name:'',price:0,default_cost:0,description:'',is_active:true};
  const [showModal,setShowModal]=React.useState(false);
  const [editing,setEditing]=React.useState(null);
  const [form,setForm]=React.useState(emptyForm);
  const [saving,setSaving]=React.useState(false);
  const [confirmDel,setConfirmDel]=React.useState(null);

  const openAdd=()=>{setForm(emptyForm);setEditing(null);setShowModal(true);};
  const openEdit=p=>{setForm({name:p.name,price:p.price||0,default_cost:p.default_cost||0,description:p.description||'',is_active:p.is_active!==false});setEditing(p);setShowModal(true);};

  // Computed net = price - cost
  const net = Math.max(0, parseFloat(form.price||0) - parseFloat(form.default_cost||0));

  const handleSave=async()=>{
    if(!form.name.trim()){showToast('Product name required','error');return;}
    const price = parseFloat(form.price)||0;
    const cost  = parseFloat(form.default_cost)||0;
    if(cost > price) return showToast('Cost cannot exceed price','warning');
    setSaving(true);
    try{
      const data={name:form.name.trim(),price,default_cost:cost,description:form.description,is_active:form.is_active};
      if(editing){
        await api('update','VulcanizingProduct',{id:editing.id,data});
        showToast('Product updated','success');
      } else {
        await api('create','VulcanizingProduct',{data});
        showToast('Product added','success');
      }
      setShowModal(false); onRefresh();
    } catch(e){showToast('Save failed: '+e.message,'error');}
    finally{setSaving(false);}
  };

  const handleDelete=async()=>{
    if(!confirmDel)return;
    try{ await api('delete','VulcanizingProduct',{id:confirmDel}); showToast('Deleted','success'); onRefresh(); }
    catch(e){ showToast('Delete failed','error'); }
    finally{ setConfirmDel(null); }
  };

  const active=vlcProducts.filter(p=>p.is_active!==false);
  const inactive=vlcProducts.filter(p=>p.is_active===false);

  const inp={width:'100%',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,
    padding:'9px 12px',color:'var(--text)',fontSize:13,boxSizing:'border-box'};

  return (

          {list.map(p=>{

            <div key={p.id} className="card" style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',marginBottom:8}}>
              <div style={{width:40,height:40,borderRadius:12,background:'rgba(212,175,55,0.15)',

              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14}}>{p.name}</div>
                <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{p.description||'No description'}</div>
                <div style={{display:'flex',gap:10,marginTop:4,flexWrap:'wrap'}}>
                  <span style={{fontSize:11,background:'rgba(34,197,94,0.12)',color:'var(--success)',borderRadius:6,padding:'2px 7px'}}>Price ₱{p.price||0}</span>

              <span style={{fontSize:18,fontWeight:900,color:'var(--gold)'}}>₱{net.toLocaleString()} net</span>

const KG_GOLD   = '#D4AF37';
const KG_GOLD2  = '#B8960C';

const manilaToday = () => new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
const toYM = d => { if (!d) return ''; const dt = typeof d==='string'&&!d.endsWith('Z')&&!d.includes('+')?new Date(d+'Z'):new Date(d); return dt.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}).slice(0,7); };
const toManilaDate = d => { if (!d) return ''; const dt = typeof d==='string'&&!d.endsWith('Z')&&!d.includes('+')?new Date(d+'Z'):new Date(d); return dt.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}); };
const workingDaysThisMonth = () => {
  const n=new Date(); const y=n.getFullYear(); const m=n.getMonth();
  const days=new Date(y,m+1,0).getDate();
  let count=0;
  for(let d=1;d<=days;d++){const dow=new Date(y,m,d).getDay();if(dow!==0)count++;}
  return count;
};

function KgEmployees({ employees=[], kgWorkOrders=[], kgAbsences=[], payouts=[], showToast, onRefresh, isAdmin=true }) {
