<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KGCAR Carwash — Sales Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #D94A4A;
      --red-hover: #C63E3E;
      --red-dark: #B83030;
      --gold: #D4AF37;
      --silver: #B8BCC2;
      --bronze: #B87333;
      --bg: #1E1E22;
      --bg2: #2B2B31;
      --bg3: #3A3A42;
      --card: rgba(43,43,49,0.95);
      --glass: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
      --text: #F7F7F7;
      --text2: #7A7A85;
      --success: #22C55E;
      --danger: #D94A4A;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--red); border-radius:2px; }

    @keyframes fadeIn    { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideUp   { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    @keyframes popIn     { 0%{transform:scale(.5);opacity:0} 60%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
    @keyframes pulse     { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    @keyframes pulseDot  { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes float     { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes shimmer   { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    @keyframes countUp   { from{transform:scale(1.4);opacity:0} to{transform:scale(1);opacity:1} }
    @keyframes gapPulse  { 0%,100%{opacity:1} 50%{opacity:.6} }
    @keyframes rankSlide { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
    @keyframes podiumRise { from{transform:scaleY(0);opacity:0} to{transform:scaleY(1);opacity:1} }
    @keyframes crownBob  { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-4px) rotate(5deg)} }

    /* ── LAYOUT ── */
    .app { display:flex; min-height:100vh; }
    .sidebar {
      width:260px; background:var(--bg2); border-right:1px solid var(--border);
      display:flex; flex-direction:column; position:fixed; height:100vh; z-index:100;
      transition:transform .3s ease;
    }
    .sidebar.closed { transform:translateX(-260px); }
    .sidebar-logo {
      padding:22px 20px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:12px;
    }
    .logo-icon {
      width:40px; height:40px; background:var(--red); border-radius:12px;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .logo-icon svg { width:22px; height:22px; fill:white; }
    .logo-text { font-size:15px; font-weight:800; }
    .logo-sub  { font-size:11px; color:var(--text2); font-weight:500; }
    .nav { flex:1; padding:14px 10px; overflow-y:auto; }
    .nav-section { margin-bottom:6px; }
    .nav-label { font-size:10px; font-weight:700; color:var(--text2); letter-spacing:1px; padding:8px 8px 4px; text-transform:uppercase; }
    .nav-item {
      display:flex; align-items:center; gap:10px;
      padding:10px 12px; border-radius:10px; cursor:pointer; color:var(--text2);
      font-size:13px; font-weight:500; transition:all .2s; margin-bottom:2px;
    }
    .nav-item:hover { background:var(--glass); color:var(--text); }
    .nav-item.active { background:rgba(217,74,74,0.18); color:var(--red); border:1px solid rgba(217,74,74,0.3); }
    .nav-icon { width:18px; height:18px; flex-shrink:0; }
    .nav-icon svg { width:18px; height:18px; }
    .sidebar-footer { padding:14px; border-top:1px solid var(--border); }
    .main { flex:1; margin-left:260px; min-height:100vh; display:flex; flex-direction:column; transition:margin-left .3s; }
    .topbar {
      background:rgba(30,30,34,.97); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border); padding:0 24px; height:62px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:50;
    }
    .topbar-left  { display:flex; align-items:center; gap:14px; }
    .topbar-right { display:flex; align-items:center; gap:10px; }
    .menu-btn {
      width:36px; height:36px; background:var(--glass); border:1px solid var(--border);
      border-radius:8px; display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all .2s;
    }
    .menu-btn:hover { background:rgba(255,255,255,.1); }
    .menu-btn svg { width:16px; height:16px; stroke:var(--text2); }
    .page-title { font-size:17px; font-weight:700; }
    .live-badge {
      display:flex; align-items:center; gap:5px;
      background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.25);
      border-radius:20px; padding:4px 11px; font-size:11px; font-weight:600; color:var(--success);
    }
    .live-dot { width:6px; height:6px; background:var(--success); border-radius:50%; animation:pulseDot 1.5s infinite; }
    .page-content { flex:1; padding:22px; max-width:1400px; width:100%; }

    /* ── CARDS ── */
    .card {
      background:var(--card); backdrop-filter:blur(20px);
      border:1px solid var(--border); border-radius:16px; padding:20px;
      animation:fadeIn .4s ease;
    }

    /* ── STAT CARDS ── */
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:22px; }
    .stat-card {
      background:var(--glass); border:1px solid var(--border); border-radius:16px;
      padding:18px; position:relative; overflow:hidden;
      animation:fadeIn .4s ease; transition:transform .2s, box-shadow .2s;
    }
    .stat-card:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,.3); }
    .stat-card::before {
      content:''; position:absolute; top:0; right:0;
      width:70px; height:70px; border-radius:50%;
    }
    .stat-label { font-size:11px; color:var(--text2); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
    .stat-value { font-size:24px; font-weight:800; }
    .stat-sub   { font-size:11px; color:var(--text2); margin-top:4px; }
    .stat-red    { border-color:rgba(217,74,74,.3); }
    .stat-red::before    { background:radial-gradient(circle,rgba(217,74,74,.2),transparent); }
    .stat-green  { border-color:rgba(34,197,94,.3); }
    .stat-green::before  { background:radial-gradient(circle,rgba(34,197,94,.2),transparent); }
    .stat-yellow { border-color:rgba(212,175,55,.3); }
    .stat-yellow::before { background:radial-gradient(circle,rgba(212,175,55,.2),transparent); }
    .stat-gray   { border-color:rgba(184,188,194,.25); }
    .stat-gray::before   { background:radial-gradient(circle,rgba(184,188,194,.15),transparent); }

    /* ── BUTTONS ── */
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:7px;
      padding:11px 20px; border-radius:10px; font-size:13px; font-weight:600;
      cursor:pointer; border:none; outline:none; transition:all .2s; font-family:inherit;
    }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .btn svg { width:15px; height:15px; }
    .btn-primary { background:var(--red); color:#fff; }
    .btn-primary:hover:not(:disabled) { background:var(--red-hover); transform:translateY(-1px); box-shadow:0 4px 16px rgba(217,74,74,.4); }
    .btn-success { background:var(--success); color:#fff; }
    .btn-success:hover:not(:disabled) { background:#16a34a; transform:translateY(-1px); }
    .btn-danger  { background:rgba(217,74,74,.15); color:var(--red); border:1px solid rgba(217,74,74,.2); }
    .btn-danger:hover:not(:disabled)  { background:rgba(217,74,74,.25); }
    .btn-ghost   { background:var(--glass); color:var(--text2); border:1px solid var(--border); }
    .btn-ghost:hover:not(:disabled)   { background:rgba(255,255,255,.1); color:var(--text); }
    .btn-sm  { padding:7px 14px; font-size:12px; border-radius:8px; }
    .btn-lg  { padding:14px 26px; font-size:15px; border-radius:12px; }
    .btn-xl  { padding:16px 24px; font-size:16px; font-weight:800; border-radius:14px; width:100%; }

    /* ── FORMS ── */
    .form-group { margin-bottom:14px; }
    .form-label { font-size:11px; font-weight:700; color:var(--text2); margin-bottom:5px; display:block; letter-spacing:.3px; text-transform:uppercase; }
    .form-input {
      width:100%; background:var(--glass); border:1px solid var(--border); border-radius:10px;
      padding:11px 13px; color:var(--text); font-size:13px; font-family:inherit;
      transition:border-color .2s; outline:none;
    }
    .form-input:focus { border-color:var(--red); box-shadow:0 0 0 3px rgba(217,74,74,.1); }
    .form-input::placeholder { color:var(--text2); }
    select.form-input { cursor:pointer; }
    select.form-input option { background:var(--bg2); }

    /* ── SERVICE SELECTOR ── */
    .service-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .service-item {
      background:var(--glass); border:1.5px solid var(--border); border-radius:12px;
      padding:13px; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:10px;
    }
    .service-item:hover   { border-color:rgba(217,74,74,.4); background:rgba(217,74,74,.04); }
    .service-item.selected { border-color:var(--red); background:rgba(217,74,74,.12); }
    .svc-check {
      width:19px; height:19px; border:1.5px solid var(--border); border-radius:5px;
      display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s;
    }
    .service-item.selected .svc-check { background:var(--red); border-color:var(--red); }
    .svc-check svg { width:11px; height:11px; stroke:#fff; display:none; }
    .service-item.selected .svc-check svg { display:block; }
    .svc-name  { font-size:13px; font-weight:600; }
    .svc-price { font-size:12px; color:var(--gold); font-weight:700; }

    /* ── EMPLOYEE PICKER ── */
    .emp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; }
    .emp-card {
      background:var(--glass); border:1.5px solid var(--border); border-radius:14px;
      padding:16px 12px; cursor:pointer; text-align:center; transition:all .2s; display:flex; flex-direction:column; align-items:center;
    }
    .emp-card:hover   { transform:translateY(-2px); box-shadow:0 4px 20px rgba(0,0,0,.3); }
    .emp-card.selected { border-color:var(--red); background:rgba(217,74,74,.12); }
    .emp-avatar {
      width:48px; height:48px; border-radius:50%; display:flex; align-items:center;
      justify-content:center; font-size:17px; font-weight:800; margin:0 auto 8px; overflow:hidden;
    }
    .emp-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .emp-name { font-size:13px; font-weight:700; }
    .emp-comm { font-size:11px; color:var(--gold); font-weight:600; margin-top:2px; }

    /* ── SUMMARY BOX ── */
    .summary-box {
      background:rgba(217,74,74,.08); border:1px solid rgba(217,74,74,.2); border-radius:14px; padding:16px;
    }
    .summary-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; }
    .summary-row + .summary-row { border-top:1px solid rgba(255,255,255,.05); }
    .summary-row .lbl { font-size:13px; color:var(--text2); }
    .summary-row .val { font-size:14px; font-weight:700; }

    /* ── TABLE ── */
    .table-wrap { overflow-x:auto; border-radius:12px; }
    table { width:100%; border-collapse:collapse; }
    thead tr { background:rgba(255,255,255,.04); }
    th { padding:11px 14px; text-align:left; font-size:10px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; }
    td { padding:11px 14px; font-size:12px; border-top:1px solid var(--border); }
    tr:hover td { background:rgba(255,255,255,.02); }

    /* ── BADGES ── */
    .badge { display:inline-flex; align-items:center; padding:3px 9px; border-radius:20px; font-size:10px; font-weight:700; }
    .badge-green  { background:rgba(34,197,94,.15);  color:var(--success); }
    .badge-red    { background:rgba(217,74,74,.15);   color:var(--red); }
    .badge-gold   { background:rgba(212,175,55,.15);  color:var(--gold); }
    .badge-gray   { background:rgba(255,255,255,.06); color:var(--text2); }

    /* ── TABS ── */
    .tabs { display:flex; gap:3px; background:var(--glass); border:1px solid var(--border); border-radius:12px; padding:4px; margin-bottom:20px; }
    .tab  { flex:1; padding:8px; text-align:center; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600; color:var(--text2); transition:all .2s; }
    .tab.active { background:var(--red); color:#fff; }

    /* ── MODAL ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:200; padding:16px; }
    .modal { background:var(--bg2); border:1px solid var(--border); border-radius:20px; padding:24px; width:100%; max-width:460px; max-height:90vh; overflow-y:auto; animation:popIn .3s ease; }
    .modal-title { font-size:17px; font-weight:800; margin-bottom:18px; display:flex; align-items:center; gap:8px; }

    /* ── SUCCESS OVERLAY ── */
    .success-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:center; z-index:1000; }
    .success-card {
      background:var(--bg2); border:1px solid var(--border); border-radius:24px;
      padding:38px 32px; text-align:center; max-width:310px; width:90%;
      animation:popIn .4s cubic-bezier(.175,.885,.32,1.275);
    }

    /* ── TOAST ── */
    .toast {
      position:fixed; bottom:20px; right:20px; z-index:500;
      background:var(--bg2); border:1px solid var(--border); border-radius:12px;
      padding:13px 18px; font-size:12px; font-weight:600;
      display:flex; align-items:center; gap:8px;
      animation:slideUp .3s ease; box-shadow:0 8px 32px rgba(0,0,0,.4);
    }
    .toast-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

    /* ── PROGRESS ── */
    .progress-bar  { height:5px; background:var(--glass); border-radius:3px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:3px; transition:width .6s ease; }

    /* ── HERO ── */
    .hero-header {
      background:var(--card); border:1px solid var(--border); border-radius:16px;
      padding:22px; margin-bottom:22px; animation:fadeIn .4s ease; position:relative; overflow:hidden;
    }
    .hero-header::before {
      content:''; position:absolute; top:-40px; right:-40px;
      width:180px; height:180px;
      background:radial-gradient(circle,rgba(217,74,74,.12),transparent); border-radius:50%;
    }

    /* ── GAMIFIED RANKING ── */
    .rank-tabs { display:flex; gap:3px; background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:14px; padding:5px; margin-bottom:24px; }
    .rank-tab {
      flex:1; padding:10px 8px; text-align:center; border-radius:10px;
      cursor:pointer; font-size:12px; font-weight:700; color:var(--text2); transition:all .2s;
      letter-spacing:.3px; text-transform:uppercase;
    }
    .rank-tab.active { background:var(--red); color:#fff; box-shadow:0 4px 16px rgba(217,74,74,.35); }

    /* Podium */
    .podium-wrap {
      display:flex; align-items:flex-end; justify-content:center;
      gap:0; margin-bottom:28px; padding:0 10px;
    }
    .podium-slot { flex:1; max-width:140px; text-align:center; position:relative; }
    .podium-avatar-wrap { margin-bottom:8px; position:relative; display:inline-block; }
    .podium-avatar {
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-weight:900; margin:0 auto; overflow:hidden; position:relative;
    }
    .podium-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .podium-crown {
      position:absolute; top:-18px; left:50%; transform:translateX(-50%);
      font-size:20px; animation:crownBob 2s ease-in-out infinite;
      filter:drop-shadow(0 0 8px rgba(212,175,55,.8));
    }
    .podium-bar {
      border-radius:12px 12px 0 0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:12px 6px;
      transform-origin:bottom; animation:podiumRise .6s cubic-bezier(.175,.885,.32,1.275);
      position:relative; overflow:hidden;
    }
    .podium-bar::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,.08),transparent);
      pointer-events:none;
    }
    .podium-cars { font-size:26px; font-weight:900; line-height:1; }
    .podium-cars-label { font-size:10px; font-weight:700; opacity:.7; margin-top:1px; }
    .podium-name { font-size:12px; font-weight:800; margin-top:6px; }

    /* Gap comparison */
    .gap-board {
      background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:16px;
      padding:18px; margin-bottom:20px; animation:fadeIn .5s ease;
    }
    .gap-board-title {
      font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase;
      letter-spacing:1px; margin-bottom:14px; display:flex; align-items:center; gap:6px;
    }
    .gap-row {
      display:flex; align-items:center; gap:12px; padding:10px 0;
      border-bottom:1px solid var(--border); animation:rankSlide .4s ease;
    }
    .gap-row:last-child { border-bottom:none; }
    .gap-pos { font-size:11px; font-weight:800; min-width:32px; }
    .gap-bar-wrap { flex:1; position:relative; }
    .gap-bar-bg { height:30px; background:rgba(255,255,255,.04); border-radius:8px; overflow:hidden; position:relative; }
    .gap-bar-fill { height:100%; border-radius:8px; transition:width .8s cubic-bezier(.4,0,.2,1); display:flex; align-items:center; padding-left:10px; }
    .gap-bar-label { font-size:12px; font-weight:700; color:#fff; white-space:nowrap; }
    .gap-badge-wrap { min-width:80px; text-align:right; }
    .gap-cars  { font-size:16px; font-weight:900; }
    .gap-sales { font-size:11px; color:var(--text2); }
    .gap-behind {
      display:inline-flex; align-items:center; gap:4px;
      background:rgba(255,255,255,.06); border:1px solid var(--border);
      border-radius:6px; padding:3px 8px; font-size:11px; font-weight:700;
      color:var(--text2); animation:gapPulse 2s ease-in-out infinite;
    }
    .gap-behind.closing { color:#22C55E; border-color:rgba(34,197,94,.25); background:rgba(34,197,94,.08); animation:none; }
    .gap-behind.leading { color:var(--gold); border-color:rgba(212,175,55,.3); background:rgba(212,175,55,.1); animation:none; }

    /* Commission cards */
    .comm-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-top:20px; max-width:100%; }
    .comm-card {
      background:rgba(255,255,255,.04); border:1.5px solid var(--border); border-radius:14px;
      padding:18px 14px; text-align:center; animation:fadeIn .5s ease; transition:transform .2s, border-color .2s;
    }
    .comm-card:hover { transform:translateY(-3px); border-color:rgba(255,255,255,.18); }
    .comm-card-rank { font-size:10px; font-weight:800; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
    .comm-card-avatar { margin:0 auto 10px; display:flex; justify-content:center; }
    .comm-card-name  { font-size:14px; font-weight:800; margin-bottom:4px; }
    .comm-card-comm  { font-size:22px; font-weight:900; line-height:1; }
    .comm-card-cars  { font-size:11px; color:var(--text2); margin-top:5px; }

    /* Full rank list */
    .rank-list-item {
      display:flex; align-items:center; gap:12px;
      background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:12px;
      padding:14px 16px; margin-bottom:8px; transition:all .2s;
    }
    .rank-list-item:hover { background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.12); }
    .rank-list-item.pos-1 { border-color:rgba(212,175,55,.35); background:rgba(212,175,55,.05); }
    .rank-list-item.pos-2 { border-color:rgba(184,188,194,.3); background:rgba(184,188,194,.03); }
    .rank-list-item.pos-3 { border-color:rgba(184,115,51,.3);  background:rgba(184,115,51,.03); }
    .rl-pos    { font-size:12px; font-weight:900; min-width:30px; text-align:center; }
    .rl-info   { flex:1; }
    .rl-name   { font-size:14px; font-weight:700; margin-bottom:4px; }
    .rl-bar    { margin-bottom:3px; }
    .rl-stats  { font-size:11px; color:var(--text2); }
    .rl-right  { text-align:right; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API_URL = 'https://superagent-f43a5097.base44.app/functions/apiHandler';
const APP_ID  = '6a1c42f697e43e4ff43a5097';

async function api(action, entity, extra = {}) {
  try {
    const res  = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json','x-base44-app-id':APP_ID}, body:JSON.stringify({action,entity,...extra}) });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error||'API error');
    return json.data;
  } catch(e) { console.error(e); throw e; }
}

const peso    = n  => `₱${(n||0).toLocaleString('en-PH',{minimumFractionDigits:0,maximumFractionDigits:0})}`;

async function logEvent({ event_type, title, description, actor_name='', entity_id='', amount=0 }) {
  try {
    await api('create','ActivityLog',{data:{event_type,title,description,actor_name,entity_id,amount}});
  } catch(e) { console.warn('Log failed:',e.message); }
}
const today   = () => new Date().toISOString().split('T')[0];
const initials= n  => n ? n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?';
const fmt     = d  => d ? new Date(d).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'}) : '';
const fmtTime = d  => d ? new Date(d).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'}) : '';

/* SVG Icons */
const Ic = {
  menu:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>,
  home:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  car:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="11" width="22" height="9" rx="2"/><path d="M5 11V9a4 4 0 014-4h6a4 4 0 014 4v2"/><circle cx="7.5" cy="20" r="1.5"/><circle cx="16.5" cy="20" r="1.5"/></svg>,

  trophy: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4a2 2 0 01-2-2V5h4"/><path d="M18 9h2a2 2 0 002-2V5h-4"/><path d="M12 17v4"/><path d="M8 21h8"/><path d="M6 5h12v6a6 6 0 01-12 0z"/></svg>,
  chart:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
  users:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>,
  wrench: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>,
  gift:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>,
  plus:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  trash:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>,
  edit:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  check:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  fire:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0011 17c.5 0 1-.1 1.4-.4.4-.3.6-.8.6-1.3 0-1.5-2-3-2-3s-2 1.5-2 3.2zm5.5-10c0 0 3 3 3 6a6 6 0 01-12 0C5 7.5 8.5 4.5 8.5 4.5S10 7 12 7c1 0 1.5-1 2-2.5z"/></svg>,
  gap:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
  search: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  drop:   <svg viewBox="0 0 24 24" fill="white"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg>,
  log:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
  star:   <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>,
  bolt:   <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
};

/* Avatar component */
function Av({ emp, size=40, fs=15 }) {
  const [err,setErr] = useState(false);
  const hasImg = emp?.avatar_url && !err;
  return (
    <div style={{width:size,height:size,borderRadius:'50%',background:hasImg?'transparent':(emp?.avatar_color||'#D94A4A'),display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:800,fontSize:fs,overflow:'hidden',flexShrink:0}}>
      {hasImg ? <img src={emp.avatar_url} onError={()=>setErr(true)} style={{width:'100%',height:'100%',objectFit:'cover'}} /> : initials(emp?.full_name)}
    </div>
  );
}

/* Toast */
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t=setTimeout(onClose,3000); return()=>clearTimeout(t); }, []);
  const clr = {success:'#22C55E',error:'#D94A4A',warning:'#D4AF37',info:'#7A7A85'};
  return (
    <div className="toast">
      <div className="toast-dot" style={{background:clr[type]||clr.info}}></div>
      {msg}
    </div>
  );
}

/* ═══════════════════════════════════════════
   GAMIFIED RANKING PAGE
═══════════════════════════════════════════ */
function Ranking({ carWashes, employees, campaign={} }) {
  const [tab, setTab] = useState('today');
  const now = new Date();
  const todayStr = today();

  /* Filter by tab */
  const filterWashes = () => {
    if (tab === 'today') return carWashes.filter(w => (w.transaction_date||w.created_date||'').startsWith(todayStr));
    if (tab === '7days') {
      const cutoff = new Date(now.getTime() - 7*24*60*60*1000);
      return carWashes.filter(w => new Date(w.transaction_date||w.created_date) >= cutoff);
    }
    return carWashes.filter(w => {
      const d = new Date(w.transaction_date||w.created_date);
      return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    });
  };

  /* Build leaderboard — 1 car per wash, credit all employees in team */
  const buildBoard = () => {
    const map = {};
    employees.filter(e=>e.is_active).forEach(e => {
      map[e.id] = { id:e.id, name:e.full_name, emp:e, cars:0, sales:0, commission:0 };
    });
    filterWashes().forEach(w => {
      // Determine which employees worked this wash
      const splits = Array.isArray(w.commission_splits) && w.commission_splits.length > 0
        ? w.commission_splits
        : [{ employee_id: w.employee_id, employee_name: w.employee_name, amount: w.commission_amount||0 }];

      splits.forEach((sp, idx) => {
        const empId   = sp.employee_id || sp.id;
        const empName = sp.employee_name || sp.name || w.employee_name;
        if (!map[empId]) {
          const e = employees.find(x=>x.id===empId);
          map[empId] = { id:empId, name:empName, emp:e||null, cars:0, sales:0, commission:0 };
        }
        // Each employee gets +1 car for the wash (they all worked on it)
        map[empId].cars++;
        // Sales credited to primary employee only (to avoid inflating totals)
        if (idx === 0) map[empId].sales += (w.total_amount||0);
        // Commission credited individually
        map[empId].commission += (sp.amount || 0);
      });
    });
    return Object.values(map).sort((a,b) => b.cars-a.cars || b.sales-a.sales);
  };

  const ranked  = buildBoard();
  const maxCars = ranked[0]?.cars || 1;
  const leader  = ranked[0];
  const pos1    = ranked[0]; const pos2 = ranked[1]; const pos3 = ranked[2];

  /* Gap data */
  const gap2 = pos1 && pos2 ? (pos1.cars - pos2.cars) : null;
  const gap3 = pos1 && pos3 ? (pos1.cars - pos3.cars) : null;

  /* Colors for positions */
  const posColor = ['var(--gold)','var(--silver)','var(--bronze)'];
  const posLabel = ['1ST','2ND','3RD'];
  const tabLabels = { today:'Today', '7days':'7 Days', month:'This Month' };

  /* Podium order: 2nd, 1st, 3rd */
  const podiumOrder = [pos2, pos1, pos3];
  const podiumHeights = [110, 150, 90];
  const podiumColors  = [
    'rgba(184,188,194,.2)',
    'rgba(212,175,55,.25)',
    'rgba(184,115,51,.2)',
  ];
  const podiumBorders = [
    'rgba(184,188,194,.4)',
    'rgba(212,175,55,.5)',
    'rgba(184,115,51,.4)',
  ];

  return (
    <div>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <div style={{fontSize:22,fontWeight:900}}>Leaderboard</div>
          <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{tabLabels[tab]} · {ranked.filter(r=>r.cars>0).length} active washers</div>
        </div>
        {campaign?.is_active && (
          <div style={{background:'rgba(212,175,55,.1)',border:'1px solid rgba(212,175,55,.3)',borderRadius:10,padding:'7px 13px',fontSize:12,fontWeight:700,color:'var(--gold)'}}>
            {campaign.campaign_name}
          </div>
        )}
      </div>

      {/* Period Tabs */}
      <div className="rank-tabs">
        {['today','7days','month'].map(t => (
          <div key={t} className={`rank-tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
            {tabLabels[t]}
          </div>
        ))}
      </div>

      {ranked.filter(r=>r.cars>0).length === 0 ? (
        <div className="card" style={{textAlign:'center',padding:'48px 24px'}}>
          <div style={{fontSize:40,marginBottom:12,opacity:.4}}>{Ic.trophy}</div>
          <div style={{fontSize:16,fontWeight:700,color:'var(--text2)'}}>No washes recorded yet</div>
          <div style={{fontSize:13,color:'var(--text2)',marginTop:4}}>Get washing to see the leaderboard!</div>
        </div>
      ) : (
        <>
          {/* ── PODIUM ── */}
          {ranked.filter(r=>r.cars>0).length >= 2 && (
            <div className="card mb-4" style={{paddingBottom:0,overflow:'hidden'}}>
              <div style={{textAlign:'center',fontSize:11,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:20}}>
                Podium
              </div>
              <div className="podium-wrap">
                {podiumOrder.map((r,idx) => {
                  if (!r) return <div key={idx} style={{flex:1,maxWidth:140}}></div>;
                  const isFirst = idx === 1;
                  const pColors = [posColor[1], posColor[0], posColor[2]];
                  const pC = pColors[idx];
                  return (
                    <div key={r.id} className="podium-slot">
                      <div className="podium-avatar-wrap">
                        {isFirst && <div className="podium-crown">&#x1F451;</div>}
                        <Av emp={r.emp||{full_name:r.name,avatar_color:'#D94A4A'}}
                          size={isFirst?64:50} fs={isFirst?22:18}
                          style={{border:`3px solid ${pC}`,borderRadius:'50%'}}
                        />
                      </div>
                      <div style={{fontSize:isFirst?14:12,fontWeight:800,marginBottom:6,color:pC}}>{r.name.split(' ')[0]}</div>
                      <div className="podium-bar" style={{height:podiumHeights[idx],background:podiumColors[idx],border:`1.5px solid ${podiumBorders[idx]}`,borderBottom:'none'}}>
                        <div className="podium-cars" style={{color:pC}}>{r.cars}</div>
                        <div className="podium-cars-label">CARS</div>
                        <div style={{fontSize:11,color:pC,marginTop:4,fontWeight:700,opacity:.85}}>{peso(r.sales)}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ── GAP COMPARISON BOARD ── */}
          {ranked.length > 0 && ranked[0] && ranked[0].cars > 0 && (
            <div className="gap-board mb-4">
              <div className="gap-board-title">
                <span style={{color:'var(--red)'}}>{Ic.gap}</span>
                Gap to Leader — {pos1.name.split(' ')[0]}
              </div>

              {ranked.filter(r=>r.cars>0).map((r, i) => {
                const pct      = maxCars > 0 ? (r.cars / maxCars) * 100 : 0;
                const gapCars  = pos1.cars - r.cars;
                const gapSales = pos1.sales - r.sales;
                const barColor = i===0 ? 'var(--gold)' : i===1 ? 'var(--silver)' : i===2 ? 'var(--bronze)' : 'var(--red)';

                return (
                  <div key={r.id} className="gap-row" style={{animationDelay:`${i*.06}s`}}>
                    <div className="gap-pos" style={{color: i<3?posColor[i]:'var(--text2)'}}>
                      {i<3 ? posLabel[i] : `#${i+1}`}
                    </div>
                    <div className="gap-bar-wrap">
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                        <span style={{fontSize:12,fontWeight:700}}>{r.name}</span>
                        {i===0 ? (
                          <span className="gap-behind leading">LEADER</span>
                        ) : (
                          <span className="gap-behind">
                            -{gapCars} car{gapCars!==1?'s':''} · -{peso(gapSales)}
                          </span>
                        )}
                      </div>
                      <div className="gap-bar-bg">
                        <div className="gap-bar-fill" style={{width:`${pct}%`,background:barColor,opacity:.85}}>
                          {pct > 20 && <span className="gap-bar-label">{r.cars}c</span>}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* ── COMMISSION CARDS ── */}
          <div className="card mb-4">
            <div className="section-title" style={{fontSize:13,marginBottom:16}}>
              <span style={{color:'var(--gold)'}}>{Ic.bolt}</span> Commission Earned
            </div>
            <div className="comm-cards">
              {ranked.filter(r=>r.cars>0).map((r,i) => (
                <div key={r.id} className="comm-card" style={{borderColor: i<3 ? `${['rgba(212,175,55,.3)','rgba(184,188,194,.25)','rgba(184,115,51,.25)'][i]}` : 'var(--border)'}}>
                  <div className="comm-card-rank" style={{color:i<3?posColor[i]:'var(--text2)'}}>{i<3?posLabel[i]:`#${i+1}`}</div>
                  <div className="comm-card-avatar">
                    <Av emp={r.emp||{full_name:r.name,avatar_color:'#D94A4A'}} size={44} fs={16} />
                  </div>
                  <div className="comm-card-name">{r.name.split(' ')[0]}</div>
                  <div className="comm-card-comm" style={{color:i<3?posColor[i]:'var(--text)'}}>{peso(r.commission)}</div>
                  <div className="comm-card-cars">{r.cars} cars · {peso(r.sales)}</div>
                </div>
              ))}
            </div>
          </div>

          {/* ── FULL RANKED LIST ── */}
          <div className="card">
            <div className="section-title" style={{fontSize:13,marginBottom:16}}>
              Full Standings
            </div>
            {ranked.map((r,i) => {
              const pct = maxCars > 0 ? (r.cars/maxCars)*100 : 0;
              const bColor = i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':'var(--red)';
              return (
                <div key={r.id} className={`rank-list-item ${i<3?`pos-${i+1}`:''}`} style={{animationDelay:`${i*.05}s`}}>
                  <div className="rl-pos" style={{color:i<3?posColor[i]:'var(--text2)',fontSize:i<3?'11px':'12px'}}>{i<3?posLabel[i]:`#${i+1}`}</div>
                  <Av emp={r.emp||{full_name:r.name}} size={40} fs={14} />
                  <div className="rl-info">
                    <div className="rl-name">{r.name}</div>
                    <div className="rl-bar">
                      <div className="progress-bar">
                        <div className="progress-fill" style={{width:`${pct}%`,background:bColor}}></div>
                      </div>
                    </div>
                    <div className="rl-stats">{peso(r.sales)} · comm {peso(r.commission)}</div>
                  </div>
                  <div className="rl-right">
                    <div className="rl-cars" style={{color:bColor}}>{r.cars}</div>
                    <div className="rl-clabel">cars</div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* ── ACTIVE CAMPAIGN REWARDS ── */}
          {campaign?.is_active && (
            <div style={{marginTop:18,background:'rgba(212,175,55,.07)',border:'1px solid rgba(212,175,55,.25)',borderRadius:16,padding:20}}>
              <div style={{fontWeight:800,fontSize:14,color:'var(--gold)',marginBottom:14}}>Active Campaign Rewards — {campaign.campaign_name}</div>
              <div className="grid-3" style={{gap:10}}>
                {[
                  {pos:'1ST',reward:campaign.first_place_reward,color:posColor[0],emp:ranked[0]},
                  {pos:'2ND',reward:campaign.second_place_reward,color:posColor[1],emp:ranked[1]},
                  {pos:'3RD',reward:campaign.third_place_reward, color:posColor[2],emp:ranked[2]},
                ].map((x,i) => (
                  <div key={i} style={{background:'rgba(255,255,255,.04)',border:`1px solid ${x.color}30`,borderRadius:12,padding:14,textAlign:'center'}}>
                    <div style={{fontSize:11,fontWeight:700,color:x.color,marginBottom:6}}>{x.pos} PLACE</div>
                    {x.emp && x.emp.cars > 0 && <Av emp={x.emp.emp||{full_name:x.emp.name}} size={36} fs={13} />}
                    <div style={{fontWeight:800,color:x.color,fontSize:18,marginTop:6}}>{peso(x.reward)}</div>
                    <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{x.emp && x.emp.cars > 0 ? x.emp.name.split(' ')[0] : 'TBD'}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function Dashboard({ carWashes, employees, services, campaign, setPage }) {
  const todayStr   = today();
  const now        = new Date();
  const todayW     = carWashes.filter(w => (w.transaction_date||w.created_date||'').startsWith(todayStr));
  const monthW     = carWashes.filter(w => { const d=new Date(w.transaction_date||w.created_date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
  const todaySales = todayW.reduce((s,w)=>s+(w.total_amount||0),0);
  const todayComm  = todayW.reduce((s,w)=>s+(w.commission_amount||0),0);
  const monthSales = monthW.reduce((s,w)=>s+(w.total_amount||0),0);
  const avgSale    = todayW.length>0 ? todaySales/todayW.length : 0;

  const empMap = {};
  todayW.forEach(w => {
    if (!empMap[w.employee_id]) empMap[w.employee_id]={name:w.employee_name,id:w.employee_id,cars:0,sales:0};
    empMap[w.employee_id].cars++;
    empMap[w.employee_id].sales+=(w.total_amount||0);
  });
  const topEmp  = Object.values(empMap).sort((a,b)=>b.cars-a.cars||b.sales-a.sales)[0];
  const ranking = Object.values(empMap).sort((a,b)=>b.cars-a.cars||b.sales-a.sales).slice(0,3);
  const recent  = [...carWashes].sort((a,b)=>new Date(b.created_date)-new Date(a.created_date)).slice(0,5);
  const timeNow = now.toLocaleString('en-PH',{weekday:'long',month:'long',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const posColors=['var(--gold)','var(--silver)','var(--bronze)'];
  const posLabels=['1ST','2ND','3RD'];

  return (
    <div>
      <div className="hero-header">
        <div style={{position:'relative',zIndex:1}}>
          <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}>{timeNow}</div>
          <div style={{fontSize:26,fontWeight:900,marginBottom:4}}>Welcome back!</div>
          <div style={{fontSize:13,color:'var(--text2)'}}>Here's your car wash business overview.</div>
        </div>
      </div>

      <div className="stats-grid">
        {[
          {label:'Cars Today',   value:todayW.length,    sub:`${monthW.length} this month`,   cls:'stat-red',   color:'var(--red)'},
          {label:'Sales Today',  value:peso(todaySales), sub:`${peso(monthSales)} this month`, cls:'stat-green', color:'var(--success)'},
          {label:'Commission',   value:peso(todayComm),  sub:`avg ${peso(todayW.length>0?todayComm/todayW.length:0)} / car`,     cls:'stat-yellow',color:'var(--gold)'},
          {label:'Top Today',    value:topEmp?topEmp.name.split(' ')[0]:'—', sub:topEmp?`${topEmp.cars} cars · ${peso(topEmp.sales)}`:'No data yet', cls:'stat-gray',color:'var(--silver)'},
        ].map((s,i)=>(

        ))}

      <div className="grid-2">
