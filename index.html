/* ═══════════════════════════════════════════
   RECORD CAR WASH
═══════════════════════════════════════════ */
function RecordCarWash({ employees, services, onSave, showToast }) {
  const [selectedSvcs, setSelectedSvcs] = useState([]);
  const [selectedEmps, setSelectedEmps] = useState([]); // array of emp objects, max 3
  const [custName,     setCustName]     = useState('');
  const [plate,        setPlate]        = useState('');
  const [amtPaid,      setAmtPaid]      = useState('');
  const [saving,       setSaving]       = useState(false);
  const [showOK,       setShowOK]       = useState(false);
  const [lastSaved,    setLastSaved]    = useState(null);

  const activeSvcs = services.filter(s=>s.is_active);
  const activeEmps = employees.filter(e=>e.is_active);
  const total = selectedSvcs.reduce((s,v)=>s+(v.price||0),0);

  // Split commission evenly across all selected employees
  const splitCommission = () => {
    if (!selectedEmps.length) return [];
    return selectedEmps.map(emp => {
      const rate = emp.commission_percentage || 0;
      const share = (total * rate / 100) / selectedEmps.length;
      return { emp, rate, share };
    });
  };
  const commSplits  = splitCommission();
  const totalComm   = commSplits.reduce((s,c)=>s+c.share,0);

  const toggleEmp = (emp) => {
    setSelectedEmps(prev => {
      const exists = prev.find(e=>e.id===emp.id);
      if (exists) return prev.filter(e=>e.id!==emp.id);
      if (prev.length >= 3) { showToast('Max 3 employees per wash','warning'); return prev; }
      return [...prev, emp];
    });
  };

  const toggleSvc = svc => setSelectedSvcs(p => p.find(s=>s.id===svc.id) ? p.filter(s=>s.id!==svc.id) : [...p,svc]);
  const reset = () => { setSelectedSvcs([]); setSelectedEmps([]); setCustName(''); setPlate(''); setAmtPaid(''); setLastSaved(null); };

  const handleSave = async () => {
    if (!selectedEmps.length)   return showToast('Select at least one employee','warning');
    if (!selectedSvcs.length)   return showToast('Select at least one service','warning');
    setSaving(true);
    try {
      const splits   = splitCommission();
      const txDate   = new Date().toISOString();
      const paid     = parseFloat(amtPaid)||total;
      const empNames = splits.map(c=>c.emp.full_name).join(', ');
      const totalCommissionAmt = splits.reduce((s,c)=>s+c.share,0);

      // Save ONE record per car wash (not per employee)
      // All employees + their individual splits stored inside the record
      const saved = await api('create','CarWash',{data:{
        customer_name:      custName,
        plate_number:       plate,
        // Primary employee = first selected (for backward compat)
        employee_id:        splits[0].emp.id,
        employee_name:      empNames,
        services:           selectedSvcs,
        total_amount:       total,
        amount_paid:        paid,
        commission_rate:    splits[0].rate,
        commission_amount:  totalCommissionAmt,
        transaction_date:   txDate,
        notes:              splits.length > 1 ? `Team wash: ${empNames}` : '',
        // Multi-employee fields
        employees:          splits.map(({emp,rate,share})=>({
          id: emp.id, name: emp.full_name,
          commission_rate: rate, commission_amount: share
        })),
        commission_splits:  splits.map(({emp,rate,share})=>({
          employee_id: emp.id, employee_name: emp.full_name,
          rate, amount: share
        })),
      }});

      logEvent({
        event_type:  'wash_recorded',
        title:       `Wash recorded — ${empNames}`,
        description: `${selectedSvcs.map(s=>s.name).join(', ')}${plate?' | '+plate:''}${custName?' | '+custName:''}`,
        actor_name:  splits[0].emp.full_name,
        entity_id:   saved?.id||'',
        amount:      total,
      });

      setLastSaved({ total, splits, svcs: selectedSvcs, paid });
      onSave(saved);  // single record
      setShowOK(true);
      setTimeout(()=>{setShowOK(false);reset();},3200);
    } catch(e) { showToast('Error: '+e.message,'error'); }
    finally { setSaving(false); }
  };

  if (showOK && lastSaved) return (
    <div className="success-overlay">
      <div className="success-card">
        <div style={{width:64,height:64,background:'rgba(34,197,94,.15)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--success)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" width="34" height="34"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div style={{fontSize:20,fontWeight:900,marginBottom:4}}>Wash Recorded!</div>
        <div style={{color:'var(--text2)',fontSize:12,marginBottom:16}}>
          {lastSaved.splits.length > 1 ? `Team of ${lastSaved.splits.length}` : 'Solo wash'} · {lastSaved.svcs.map(s=>s.name).join(', ')}
        </div>
        <div style={{background:'var(--glass)',borderRadius:12,padding:14,border:'1px solid var(--border)',marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <span style={{color:'var(--text2)',fontSize:12}}>Total</span>
            <span style={{fontWeight:800,fontSize:17,color:'var(--red)'}}>{peso(lastSaved.total)}</span>
          </div>
          {lastSaved.splits.map(({emp,share},i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:6}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <Av emp={emp} size={22} fs={9}/>
                <span style={{fontSize:12}}>{emp.full_name.split(' ')[0]}</span>
              </div>
              <span style={{fontWeight:700,color:'var(--success)',fontSize:13}}>{peso(share)}</span>
            </div>
          ))}
        </div>
        <div style={{color:'var(--text2)',fontSize:11}}>Ready for next customer...</div>
      </div>
    </div>
  );

  const timeStr = new Date().toLocaleString('en-PH',{month:'long',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});

  return (
    <div>
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:14,marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontWeight:700,fontSize:14}}>Quick Entry</div>
        <div style={{fontSize:11,color:'var(--text2)'}}>{timeStr}</div>
      </div>

      {/* Customer Info */}
      <div className="card mb-4">
        <div style={{fontWeight:700,fontSize:11,marginBottom:12,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.5px'}}>Customer Info <span style={{fontWeight:400,textTransform:'none'}}>(optional)</span></div>
        <div className="grid-2">
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Customer Name</label>
            <input className="form-input" placeholder="Juan dela Cruz" value={custName} onChange={e=>setCustName(e.target.value)} />
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Plate Number</label>
            <input className="form-input" placeholder="ABC 1234" value={plate} onChange={e=>setPlate(e.target.value.toUpperCase())} />
          </div>
        </div>
      </div>

      {/* Services */}
      <div className="card mb-4">
        <div style={{fontWeight:700,fontSize:11,marginBottom:12,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.5px'}}>Select Services</div>
        <div className="service-grid">
          {activeSvcs.map(svc => {
            const sel = selectedSvcs.find(s=>s.id===svc.id);
            return (
              <div key={svc.id} className={`service-item ${sel?'selected':''}`} onClick={()=>toggleSvc(svc)}>
                <div className="svc-check">{sel && Ic.check}</div>
                <div style={{flex:1}}>
                  <div className="svc-name">{svc.name}</div>
                  <div className="svc-price">{peso(svc.price)}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Multi-employee selector */}
      <div className="card mb-4">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:11,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'1px'}}>
            Who did the wash?
          </div>
          <div style={{fontSize:11,color: selectedEmps.length>0?'var(--gold)':'var(--text2)',fontWeight:700}}>
            {selectedEmps.length === 0 ? 'Tap to select (max 3)' :
             selectedEmps.length === 1 ? '1 person selected' :
             `${selectedEmps.length} people — commission split`}
          </div>
        </div>

        {/* Team badge strip */}
        {selectedEmps.length > 1 && (
          <div style={{display:'flex',gap:6,marginBottom:12,padding:'8px 10px',background:'rgba(212,175,55,.08)',borderRadius:10,border:'1px solid rgba(212,175,55,.2)',flexWrap:'wrap'}}>
            <span style={{fontSize:11,color:'var(--gold)',fontWeight:700,marginRight:4}}>Team:</span>
            {selectedEmps.map((emp,i)=>(
              <span key={emp.id} style={{fontSize:11,color:'var(--text)',background:'rgba(255,255,255,.07)',borderRadius:6,padding:'2px 8px'}}>
                {emp.full_name.split(' ')[0]}
                {selectedEmps.length > 0 && <span style={{color:'var(--success)',marginLeft:4}}>({peso((total*(emp.commission_percentage||0)/100)/selectedEmps.length)})</span>}
              </span>
            ))}
          </div>
        )}

        <div className="emp-grid">
          {activeEmps.map(emp => {
            const selIdx = selectedEmps.findIndex(e=>e.id===emp.id);
            const isSelected = selIdx >= 0;
            const orderNum = isSelected ? selIdx + 1 : null;
            return (
              <div key={emp.id}
                className={`emp-card ${isSelected?'selected':''}`}
                onClick={()=>toggleEmp(emp)}
                style={{position:'relative'}}>
                {isSelected && (
                  <div style={{position:'absolute',top:6,right:6,width:18,height:18,background:'var(--gold)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:900,color:'#1E1E22',zIndex:2}}>
                    {orderNum}
                  </div>
                )}
                <Av emp={emp} size={48} fs={17} />
                <div className="emp-name">{emp.full_name.split(' ')[0]}</div>
                <div className="emp-comm" style={{color:isSelected?'var(--gold)':'var(--text2)'}}>
                  {isSelected && selectedEmps.length > 1
                    ? `${peso((total*(emp.commission_percentage||0)/100)/selectedEmps.length)}`
                    : `${emp.commission_percentage}%`}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Summary */}
      {(selectedSvcs.length>0 || selectedEmps.length>0) && (
        <div className="summary-box mb-4">
          <div style={{fontWeight:700,fontSize:11,marginBottom:10,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.5px'}}>Summary</div>
          {selectedSvcs.map(s=>(
            <div key={s.id} className="summary-row">
              <span className="lbl">{s.name}</span><span className="val">{peso(s.price)}</span>
            </div>
          ))}
          <hr className="divider" />
          <div className="summary-row">
            <span className="lbl">Total</span>
            <span className="val" style={{fontSize:18,color:'var(--red)'}}>{peso(total)}</span>
          </div>
          {commSplits.map(({emp,rate,share},i)=>(
            <div key={i} className="summary-row">
              <span className="lbl">
                {emp.full_name.split(' ')[0]} comm.
                {commSplits.length>1 && <span style={{color:'var(--text2)',fontSize:10}}> (split {commSplits.length})</span>}
              </span>
              <span className="val" style={{color:'var(--success)'}}>{peso(share)}</span>
            </div>
          ))}
          {commSplits.length > 1 && (
            <div className="summary-row" style={{marginTop:6,paddingTop:6,borderTop:'1px solid var(--border)'}}>
              <span className="lbl" style={{fontWeight:700}}>Total Commission</span>
              <span className="val" style={{color:'var(--gold)',fontWeight:800}}>{peso(totalComm)}</span>
            </div>
          )}
        </div>
      )}

      {/* Amount Paid */}
      <div className="card mb-4">
        <div className="form-group" style={{marginBottom:0}}>
          <label className="form-label">Amount Paid</label>
          <input className="form-input" type="number" placeholder={total||'0'} value={amtPaid} onChange={e=>setAmtPaid(e.target.value)} style={{fontSize:24,fontWeight:800,textAlign:'center',padding:16}} />
        </div>
      </div>

      <button className="btn btn-success btn-xl" onClick={handleSave} disabled={saving}>
        {saving ? 'Saving...' : selectedEmps.length > 1 ? `Record — Team of ${selectedEmps.length}` : 'Record Car Wash'}
      </button>
    </div>
  );
}

/* ═══════════════════════════════════════════
   TRANSACTIONS
═══════════════════════════════════════════ */
function Transactions({ carWashes, employees, onDelete, showToast }) {
  const [filter,  setFilter]  = useState('today');
  const [search,  setSearch]  = useState('');
  const [confirm, setConfirm] = useState(null);
  const now=new Date(), todayStr=today();

  const filtered = carWashes.filter(w => {
    const d=new Date(w.transaction_date||w.created_date), dStr=(w.transaction_date||w.created_date||'').substring(0,10);
    let pass = filter==='today'?dStr===todayStr:filter==='week'?d>=new Date(now-7*86400000):filter==='month'?(d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()):true;
    if (search) { const q=search.toLowerCase(); pass=pass&&(w.employee_name?.toLowerCase().includes(q)||w.customer_name?.toLowerCase().includes(q)||w.plate_number?.toLowerCase().includes(q)); }
    return pass;
  }).sort((a,b)=>new Date(b.created_date)-new Date(a.created_date));

  const tSales=filtered.reduce((s,w)=>s+(w.total_amount||0),0);
  const tComm=filtered.reduce((s,w)=>s+(w.commission_amount||0),0);

  const handleDelete=async id=>{
    try { await api('delete','CarWash',{id}); onDelete(id); showToast('Deleted','success'); setConfirm(null); }
    catch(e){showToast('Error: '+e.message,'error');}
  };

  return (
    <div>
      <div className="flex-between mb-4">
        <div className="section-title" style={{marginBottom:0}}>Transactions</div>
        <div style={{fontSize:12,color:'var(--text2)'}}>{filtered.length} records · {peso(tSales)}</div>
      </div>
      <div className="tabs">
        {['today','week','month','all'].map(t=>(
          <div key={t} className={`tab ${filter===t?'active':''}`} onClick={()=>setFilter(t)}>{t.charAt(0).toUpperCase()+t.slice(1)}</div>
        ))}
      </div>
      <div className="form-group mb-4" style={{position:'relative'}}>
        <div style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--text2)',width:15,height:15}}>{Ic.search}</div>
        <input className="form-input" placeholder="Search employee, customer, plate..." value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:34}} />
      </div>
      <div className="stats-grid" style={{gridTemplateColumns:'1fr 1fr 1fr',marginBottom:16}}>
        {[{l:'Cars',v:filtered.length,c:'var(--red)',cls:'stat-red'},{l:'Revenue',v:peso(tSales),c:'var(--success)',cls:'stat-green'},{l:'Commission',v:peso(tComm),c:'var(--gold)',cls:'stat-yellow'}].map((s,i)=>(
          <div key={i} className={`stat-card ${s.cls}`} style={{padding:14}}>
            <div className="stat-label">{s.l}</div>
            <div className="stat-value" style={{fontSize:20,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Date / Time</th><th>Employee</th><th>Plate</th><th>Services</th><th>Total</th><th>Comm.</th><th></th></tr></thead>
            <tbody>
              {filtered.length===0
                ? <tr><td colSpan={7} style={{textAlign:'center',padding:28,color:'var(--text2)'}}>No transactions found.</td></tr>
                : filtered.map(w=>{
                    const emp=employees.find(e=>e.id===w.employee_id);
                    return (
                      <tr key={w.id}>
                        <td style={{fontSize:11}}><div>{fmt(w.transaction_date||w.created_date)}</div><div style={{color:'var(--text2)'}}>{fmtTime(w.transaction_date||w.created_date)}</div></td>
                        <td><div style={{display:'flex',alignItems:'center',gap:8}}><Av emp={emp||{full_name:w.employee_name}} size={26} fs={10} /><span style={{fontWeight:600}}>{w.employee_name}</span></div></td>
                        <td style={{fontWeight:600}}>{w.plate_number||'—'}</td>
                        <td style={{color:'var(--text2)'}}>{(w.services||[]).map(s=>s.name).join(', ')||'—'}</td>
                        <td style={{fontWeight:700,color:'var(--red)'}}>{peso(w.total_amount)}</td>
                        <td style={{color:'var(--success)'}}>{peso(w.commission_amount)}</td>
                        <td><button className="btn btn-danger btn-sm" onClick={()=>setConfirm(w.id)} style={{padding:'5px 8px'}}>{Ic.trash}</button></td>
                      </tr>
                    );
                  })
              }
            </tbody>
          </table>
        </div>
      </div>
      {confirm && (
        <div className="modal-overlay" onClick={()=>setConfirm(null)}>
          <div className="modal" style={{maxWidth:320}} onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Delete this transaction?</div>
            <p style={{color:'var(--text2)',fontSize:13,marginBottom:18}}>This cannot be undone.</p>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setConfirm(null)}>Cancel</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={()=>handleDelete(confirm)}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   EMPLOYEES
═══════════════════════════════════════════ */
function Employees({ employees, carWashes, payouts=[], showToast, onRefresh }) {
  const [showModal,setShowModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [viewEmp,setViewEmp]=useState(null);
  const [saving,setSaving]=useState(false);
  const [form,setForm]=useState({full_name:'',contact_number:'',commission_percentage:40,is_active:true,avatar_color:'#D94A4A',avatar_url:''});
  const [preview,setPreview]=useState('');
  const [showPayoutModal,setShowPayoutModal]=useState(false);
  const [payoutEmp,setPayoutEmp]=useState(null);
  const [payoutAmt,setPayoutAmt]=useState('');
  const [payoutNote,setPayoutNote]=useState('');
  const [payoutSaving,setPayoutSaving]=useState(false);
  const fileRef=useRef();
  const COLORS=['#D94A4A','#22C55E','#D4AF37','#B8BCC2','#B87333','#6C63FF','#E91E8C','#00BCD4'];

  // Commission math
  const getCommStats = (empId) => {
    const now = new Date();
    const monthWashes = carWashes.filter(w => {
      const d = new Date(w.transaction_date||w.created_date);
      return w.employee_id===empId && d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    });
    const earned  = monthWashes.reduce((s,w)=>s+(w.commission_amount||0),0);
    const paid    = (payouts||[]).filter(p => {
      const d = new Date(p.payout_date||p.created_date);
      return p.employee_id===empId && d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    }).reduce((s,p)=>s+(p.amount||0),0);
    return { earned, paid, remaining: earned - paid };
  };

  const handlePayout = async () => {
    const amt = parseFloat(payoutAmt);
    if (!amt || amt <= 0) return showToast('Enter a valid amount','warning');
    const stats = getCommStats(payoutEmp.id);
    if (amt > stats.remaining) return showToast(`Max available: ${peso(stats.remaining)}`,'warning');
    setPayoutSaving(true);
    try {
      await api('create','CommissionPayout',{data:{
        employee_id:   payoutEmp.id,
        employee_name: payoutEmp.full_name,
        amount:        amt,
        note:          payoutNote || 'Advance payout',
        payout_date:   new Date().toISOString(),
      }});
      logEvent({event_type:'commission_paid',title:`Commission paid — ${payoutEmp.full_name}`,description:`${payoutNote||'Advance payout'} | Remaining after: ${peso(getCommStats(payoutEmp.id).remaining - amt)}`,actor_name:payoutEmp.full_name,entity_id:payoutEmp.id,amount:amt});
      await onRefresh();
      setShowPayoutModal(false);
      setPayoutAmt(''); setPayoutNote('');
      showToast(`Payout of ${peso(amt)} recorded for ${payoutEmp.full_name}`,'success');
    } catch(e){showToast('Error: '+e.message,'error');}
    finally{setPayoutSaving(false);}
  };

  const openAdd =()=>{setEditing(null);setForm({full_name:'',contact_number:'',commission_percentage:40,is_active:true,avatar_color:'#D94A4A',avatar_url:''});setPreview('');setShowModal(true);};
  const openEdit=emp=>{setEditing(emp);setForm({...emp,avatar_url:emp.avatar_url||''});setPreview(emp.avatar_url||'');setShowModal(true);};

  const handleImg=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{setPreview(ev.target.result);setForm(x=>({...x,avatar_url:ev.target.result}));};
    r.readAsDataURL(f);
  };

  const handleSave=async()=>{
    if (!form.full_name.trim()) return showToast('Enter employee name','warning');
    setSaving(true);
    try {
      if(editing) {
        await api('update','Employee',{id:editing.id,data:form});
        logEvent({event_type:'employee_updated',title:`Employee updated — ${form.full_name}`,description:`Commission: ${form.commission_percentage}% | Status: ${form.is_active?'Active':'Inactive'}`,actor_name:form.full_name,entity_id:editing.id});
      } else {
        const created = await api('create','Employee',{data:form});
        logEvent({event_type:'employee_added',title:`New employee added — ${form.full_name}`,description:`Commission rate: ${form.commission_percentage}%`,actor_name:form.full_name,entity_id:created?.id||''});
      }
      await onRefresh(); setShowModal(false);
      showToast(editing?'Employee updated!':'Employee added!','success');
    } catch(e){showToast('Error: '+e.message,'error');}
    finally{setSaving(false);}
  };

  const toggleActive=async emp=>{
    try{await api('update','Employee',{id:emp.id,data:{is_active:!emp.is_active}});await onRefresh();showToast(`${emp.full_name} ${emp.is_active?'deactivated':'activated'}`,'success');}
    catch(e){showToast('Error','error');}
  };

  const getStats=id=>{
    const ws=carWashes.filter(w=>w.employee_id===id),now=new Date();
    return {
      total:ws.length,
      today:ws.filter(w=>(w.transaction_date||w.created_date||'').startsWith(today())).length,
      month:ws.filter(w=>{const d=new Date(w.transaction_date||w.created_date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length,
      sales:ws.reduce((s,w)=>s+(w.total_amount||0),0),
      comm:ws.reduce((s,w)=>s+(w.commission_amount||0),0),
    };
  };

  return (
    <div>
      <div className="flex-between mb-4">
        <div className="section-title" style={{marginBottom:0}}>Employees</div>
        <button className="btn btn-primary btn-sm" onClick={openAdd}>{Ic.plus} Add Employee</button>
      </div>
      <div className="grid-2">
        {employees.map(emp=>{
          const s=getStats(emp.id);
          return (
            <div key={emp.id} className="card" style={{cursor:'pointer'}} onClick={()=>setViewEmp(emp)}>
              <div className="flex-between mb-4">
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <Av emp={emp} size={48} fs={17} />
                  <div><div style={{fontWeight:800,fontSize:15}}>{emp.full_name}</div><div style={{fontSize:12,color:'var(--text2)'}}>{emp.contact_number||'—'}</div></div>
                </div>
                <span className={`badge ${emp.is_active?'badge-green':'badge-red'}`}>{emp.is_active?'Active':'Inactive'}</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
                {[{l:'Today',v:s.today,c:'var(--red)'},{l:'Month',v:s.month,c:'var(--success)'},{l:'Comm%',v:emp.commission_percentage+'%',c:'var(--gold)'}].map((x,i)=>(
                  <div key={i} style={{textAlign:'center',background:'var(--glass)',borderRadius:8,padding:8}}>
                    <div style={{fontSize:15,fontWeight:800,color:x.c}}>{x.v}</div>
                    <div style={{fontSize:10,color:'var(--text2)'}}>{x.l}</div>
                  </div>
                ))}
              </div>
              {(() => {
                const cs = getCommStats(emp.id);
                return cs.earned > 0 ? (
                  <div style={{background:'rgba(255,255,255,.04)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 12px',marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontSize:11,color:'var(--text2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.3px'}}>This Month Commission</span>
                      <button className="btn btn-sm btn-primary" style={{padding:'3px 10px',fontSize:11}} onClick={e=>{e.stopPropagation();setPayoutEmp(emp);setPayoutAmt('');setPayoutNote('');setShowPayoutModal(true);}}>Pay Out</button>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginTop:6}}>
                      {[{l:'Earned',v:peso(cs.earned),c:'var(--gold)'},{l:'Paid',v:peso(cs.paid),c:'var(--success)'},{l:'Balance',v:peso(cs.remaining),c:cs.remaining>0?'var(--red)':'var(--text2)'}].map((x,i)=>(
                        <div key={i} style={{textAlign:'center',background:'var(--glass)',borderRadius:7,padding:'6px 4px'}}>
                          <div style={{fontSize:13,fontWeight:800,color:x.c}}>{x.v}</div>
                          <div style={{fontSize:10,color:'var(--text2)'}}>{x.l}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : null;
              })()}
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={e=>{e.stopPropagation();openEdit(emp);}}>{Ic.edit} Edit</button>
                <button className={`btn btn-sm ${emp.is_active?'btn-danger':''}`} style={{flex:1,background:emp.is_active?undefined:'rgba(34,197,94,.15)',color:emp.is_active?undefined:'var(--success)',border:emp.is_active?undefined:'1px solid rgba(34,197,94,.2)'}} onClick={e=>{e.stopPropagation();toggleActive(emp);}}>
                  {emp.is_active?'Deactivate':'Activate'}
                </button>
              </div>
            </div>
          );
        })}
      </div>

      {showModal && (
        <div className="modal-overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">{editing?'Edit Employee':'Add Employee'}</div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',marginBottom:18}}>
              <div style={{position:'relative',marginBottom:6}}>
                <div style={{width:72,height:72,borderRadius:'50%',background:preview?'transparent':form.avatar_color,display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:800,fontSize:24,overflow:'hidden',cursor:'pointer',border:'2px dashed rgba(255,255,255,.15)'}} onClick={()=>fileRef.current?.click()}>
                  {preview ? <img src={preview} style={{width:'100%',height:'100%',objectFit:'cover'}} /> : initials(form.full_name||'?')}
                </div>
                <div style={{position:'absolute',bottom:0,right:0,width:22,height:22,background:'var(--red)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}} onClick={()=>fileRef.current?.click()}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" width="12" height="12"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
                </div>
                <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleImg} />
              </div>
              <div style={{fontSize:11,color:'var(--text2)'}}>Click to upload photo</div>
            </div>
            {!preview && (
              <div className="form-group">
                <label className="form-label">Avatar Color</label>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {COLORS.map(c=>(
                    <div key={c} onClick={()=>setForm({...form,avatar_color:c})} style={{width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',outline:form.avatar_color===c?'2px solid white':'2px solid transparent',outlineOffset:2,transition:'all .15s'}}></div>
                  ))}
                </div>
              </div>
            )}
            {preview && <div className="form-group"><button className="btn btn-ghost btn-sm" onClick={()=>{setPreview('');setForm(f=>({...f,avatar_url:''}));}}>Remove photo</button></div>}
            <div className="form-group"><label className="form-label">Full Name *</label><input className="form-input" value={form.full_name} onChange={e=>setForm({...form,full_name:e.target.value})} placeholder="Juan dela Cruz" /></div>
            <div className="form-group"><label className="form-label">Contact Number</label><input className="form-input" value={form.contact_number} onChange={e=>setForm({...form,contact_number:e.target.value})} placeholder="09XXXXXXXXX" /></div>
            <div className="form-group"><label className="form-label">Commission %</label><input className="form-input" type="number" min="0" max="100" value={form.commission_percentage} onChange={e=>setForm({...form,commission_percentage:parseFloat(e.target.value)})} /></div>
            <div className="form-group"><label className="form-label">Status</label><select className="form-input" value={form.is_active} onChange={e=>setForm({...form,is_active:e.target.value==='true'})}><option value="true">Active</option><option value="false">Inactive</option></select></div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={handleSave} disabled={saving}>{saving?'Saving...':'Save'}</button>
            </div>
          </div>
        </div>
      )}

      {/* PAYOUT MODAL */}
      {showPayoutModal && payoutEmp && (() => {
        const cs = getCommStats(payoutEmp.id);
        return (
          <div className="modal-overlay" onClick={()=>setShowPayoutModal(false)}>
            <div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
              <div className="modal-title">Pay Commission</div>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:18,background:'var(--glass)',border:'1px solid var(--border)',borderRadius:12,padding:14}}>
                <Av emp={payoutEmp} size={46} fs={17} />
                <div>
                  <div style={{fontWeight:800,fontSize:15}}>{payoutEmp.full_name}</div>
                  <div style={{fontSize:12,color:'var(--text2)'}}>This month</div>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:18}}>
                {[{l:'Earned',v:peso(cs.earned),c:'var(--gold)'},{l:'Already Paid',v:peso(cs.paid),c:'var(--success)'},{l:'Available',v:peso(cs.remaining),c:'var(--red)'}].map((x,i)=>(
                  <div key={i} style={{textAlign:'center',background:'var(--glass)',border:'1px solid var(--border)',borderRadius:10,padding:10}}>
                    <div style={{fontSize:16,fontWeight:900,color:x.c}}>{x.v}</div>
                    <div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>{x.l}</div>
                  </div>
                ))}
              </div>
              <div className="form-group">
                <label className="form-label">Amount to Pay Out (max {peso(cs.remaining)})</label>
                <input className="form-input" type="number" min="1" max={cs.remaining} placeholder="e.g. 1000" value={payoutAmt} onChange={e=>setPayoutAmt(e.target.value)} style={{fontSize:22,fontWeight:800,textAlign:'center'}} />
              </div>
              <div className="form-group">
                <label className="form-label">Note (optional)</label>
                <input className="form-input" placeholder="e.g. Advance, Full payout..." value={payoutNote} onChange={e=>setPayoutNote(e.target.value)} />
              </div>
              {parseFloat(payoutAmt) > 0 && (
                <div style={{background:'rgba(34,197,94,.08)',border:'1px solid rgba(34,197,94,.2)',borderRadius:10,padding:12,marginBottom:14,fontSize:13}}>
                  After this payout: <strong style={{color:'var(--success)'}}>{peso(cs.remaining - (parseFloat(payoutAmt)||0))}</strong> remaining balance
                </div>
              )}
              <div style={{display:'flex',gap:10}}>
                <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setShowPayoutModal(false)}>Cancel</button>
                <button className="btn btn-success" style={{flex:1}} onClick={handlePayout} disabled={payoutSaving||!payoutAmt||parseFloat(payoutAmt)<=0}>{payoutSaving?'Saving...':'Confirm Payout'}</button>
              </div>
            </div>
          </div>
        );
      })()}

      {viewEmp && (
        <div className="modal-overlay" onClick={()=>setViewEmp(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:'center',marginBottom:18}}>
              <Av emp={viewEmp} size={72} fs={26} />
              <div style={{fontSize:18,fontWeight:900,marginTop:10}}>{viewEmp.full_name}</div>
              <div style={{color:'var(--text2)',fontSize:12}}>{viewEmp.contact_number}</div>
              <span className={`badge ${viewEmp.is_active?'badge-green':'badge-red'}`} style={{marginTop:6}}>{viewEmp.is_active?'Active':'Inactive'}</span>
            </div>
            {(()=>{const s=getStats(viewEmp.id);return(
              <div className="grid-2" style={{gap:10}}>
                {[{l:'Total Washed',v:s.total,c:'var(--red)'},{l:'This Month',v:s.month,c:'var(--success)'},{l:'Total Revenue',v:peso(s.sales),c:'var(--gold)'},{l:'Total Comm.',v:peso(s.comm),c:'var(--silver)'}].map((x,i)=>(
                  <div key={i} style={{background:'var(--glass)',border:'1px solid var(--border)',borderRadius:12,padding:14,textAlign:'center'}}>
                    <div style={{fontSize:16,fontWeight:800,color:x.c}}>{x.v}</div>
                    <div style={{fontSize:11,color:'var(--text2)'}}>{x.l}</div>
                  </div>
                ))}
              </div>
            );})()}
            <div style={{display:'flex',gap:10,marginTop:16}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setViewEmp(null)}>Close</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={()=>{setViewEmp(null);openEdit(viewEmp);}}>Edit</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   SERVICES
═══════════════════════════════════════════ */
function Services({ services, showToast, onRefresh }) {
  const [showModal,setShowModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [form,setForm]=useState({name:'',description:'',price:0,is_active:true});
  const openAdd=()=>{setEditing(null);setForm({name:'',description:'',price:0,is_active:true});setShowModal(true);};
  const openEdit=svc=>{setEditing(svc);setForm({...svc});setShowModal(true);};
  const handleSave=async()=>{
    if(!form.name.trim()) return showToast('Enter service name','warning');
    setSaving(true);
    try{
      if(editing) {
        await api('update','Service',{id:editing.id,data:form});
        logEvent({event_type:'service_updated',title:`Service updated — ${form.name}`,description:`Price: ${peso(form.price)} | ${form.is_active?'Active':'Inactive'}`,entity_id:editing.id});
      } else {
        const created = await api('create','Service',{data:form});
        logEvent({event_type:'service_added',title:`New service added — ${form.name}`,description:`Price: ${peso(form.price)}`,entity_id:created?.id||''});
      }
      await onRefresh();setShowModal(false);
      showToast(editing?'Service updated!':'Service added!','success');
    }catch(e){showToast('Error: '+e.message,'error');}
    finally{setSaving(false);}
  };
  const toggle=async svc=>{try{await api('update','Service',{id:svc.id,data:{is_active:!svc.is_active}});await onRefresh();}catch(e){showToast('Error','error');}};
  return (
    <div>
      <div className="flex-between mb-4">
        <div className="section-title" style={{marginBottom:0}}>Services</div>
        <button className="btn btn-primary btn-sm" onClick={openAdd}>{Ic.plus} Add Service</button>
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Description</th><th>Price</th><th>Status</th><th></th></tr></thead>
            <tbody>
              {services.map(svc=>(
                <tr key={svc.id}>
                  <td style={{fontWeight:700}}>{svc.name}</td>
                  <td style={{color:'var(--text2)'}}>{svc.description||'—'}</td>
                  <td style={{fontWeight:700,color:'var(--gold)'}}>{peso(svc.price)}</td>
                  <td><span className={`badge ${svc.is_active?'badge-green':'badge-red'}`}>{svc.is_active?'Active':'Inactive'}</span></td>
                  <td><div style={{display:'flex',gap:6}}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(svc)}>{Ic.edit}</button>
                    <button className={`btn btn-sm ${svc.is_active?'btn-danger':''}`} style={{fontSize:11,...(!svc.is_active?{background:'rgba(34,197,94,.15)',color:'var(--success)',border:'1px solid rgba(34,197,94,.2)'}:{})}} onClick={()=>toggle(svc)}>{svc.is_active?'Deactivate':'Activate'}</button>
                  </div></td>
                </tr>
              ))}
            </tbody>

function Rewards({ campaigns, carWashes, employees, showToast, onRefresh }) {

  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];

  const openEdit=c=>{setEditing(c);setForm({...c});setShowModal(true);};

    if(!form.campaign_name.trim()) return showToast('Enter campaign name','warning');

    ws.forEach(w=>{if(!map[w.employee_id])map[w.employee_id]={name:w.employee_name,cars:0};map[w.employee_id].cars++;});
    return Object.values(map).sort((a,b)=>b.cars-a.cars).slice(0,3);

            </div>

              {[{pos:'1ST',r:c.first_place_reward,c:posColor[0]},{pos:'2ND',r:c.second_place_reward,c:posColor[1]},{pos:'3RD',r:c.third_place_reward,c:posColor[2]}].map((x,i)=>(

                  <div style={{fontSize:16,fontWeight:800,color:x.c}}>{peso(x.r)}</div>

            <div className="grid-2">

/* CommissionSummary — extracted from Reports to avoid IIFE crashes */
function CommissionSummary({ filtered, payouts, employees, period, customFrom, customTo, now, periodLabel }) {
  if (!Array.isArray(payouts) || payouts.length === 0) return null;

  const getPayoutsInPeriod = (empId) => {
    return payouts.filter(p => {
      if (p.employee_id !== empId) return false;
      const d = new Date(p.payout_date||p.created_date||'');
      if (period==='today') return (p.payout_date||p.created_date||'').startsWith(new Date().toISOString().split('T')[0]);
      if (period==='7days') return d >= new Date((now||new Date()).getTime()-7*86400000);
      if (period==='month') {
        const n = now||new Date();
        return d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear();
      }
      if (period==='custom' && customFrom && customTo) {
        return d >= new Date(customFrom+'T00:00:00') && d <= new Date(customTo+'T23:59:59');
      }
      return true;
    });
  };

  const empComm = {};
  (filtered||[]).forEach(w => {
    if (!empComm[w.employee_id]) empComm[w.employee_id] = {name:w.employee_name, id:w.employee_id, earned:0};
    empComm[w.employee_id].earned += (w.commission_amount||0);
  });

  const rows = Object.values(empComm).map(e => {
    const empPayouts = getPayoutsInPeriod(e.id);
    const paid = empPayouts.reduce((s,p)=>s+(p.amount||0),0);
    return {...e, paid, remaining:e.earned-paid, payoutList:empPayouts};
  }).sort((a,b)=>b.earned-a.earned);

  if (rows.length === 0) return null;

  return (
    <div className="card" style={{marginTop:16}}>
      <div className="section-title" style={{fontSize:13,marginBottom:14}}>Commission Payouts — {periodLabel}</div>
      <div className="table-wrap">
        <table>
          <thead><tr><th>Employee</th><th>Earned</th><th>Paid Out</th><th>Balance</th><th>History</th></tr></thead>
          <tbody>
            {rows.map((r,i) => {
              const emp = (employees||[]).find(e=>e.id===r.id);
              return (
                <tr key={i}>
                  <td><div style={{display:'flex',alignItems:'center',gap:8}}><Av emp={emp||{full_name:r.name}} size={26} fs={10}/><span style={{fontWeight:600}}>{r.name}</span></div></td>
                  <td style={{fontWeight:700,color:'var(--gold)'}}>{peso(r.earned)}</td>
                  <td style={{color:'var(--success)'}}>{peso(r.paid)}</td>
                  <td><span style={{fontWeight:800,color:r.remaining>0?'var(--red)':'var(--text2)'}}>{peso(r.remaining)}</span></td>
                  <td style={{color:'var(--text2)',fontSize:11}}>{r.payoutList.map(p=>`${peso(p.amount)} (${p.note||'payout'})`).join(', ')||'—'}</td>
                </tr>
              );
            })}
            {rows.length===0 && <tr><td colSpan={5} style={{textAlign:'center',padding:20,color:'var(--text2)'}}>No commission data.</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Reports({ carWashes, employees, payouts=[], showToast }) {
  const [period, setPeriod] = useState('today');
  const [customFrom, setCustomFrom] = useState('');
  const [customTo,   setCustomTo]   = useState('');
  const now = new Date();

  const getFiltered = () => {
    if (period === 'today') {
      const t = today();
      return carWashes.filter(w => (w.transaction_date||w.created_date||'').startsWith(t));
    }
    if (period === '7days') {
      const cutoff = new Date(now.getTime() - 7*24*60*60*1000);
      return carWashes.filter(w => new Date(w.transaction_date||w.created_date) >= cutoff);
    }
    if (period === 'month') {
      return carWashes.filter(w => {
        const d = new Date(w.transaction_date||w.created_date);
        return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
      });
    }
    if (period === 'custom' && customFrom && customTo) {
      const from = new Date(customFrom + 'T00:00:00');
      const to   = new Date(customTo   + 'T23:59:59');
      return carWashes.filter(w => {
        const d = new Date(w.transaction_date||w.created_date);
        return d >= from && d <= to;
      });
    }
    return carWashes;
  };

  const filtered = getFiltered();
  const tSales = filtered.reduce((s,w)=>s+(w.total_amount||0),0);
  const tComm  = filtered.reduce((s,w)=>s+(w.commission_amount||0),0);
  const tPaid  = filtered.reduce((s,w)=>s+(w.amount_paid||0),0);

  const empMap = {};
  filtered.forEach(w => {
    if (!empMap[w.employee_id]) empMap[w.employee_id]={name:w.employee_name,id:w.employee_id,cars:0,sales:0,comm:0};
    empMap[w.employee_id].cars++;
    empMap[w.employee_id].sales += (w.total_amount||0);
    empMap[w.employee_id].comm  += (w.commission_amount||0);
  });
  const empRows = Object.values(empMap).sort((a,b)=>b.cars-a.cars);

  const svcMap = {};
  filtered.forEach(w=>(w.services||[]).forEach(s=>{
    if (!svcMap[s.id]) svcMap[s.id]={name:s.name,count:0,revenue:0};
    svcMap[s.id].count++;
    svcMap[s.id].revenue+=(s.price||0);
  }));
  const svcRows = Object.values(svcMap).sort((a,b)=>b.count-a.count);

  const exportCSV = () => {
    const rows = [
      ['Date','Employee','Customer','Plate','Services','Total','Commission','Paid'],
      ...filtered.map(w=>[fmt(w.transaction_date||w.created_date),w.employee_name,w.customer_name||'',w.plate_number||'',(w.services||[]).map(s=>s.name).join('; '),w.total_amount,w.commission_amount,w.amount_paid])
    ];
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));
    a.download = `kgcar-report-${today()}.csv`;
    a.click();
    showToast('CSV exported!','success');
  };

  const periodLabel = {today:'Today', '7days':'Last 7 Days', month:'This Month', custom:'Custom Range'}[period];

  return (
    <div>
      {/* Header */}
      <div className="flex-between mb-4" style={{flexWrap:'wrap',gap:10}}>
        <div className="section-title" style={{marginBottom:0}}>Reports</div>
        <button className="btn btn-ghost btn-sm" onClick={exportCSV}>Export CSV</button>
      </div>

      {/* Period Tabs */}
      <div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}}>
        {[
          {key:'today',  label:'Day'},
          {key:'7days',  label:'7 Days'},
          {key:'month',  label:'Month'},
          {key:'custom', label:'Custom'},
        ].map(t => (
          <button key={t.key}
            className={`btn btn-sm ${period===t.key ? 'btn-primary' : 'btn-ghost'}`}
            onClick={()=>setPeriod(t.key)}
            style={{minWidth:72}}
          >{t.label}</button>
        ))}
      </div>

      {/* Custom date range picker */}
      {period === 'custom' && (
        <div className="card mb-4" style={{padding:'14px 16px'}}>
          <div className="grid-2" style={{gap:12}}>
            <div className="form-group" style={{marginBottom:0}}>
              <label className="form-label">From</label>
              <input className="form-input" type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)} />
            </div>
            <div className="form-group" style={{marginBottom:0}}>
              <label className="form-label">To</label>
              <input className="form-input" type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)} />
            </div>
          </div>
          {customFrom && customTo && (
            <div style={{fontSize:11,color:'var(--text2)',marginTop:10}}>
              Showing {filtered.length} transactions from {customFrom} to {customTo}
            </div>
          )}
        </div>
      )}

      {/* Stats */}
      <div className="stats-grid mb-4">
        {[
          {l:'Cars',       v:filtered.length,  c:'var(--red)',    cls:'stat-red'},
          {l:'Revenue',    v:peso(tSales),      c:'var(--success)',cls:'stat-green'},
          {l:'Commission', v:peso(tComm),       c:'var(--gold)',   cls:'stat-yellow'},
          {l:'Collected',  v:peso(tPaid),       c:'var(--silver)', cls:'stat-gray'},
        ].map((s,i)=>(
          <div key={i} className={`stat-card ${s.cls}`}>
            <div className="stat-label">{s.l}</div>
            <div className="stat-value" style={{color:s.c}}>{s.v}</div>
            <div className="stat-sub">{periodLabel}</div>
          </div>
        ))}
      </div>

      {filtered.length === 0 ? (
        <div className="card" style={{textAlign:'center',padding:'36px 24px',color:'var(--text2)'}}>
          <div style={{fontSize:32,marginBottom:10,opacity:.4}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" width="48" height="48"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div style={{fontWeight:700,fontSize:15}}>No data for this period</div>
          <div style={{fontSize:13,marginTop:4}}>{period==='custom'&&(!customFrom||!customTo)?'Select a date range above':'Try a different date range'}</div>
        </div>
      ) : (
        <div className="grid-2">
          <div className="card">
            <div className="section-title" style={{fontSize:13}}>By Employee</div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Employee</th><th>Cars</th><th>Sales</th><th>Comm.</th></tr></thead>
                <tbody>
                  {empRows.map((r,i)=>{
                    const emp=employees.find(e=>e.id===r.id);
                    return (
                      <tr key={i}>
                        <td><div style={{display:'flex',alignItems:'center',gap:8}}><Av emp={emp||{full_name:r.name}} size={26} fs={10}/><span style={{fontWeight:600}}>{r.name}</span></div></td>
                        <td style={{fontWeight:700,color:'var(--red)'}}>{r.cars}</td>
                        <td>{peso(r.sales)}</td>
                        <td style={{color:'var(--success)'}}>{peso(r.comm)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          <div className="card">
            <div className="section-title" style={{fontSize:13}}>Top Services</div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Service</th><th>Count</th><th>Revenue</th></tr></thead>
                <tbody>
                  {svcRows.map((s,i)=>(
                    <tr key={i}>
                      <td style={{fontWeight:600}}>{s.name}</td>
                      <td style={{color:'var(--red)',fontWeight:700}}>{s.count}</td>
                      <td style={{color:'var(--gold)'}}>{peso(s.revenue)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {/* Commission Payout Summary */}
      <CommissionSummary filtered={filtered} payouts={payouts} employees={employees} period={period} customFrom={customFrom} customTo={customTo} now={now} periodLabel={periodLabel} />
    </div>
  );
}

function ActivityLogs({ logs=[], employees=[], onRefresh }) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');

  const typeConfig = {
    wash_recorded:        { label:'Wash',        color:'var(--red)',     bg:'rgba(217,74,74,.12)' },
    employee_added:       { label:'New Emp',     color:'var(--success)', bg:'rgba(34,197,94,.12)' },
    employee_updated:     { label:'Emp Update',  color:'var(--success)', bg:'rgba(34,197,94,.08)' },
    employee_deactivated: { label:'Deactivated', color:'var(--text2)',   bg:'rgba(255,255,255,.05)' },
    service_added:        { label:'New Service', color:'var(--gold)',    bg:'rgba(212,175,55,.12)' },
    service_updated:      { label:'Svc Update',  color:'var(--gold)',    bg:'rgba(212,175,55,.08)' },
    commission_paid:      { label:'Payout',      color:'#22C55E',       bg:'rgba(34,197,94,.12)' },
    campaign_created:     { label:'Campaign',    color:'var(--gold)',    bg:'rgba(212,175,55,.1)' },
    campaign_updated:     { label:'Campaign',    color:'var(--gold)',    bg:'rgba(212,175,55,.08)' },
  };

  const sorted = [...logs].sort((a,b)=>new Date(b.created_date)-new Date(a.created_date));

  const filtered = sorted.filter(l => {
    if (filter !== 'all' && l.event_type !== filter) return false;
    if (search) {
      const q = search.toLowerCase();
      return (l.title||'').toLowerCase().includes(q) || (l.description||'').toLowerCase().includes(q) || (l.actor_name||'').toLowerCase().includes(q);
    }
    return true;
  });

  const fmtAgo = (d) => {
    if (!d) return '';
    const diff = Date.now() - new Date(d).getTime();
    const mins  = Math.floor(diff/60000);
    const hours = Math.floor(diff/3600000);
    const days  = Math.floor(diff/86400000);
    if (mins < 1)  return 'just now';
    if (mins < 60) return `${mins}m ago`;
    if (hours < 24) return `${hours}h ago`;
    return new Date(d).toLocaleDateString('en-PH',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  };

  const categories = [
    {key:'all',         label:'All'},
    {key:'wash_recorded',label:'Washes'},
    {key:'commission_paid',label:'Payouts'},
    {key:'employee_added',label:'Employees'},
    {key:'service_added',label:'Services'},
  ];

  const todayCount  = sorted.filter(l=>(l.created_date||'').startsWith(new Date().toISOString().split('T')[0])).length;
  const washCount   = sorted.filter(l=>l.event_type==='wash_recorded').length;
  const payoutTotal = sorted.filter(l=>l.event_type==='commission_paid').reduce((s,l)=>s+(l.amount||0),0);

  return (
    <div>
      <div className="flex-between mb-4">
        <div className="section-title" style={{marginBottom:0}}>Activity Log</div>
        <div style={{fontSize:12,color:'var(--text2)'}}>{filtered.length} of {logs.length} events</div>
      </div>

      {/* Stats strip */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:18}}>
        {[
          {l:'Today',    v:todayCount,        c:'var(--red)'},
          {l:'Washes',   v:washCount,         c:'var(--success)'},
          {l:'Paid Out', v:peso(payoutTotal), c:'var(--gold)'},
        ].map((s,i)=>(
          <div key={i} className="stat-card" style={{padding:14}}>
            <div className="stat-label">{s.l}</div>
            <div className="stat-value" style={{fontSize:20,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* Filter chips */}
      <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
        {categories.map(c=>(
          <button key={c.key} className={`btn btn-sm ${filter===c.key?'btn-primary':'btn-ghost'}`} onClick={()=>setFilter(c.key)}>{c.label}</button>
        ))}
      </div>

      {/* Search */}
      <div className="form-group mb-4" style={{position:'relative'}}>
        <div style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--text2)',width:15,height:15}}>{Ic.search}</div>
        <input className="form-input" placeholder="Search logs..." value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:34}} />
      </div>

      {/* Log feed */}
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        {filtered.length === 0 ? (
          <div style={{textAlign:'center',padding:'40px 24px',color:'var(--text2)'}}>
            <div style={{fontSize:32,marginBottom:10,opacity:.3}}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" width="40" height="40"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div style={{fontWeight:700}}>No activity yet</div>
            <div style={{fontSize:13,marginTop:4}}>Events are logged automatically as you use the app</div>
          </div>
        ) : filtered.map((log, i) => {
          const cfg = typeConfig[log.event_type] || {label:log.event_type,color:'var(--text2)',bg:'rgba(255,255,255,.04)'};
          const emp = log.actor_name ? employees.find(e=>e.full_name===log.actor_name) : null;
          return (
            <div key={log.id||i} style={{
              display:'flex', alignItems:'flex-start', gap:14,
              padding:'14px 18px',
              borderBottom: i < filtered.length-1 ? '1px solid var(--border)' : 'none',
              animation:`fadeIn .3s ease ${i*.02}s both`,
              transition:'background .15s',
            }}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.02)'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              {/* Avatar / Icon */}
              <div style={{width:38,height:38,borderRadius:'50%',background:cfg.bg,border:`1px solid ${cfg.color}30`,display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}>
                {emp
                  ? <Av emp={emp} size={38} fs={13} />
                  : <div style={{width:14,height:14,color:cfg.color}}>{
                      (log.event_type==='wash_recorded')   ? Ic.car    :
                      (log.event_type==='commission_paid') ? Ic.gift   :
                      (log.event_type||'').startsWith('emp') ? Ic.users  :
                      (log.event_type||'').startsWith('svc') ? Ic.wrench :
                      Ic.log
                    }</div>
                }
              </div>
              {/* Content */}
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:2}}>
                  <span className="badge" style={{background:cfg.bg,color:cfg.color,fontSize:9,padding:'2px 7px'}}>{cfg.label}</span>
                  <span style={{fontSize:13,fontWeight:700}}>{log.title}</span>
                </div>
                {log.description && <div style={{fontSize:12,color:'var(--text2)',marginTop:1,lineHeight:1.4}}>{log.description}</div>}
                {log.amount > 0 && <div style={{fontSize:12,fontWeight:700,color:'var(--success)',marginTop:2}}>{peso(log.amount)}</div>}
              </div>
              {/* Time */}
              <div style={{fontSize:11,color:'var(--text2)',whiteSpace:'nowrap',flexShrink:0,textAlign:'right'}}>
                <div>{fmtAgo(log.created_date)}</div>
                <div style={{fontSize:10,marginTop:2}}>{log.created_date ? new Date(log.created_date).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'}) : ''}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════ */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {hasError:false,error:null}; }
  static getDerivedStateFromError(error) { return {hasError:true,error}; }
  componentDidCatch(error,info) { console.error('React Error:', error, info); }
  render() {
    if (this.state.hasError) return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:16,padding:24,background:'#1E1E22'}}>
        <div style={{width:56,height:56,background:'#D94A4A',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>!</div>
        <div style={{fontSize:18,fontWeight:800,color:'#F7F7F7'}}>Something went wrong</div>
        <div style={{fontSize:13,color:'#7A7A85',maxWidth:400,textAlign:'center'}}>{this.state.error?.message}</div>
        <button onClick={()=>window.location.reload()} style={{padding:'10px 24px',background:'#D94A4A',color:'white',border:'none',borderRadius:10,fontSize:13,fontWeight:700,cursor:'pointer'}}>Reload App</button>
      </div>
    );
    return this.props.children;
  }
}

function App() {
  const [page,setPage]=useState('dashboard');
  const [sidebarOpen,setSidebarOpen]=useState(window.innerWidth>768);
  const [employees,setEmployees]=useState([]);
  const [services,setServices]=useState([]);
  const [carWashes,setCarWashes]=useState([]);
  const [campaigns,setCampaigns]=useState([]);
  const [payouts,setPayouts]=useState([]);
  const [logs,setLogs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);
  const showToast=(msg,type='info')=>setToast({msg,type});

  const loadAll=async()=>{
    try{
      // Load each entity independently so one failure doesn't blank everything
      const safe = async (entity) => { try { return await api('list', entity); } catch(e) { console.warn(entity+' load failed:', e.message); return []; } };
      const [e,s,w,c,p,l] = await Promise.all([
        safe('Employee'), safe('Service'), safe('CarWash'),
        safe('RewardCampaign'), safe('CommissionPayout'), safe('ActivityLog')
      ]);
      setEmployees(e); setServices(s); setCarWashes(w);
      setCampaigns(c); setPayouts(p); setLogs(l);
    } catch(err) { showToast('Load error: '+err.message,'error'); }
    finally { setLoading(false); }
  };

  useEffect(()=>{loadAll();},[]);
  useEffect(()=>{const fn=()=>setSidebarOpen(window.innerWidth>768);window.addEventListener('resize',fn);return()=>window.removeEventListener('resize',fn);},[]);

  const navItems=[
    {id:'dashboard',icon:Ic.home,  label:'Dashboard',   section:'Main'},
    {id:'record',   icon:Ic.car,   label:'Record Wash', section:'Main'},
    {id:'transactions',icon:Ic.list,label:'Transactions',section:'Main'},
    {id:'ranking',  icon:Ic.trophy,label:'Rankings',    section:'Analytics', externalUrl:'https://kgcarwash.vercel.app/ranking.html'},
    {id:'reports',  icon:Ic.chart, label:'Reports',     section:'Analytics'},
    {id:'employees',icon:Ic.users, label:'Employees',   section:'Admin'},
    {id:'services', icon:Ic.wrench,label:'Services',    section:'Admin'},
    {id:'rewards',  icon:Ic.gift,  label:'Rewards',     section:'Admin'},
    {id:'logs',     icon:Ic.log,   label:'Activity Log', section:'Admin'},
  ];
  const sections=[...new Set(navItems.map(n=>n.section))];
  const activeCampaign=campaigns.find(c=>c.is_active);
  const pageLabel=navItems.find(n=>n.id===page)?.label||page;
  const isMobile=window.innerWidth<=768;

  if(loading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:14}}>
      <div style={{width:48,height:48,background:'var(--red)',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center'}}>{Ic.drop}</div>
      <div style={{fontSize:18,fontWeight:800}}>KGCAR Carwash</div>
      <div style={{color:'var(--text2)',fontSize:13}}>Loading...</div>
      <div style={{width:160,height:3,background:'var(--glass)',borderRadius:2,overflow:'hidden'}}>
        <div style={{height:'100%',width:'60%',background:'var(--red)',borderRadius:2}}></div>
      </div>
    </div>
  );

  return (
    <div className="app">
      {isMobile&&sidebarOpen&&<div className="sidebar-overlay show" onClick={()=>setSidebarOpen(false)}></div>}
      <div className={`sidebar ${sidebarOpen?'open':'closed'}`}>
        <div className="sidebar-logo">
          <div className="logo-icon">{Ic.drop}</div>
          <div><div className="logo-text">KGCAR Carwash</div><div className="logo-sub">Car Wash</div></div>
        </div>
        <nav className="nav">
          {sections.map(sec=>(
            <div key={sec} className="nav-section">
              <div className="nav-label">{sec}</div>
              {navItems.filter(n=>n.section===sec).map(item=>(
                <div key={item.id} className={`nav-item ${page===item.id?'active':''}`} onClick={()=>{if(item.externalUrl){window.open(item.externalUrl,'_blank');return;}setPage(item.id);if(isMobile)setSidebarOpen(false);}}>
                  <span className="nav-icon">{item.icon}</span>{item.label}{item.externalUrl && <span style={{fontSize:9,marginLeft:4,opacity:.5}}>↗</span>}
                </div>
              ))}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          {activeCampaign&&(
            <div style={{background:'rgba(212,175,55,.1)',border:'1px solid rgba(212,175,55,.2)',borderRadius:10,padding:10,fontSize:11}}>
              <div style={{fontWeight:700,color:'var(--gold)',marginBottom:2}}>Active Campaign</div>
              <div style={{color:'var(--text2)'}}>{activeCampaign.campaign_name}</div>
            </div>
          )}
        </div>
      </div>

      <div className="main" style={{marginLeft:!isMobile&&sidebarOpen?260:0}}>
        <div className="topbar">
          <div className="topbar-left">
            <div className="menu-btn" onClick={()=>setSidebarOpen(!sidebarOpen)}>{Ic.menu}</div>
            <div className="page-title">{pageLabel}</div>
          </div>
          <div className="topbar-right">
            <div className="live-badge"><div className="live-dot"></div>Live</div>
            <button className="btn btn-primary btn-sm" onClick={()=>setPage('record')}>{Ic.plus} New Wash</button>
          </div>
        </div>
        <div className="page-content">
          {page==='dashboard'    && <ErrorBoundary><Dashboard carWashes={carWashes} employees={employees} services={services} campaign={activeCampaign} setPage={setPage}/></ErrorBoundary>}
          {page==='record'       && <ErrorBoundary><RecordCarWash employees={employees} services={services} onSave={w=>{setCarWashes(p=>[w,...p]);loadAll();}} showToast={showToast}/></ErrorBoundary>}
          {page==='transactions' && <ErrorBoundary><Transactions carWashes={carWashes} employees={employees} onDelete={id=>setCarWashes(p=>p.filter(w=>w.id!==id))} showToast={showToast}/></ErrorBoundary>}
          {page==='ranking'      && <ErrorBoundary><Ranking carWashes={carWashes} employees={employees} campaign={activeCampaign}/></ErrorBoundary>}
          {page==='reports'      && <ErrorBoundary><Reports carWashes={carWashes} employees={employees} payouts={payouts} showToast={showToast}/></ErrorBoundary>}
          {page==='employees'    && <ErrorBoundary><Employees employees={employees} carWashes={carWashes} payouts={payouts} showToast={showToast} onRefresh={loadAll}/></ErrorBoundary>}
          {page==='services'     && <ErrorBoundary><Services services={services} showToast={showToast} onRefresh={loadAll}/></ErrorBoundary>}
          {page==='rewards'      && <ErrorBoundary><Rewards campaigns={campaigns} carWashes={carWashes} employees={employees} showToast={showToast} onRefresh={loadAll}/></ErrorBoundary>}
          {page==='logs'         && <ErrorBoundary><ActivityLogs logs={logs} employees={employees} onRefresh={loadAll}/></ErrorBoundary>}
        </div>
      </div>
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, document.getElementById('root'));
</script>
</body>
</html>
