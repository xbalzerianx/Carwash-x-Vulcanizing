function Ranking({ carWashes, employees, campaign={} }) {
  const [tab, setTab] = useState('today');
  const now = new Date();
  const todayStr = today();

  /* Filter by tab */
  const filterWashes = () => {
    if (tab === 'today') return carWashes.filter(w => new Date(w.transaction_date||w.created_date).toLocaleDateString('en-CA',{timeZone:'Asia/Manila'})===todayStr);
    if (tab === '7days') {
      const cutoff = new Date(now.getTime() - 7*24*60*60*1000);
      return carWashes.filter(w => new Date(w.transaction_date||w.created_date) >= cutoff);
    }
    return carWashes.filter(w => {
      const d = new Date(w.transaction_date||w.created_date);
      return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    });
  };

  /* Build leaderboard — 1 car per wash, credit all employees in team */
  const buildBoard = () => {
    const map = {};
    employees.filter(e=>e.is_active&&(!e.business_type||e.business_type==='carwash')).forEach(e => {
      map[e.id] = { id:e.id, name:e.full_name, emp:e, cars:0, sales:0, commission:0 };
    });
    filterWashes().forEach(w => {
      // Determine which employees worked this wash
      const splits = (()=>{ const arr = parseArr(w.commission_splits); return arr.length>0 ? arr : [{employee_id:w.employee_id,employee_name:w.employee_name,amount:w.commission_amount||0}]; })();

      splits.forEach((sp, idx) => {
        const empId   = sp.employee_id || sp.id;
        const empName = sp.employee_name || sp.name || w.employee_name;
        if (!map[empId]) {
          const e = employees.find(x=>x.id===empId);
          map[empId] = { id:empId, name:empName, emp:e||null, cars:0, sales:0, commission:0 };
        }
        // Each employee gets +1 car for the wash (they all worked on it)
        map[empId].cars++;
        // Sales credited to primary employee only (to avoid inflating totals)
        if (idx === 0) map[empId].sales += (w.total_amount||0);
        // Commission credited individually
        map[empId].commission += (sp.amount || 0);
      });
    });
    return Object.values(map).sort((a,b) => b.cars-a.cars || b.sales-a.sales);
  };

  const ranked  = buildBoard();
  const maxCars = ranked[0]?.cars || 1;
  const leader  = ranked[0];
  const pos1    = ranked[0]; const pos2 = ranked[1]; const pos3 = ranked[2];

  /* Gap data */
  const gap2 = pos1 && pos2 ? (pos1.cars - pos2.cars) : null;
  const gap3 = pos1 && pos3 ? (pos1.cars - pos3.cars) : null;

  /* Colors for positions */
  const posColor = ['var(--gold)','var(--silver)','var(--bronze)'];
  const posLabel = ['1ST','2ND','3RD'];
  const tabLabels = { today:'Today', '7days':'7 Days', month:'This Month' };

  /* Podium order: 2nd, 1st, 3rd */
  const podiumOrder = [pos2, pos1, pos3];
  const podiumHeights = [110, 150, 90];
  const podiumColors  = [
    'rgba(184,188,194,.2)',
    'rgba(212,175,55,.25)',
    'rgba(184,115,51,.2)',
  ];
  const podiumBorders = [
    'rgba(184,188,194,.4)',
    'rgba(212,175,55,.5)',
    'rgba(184,115,51,.4)',
  ];

  return (
    <div>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <div style={{fontSize:22,fontWeight:900}}>Leaderboard</div>
          <div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{tabLabels[tab]} · {ranked.filter(r=>r.cars>0).length} active washers</div>
        </div>
        {campaign?.is_active && (
          <div style={{background:'rgba(212,175,55,.1)',border:'1px solid rgba(212,175,55,.3)',borderRadius:10,padding:'7px 13px',fontSize:12,fontWeight:700,color:'var(--gold)'}}>
            {campaign.campaign_name}
          </div>
        )}
      </div>

      {/* Period Tabs */}
      <div className="rank-tabs">
        {['today','7days','month'].map(t => (
          <div key={t} className={`rank-tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
            {tabLabels[t]}
          </div>
        ))}
      </div>

      {ranked.filter(r=>r.cars>0).length === 0 ? (
        <div className="card" style={{textAlign:'center',padding:'48px 24px'}}>
          <div style={{fontSize:40,marginBottom:12,opacity:.4}}>{Ic.trophy}</div>
          <div style={{fontSize:16,fontWeight:700,color:'var(--text2)'}}>No washes recorded yet</div>
          <div style={{fontSize:13,color:'var(--text2)',marginTop:4}}>Get washing to see the leaderboard!</div>
        </div>
      ) : (
        <>
          {/* ── PODIUM ── */}
          {ranked.filter(r=>r.cars>0).length >= 2 && (
            <div className="card mb-4" style={{paddingBottom:0,overflow:'hidden'}}>
              <div style={{textAlign:'center',fontSize:11,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:20}}>
                Podium
              </div>
              <div className="podium-wrap">
                {podiumOrder.map((r,idx) => {
                  if (!r) return <div key={idx} style={{flex:1,maxWidth:140}}></div>;
                  const isFirst = idx === 1;
                  const pColors = [posColor[1], posColor[0], posColor[2]];
                  const pC = pColors[idx];
                  return (
                    <div key={r.id} className="podium-slot">
                      <div className="podium-avatar-wrap">
                        {isFirst && <div className="podium-crown">&#x1F451;</div>}
                        <Av emp={r.emp||{full_name:r.name,avatar_color:'#D94A4A'}}
                          size={isFirst?64:50} fs={isFirst?22:18}
                          style={{border:`3px solid ${pC}`,borderRadius:'50%'}}
                        />
                      </div>
                      <div style={{fontSize:isFirst?14:12,fontWeight:800,marginBottom:6,color:pC}}>{r.name.split(' ')[0]}</div>
                      <div className="podium-bar" style={{height:podiumHeights[idx],background:podiumColors[idx],border:`1.5px solid ${podiumBorders[idx]}`,borderBottom:'none'}}>
                        <div className="podium-cars" style={{color:pC}}>{r.cars}</div>
                        <div className="podium-cars-label">CARS</div>
                        <div style={{fontSize:11,color:pC,marginTop:4,fontWeight:700,opacity:.85}}>{peso(r.sales)}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ── GAP COMPARISON BOARD ── */}
          {ranked.length > 0 && ranked[0] && ranked[0].cars > 0 && (
            <div className="gap-board mb-4">
              <div className="gap-board-title">
                <span style={{color:'var(--red)'}}>{Ic.gap}</span>
                Gap to Leader — {pos1.name.split(' ')[0]}
              </div>

              {ranked.filter(r=>r.cars>0).map((r, i) => {
                const pct      = maxCars > 0 ? (r.cars / maxCars) * 100 : 0;
                const gapCars  = pos1.cars - r.cars;
                const gapSales = pos1.sales - r.sales;
                const barColor = i===0 ? 'var(--gold)' : i===1 ? 'var(--silver)' : i===2 ? 'var(--bronze)' : 'var(--red)';

                return (
                  <div key={r.id} className="gap-row" style={{animationDelay:`${i*.06}s`}}>
                    <div className="gap-pos" style={{color: i<3?posColor[i]:'var(--text2)'}}>
                      {i<3 ? posLabel[i] : `#${i+1}`}
                    </div>
                    <div className="gap-bar-wrap">
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                        <span style={{fontSize:12,fontWeight:700}}>{r.name}</span>
                        {i===0 ? (
                          <span className="gap-behind leading">LEADER</span>
                        ) : (
                          <span className="gap-behind">
                            -{gapCars} car{gapCars!==1?'s':''} · -{peso(gapSales)}
                          </span>
                        )}
                      </div>
                      <div className="gap-bar-bg">
                        <div className="gap-bar-fill" style={{width:`${pct}%`,background:barColor,opacity:.85}}>
                          {pct > 20 && <span className="gap-bar-label">{r.cars}c</span>}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* ── COMMISSION CARDS ── */}
          <div className="card mb-4">
            <div className="section-title" style={{fontSize:13,marginBottom:16}}>
              <span style={{color:'var(--gold)'}}>{Ic.bolt}</span> Commission Earned
            </div>
            <div className="comm-cards">
              {ranked.filter(r=>r.cars>0).map((r,i) => (
                <div key={r.id} className="comm-card" style={{borderColor: i<3 ? `${['rgba(212,175,55,.3)','rgba(184,188,194,.25)','rgba(184,115,51,.25)'][i]}` : 'var(--border)'}}>
                  <div className="comm-card-rank" style={{color:i<3?posColor[i]:'var(--text2)'}}>{i<3?posLabel[i]:`#${i+1}`}</div>
                  <div className="comm-card-avatar">
                    <Av emp={r.emp||{full_name:r.name,avatar_color:'#D94A4A'}} size={44} fs={16} />
                  </div>
                  <div className="comm-card-name">{r.name.split(' ')[0]}</div>
                  <div className="comm-card-comm" style={{color:i<3?posColor[i]:'var(--text)'}}>{peso(r.commission)}</div>
                  <div className="comm-card-cars">{r.cars} cars · {peso(r.sales)}</div>
                </div>
              ))}
            </div>
          </div>

          {/* ── FULL RANKED LIST ── */}
          <div className="card">
            <div className="section-title" style={{fontSize:13,marginBottom:16}}>
              Full Standings
            </div>
            {ranked.map((r,i) => {
              const pct = maxCars > 0 ? (r.cars/maxCars)*100 : 0;
              const bColor = i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':'var(--red)';
              return (
                <div key={r.id} className={`rank-list-item ${i<3?`pos-${i+1}`:''}`} style={{animationDelay:`${i*.05}s`}}>
                  <div className="rl-pos" style={{color:i<3?posColor[i]:'var(--text2)',fontSize:i<3?'11px':'12px'}}>{i<3?posLabel[i]:`#${i+1}`}</div>
                  <Av emp={r.emp||{full_name:r.name}} size={40} fs={14} />
                  <div className="rl-info">
                    <div className="rl-name">{r.name}</div>
                    <div className="rl-bar">
                      <div className="progress-bar">
                        <div className="progress-fill" style={{width:`${pct}%`,background:bColor}}></div>
                      </div>
                    </div>
                    <div className="rl-stats">{peso(r.sales)} · comm {peso(r.commission)}</div>
                  </div>
                  <div className="rl-right">
                    <div className="rl-cars" style={{color:bColor}}>{r.cars}</div>
                    <div className="rl-clabel">cars</div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* ── ACTIVE CAMPAIGN REWARDS ── */}
          {campaign?.is_active && (
            <div style={{marginTop:18,background:'rgba(212,175,55,.07)',border:'1px solid rgba(212,175,55,.25)',borderRadius:16,padding:20}}>
              <div style={{fontWeight:800,fontSize:14,color:'var(--gold)',marginBottom:14}}>Active Campaign Rewards — {campaign.campaign_name}</div>
              <div className="grid-3" style={{gap:10}}>
                {[
                  {pos:'1ST',reward:campaign.first_place_reward,color:posColor[0],emp:ranked[0]},
                  {pos:'2ND',reward:campaign.second_place_reward,color:posColor[1],emp:ranked[1]},
                  {pos:'3RD',reward:campaign.third_place_reward, color:posColor[2],emp:ranked[2]},
                ].map((x,i) => (
                  <div key={i} style={{background:'rgba(255,255,255,.04)',border:`1px solid ${x.color}30`,borderRadius:12,padding:14,textAlign:'center'}}>
                    <div style={{fontSize:11,fontWeight:700,color:x.color,marginBottom:6}}>{x.pos} PLACE</div>
                    {x.emp && x.emp.cars > 0 && <Av emp={x.emp.emp||{full_name:x.emp.name}} size={36} fs={13} />}
                    <div style={{fontWeight:800,color:x.color,fontSize:18,marginTop:6}}>{peso(x.reward)}</div>
                    <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>{x.emp && x.emp.cars > 0 ? x.emp.name.split(' ')[0] : 'TBD'}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════ */
function Dashboard({ carWashes, employees, services, campaign, setPage }) {
  const now = new Date();
  const [filter, setFilter] = React.useState('today');
  const [customFrom, setCustomFrom] = React.useState('');
  const [customTo,   setCustomTo]   = React.useState('');

  // ── date helpers (Manila-aware) ──
  const manilaToday = () => {
    return new Date().toLocaleDateString('en-CA', {timeZone:'Asia/Manila'}); // YYYY-MM-DD
  };
  const manilaDate = dt => {
    const d = new Date(dt);
    return d.toLocaleDateString('en-CA', {timeZone:'Asia/Manila'});
  };

  const getFiltered = () => {
    const todayStr = manilaToday();
    if (filter==='today') return carWashes.filter(w=>manilaDate(w.transaction_date||w.created_date)===todayStr);
    if (filter==='yesterday') {
      const yest = new Date(); yest.setDate(yest.getDate()-1);
      const yestStr = yest.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
      return carWashes.filter(w=>manilaDate(w.transaction_date||w.created_date)===yestStr);
    }
    if (filter==='7days') {
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-6); cutoff.setHours(0,0,0,0);
      return carWashes.filter(w=>new Date(w.transaction_date||w.created_date)>=cutoff);
    }
    if (filter==='14days') {
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-13); cutoff.setHours(0,0,0,0);
      return carWashes.filter(w=>new Date(w.transaction_date||w.created_date)>=cutoff);
    }
    if (filter==='month') {
      return carWashes.filter(w=>{ const d=new Date(w.transaction_date||w.created_date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
    }
    if (filter==='custom' && customFrom && customTo) {
      return carWashes.filter(w=>{ const s=manilaDate(w.transaction_date||w.created_date); return s>=customFrom&&s<=customTo; });
    }
    return carWashes;
  };

  const filtered   = getFiltered();
  const totalSales = filtered.reduce((s,w)=>s+(w.total_amount||0),0);
  const totalComm  = filtered.reduce((s,w)=>s+(w.commission_amount||0),0);
  const avgSale    = filtered.length>0 ? totalSales/filtered.length : 0;

  // Today always for "top today" stat
  const todayStr = manilaToday();
  const todayW   = carWashes.filter(w=>manilaDate(w.transaction_date||w.created_date)===todayStr);

  const empMap = {};
  filtered.forEach(w => {
    const splits = (()=>{ try{ const a=Array.isArray(w.commission_splits)?w.commission_splits:[]; return a.map(s=>typeof s==='string'?JSON.parse(s):s); }catch{return[];} })();
    if(splits.length>0){
      const teamSize = splits.length;
      const splitAmt = (w.total_amount||0) / teamSize; // each member gets their share of total
      splits.forEach(sp=>{ const id=sp.employee_id||sp.id; if(!id)return; if(!empMap[id])empMap[id]={name:sp.employee_name||sp.name||'',id,cars:0,sales:0,teamCars:0}; empMap[id].cars++; empMap[id].sales+=splitAmt; if(teamSize>1) empMap[id].teamCars++; });
    } else {
      if(!w.employee_id)return; if(!empMap[w.employee_id])empMap[w.employee_id]={name:w.employee_name||'',id:w.employee_id,cars:0,sales:0,teamCars:0}; empMap[w.employee_id].cars++; empMap[w.employee_id].sales+=(w.total_amount||0);
    }
  });
  const topEmp  = Object.values(empMap).sort((a,b)=>b.cars-a.cars||b.sales-a.sales)[0];
  const ranking = Object.values(empMap).sort((a,b)=>b.cars-a.cars||b.sales-a.sales).slice(0,3);
  const recent  = [...carWashes].sort((a,b)=>new Date(b.transaction_date||b.created_date)-new Date(a.transaction_date||a.created_date)).slice(0,5);

  const filterLabels = {today:'Today',yesterday:'Yesterday','7days':'Last 7 Days','14days':'Last 14 Days',month:'This Month',custom:'Custom'};
  const periodLabel  = filterLabels[filter]||'';
  const timeNow = now.toLocaleString('en-PH',{timeZone:'Asia/Manila',weekday:'long',month:'long',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const posColors=['var(--gold)','var(--silver)','var(--bronze)'];
  const posLabels=['1ST','2ND','3RD'];

  return (
    <div>
      <div className="hero-header blue">
        <div style={{position:'relative',zIndex:1}}>
          <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}>{timeNow}</div>
          <div style={{fontSize:26,fontWeight:900,marginBottom:4,color:'var(--blue)',textShadow:'0 0 20px rgba(77,166,255,0.4)'}}>🚗 KGCAR Carwash</div>
          <div style={{fontSize:13,color:'var(--text2)'}}>Here's your car wash business overview.</div>
        </div>
      </div>

      {/* Period filter */}
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14,padding:'0 2px'}}>
        {[{k:'today',l:'Today'},{k:'yesterday',l:'Yesterday'},{k:'7days',l:'7 Days'},{k:'14days',l:'14 Days'},{k:'month',l:'Month'},{k:'custom',l:'Custom'}].map(t=>(
          <button key={t.k}
            className={`btn btn-sm ${filter===t.k?'btn-blue':'btn-ghost'}`}
            onClick={()=>setFilter(t.k)}
            style={{borderRadius:20,fontSize:12,fontWeight:700,padding:'6px 14px'}}>
            {t.l}
          </button>
        ))}
      </div>
      {filter==='custom'&&(
        <div style={{display:'flex',gap:8,marginBottom:14,alignItems:'center',flexWrap:'wrap'}}>
          <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)}
            style={{flex:1,minWidth:130,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontSize:13}}/>
          <span style={{color:'var(--text2)',fontSize:12}}>to</span>
          <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)}
            style={{flex:1,minWidth:130,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontSize:13}}/>
        </div>
      )}

      <div className="stats-grid">
        {[
          {label:`Cars (${periodLabel})`,   value:filtered.length,    sub:`${todayW.length} today`,           cls:'stat-blue',   color:'var(--blue)'},
          {label:`Sales (${periodLabel})`,  value:peso(totalSales),   sub:`avg ${peso(avgSale)} / car`,       cls:'stat-green',  color:'var(--success)'},
          {label:'Commission',              value:peso(totalComm),    sub:`${periodLabel}`,                   cls:'stat-yellow', color:'var(--gold)'},
          {label:'Top Performer',           value:topEmp?topEmp.name.split(' ')[0]:'—', sub:topEmp?`${topEmp.cars} cars · ${peso(topEmp.sales)}`:'No data yet', cls:'stat-gray', color:'var(--silver)'},
        ].map((s,i)=>(
          <div key={i} className={`stat-card ${s.cls}`}>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value" style={{color:s.color}}>{s.value}</div>
            <div className="stat-sub">{s.sub}</div>
          </div>
        ))}
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="section-title">{periodLabel} — Top Washers</div>
          {ranking.length===0
            ? <div style={{textAlign:'center',padding:'24px 0',color:'var(--text2)',fontSize:13}}>No transactions for this period</div>
            : ranking.map((r,i) => {
                const emp = employees.find(e=>e.id===r.id);
                return (
                  <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                    <div style={{fontSize:11,fontWeight:800,color:posColors[i],minWidth:28,textAlign:'center'}}>{posLabels[i]}</div>
                    <Av emp={emp||{full_name:r.name,avatar_color:'#D94A4A'}} size={36} fs={13} />
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,display:'flex',alignItems:'center',gap:6}}>
                        {r.name}
                        {r.teamCars>0 && <span style={{fontSize:9,fontWeight:800,background:'rgba(212,175,55,0.18)',color:'var(--gold)',border:'1px solid rgba(212,175,55,0.4)',borderRadius:4,padding:'1px 5px',letterSpacing:.5}}>TEAM</span>}
                      </div>
                      <div style={{fontSize:11,color:'var(--text2)'}}>{r.cars} cars · {peso(r.sales)}</div>
                    </div>
                    <div style={{fontSize:18,fontWeight:900,color:posColors[i]}}>{r.cars}</div>
                  </div>
                );
              })}
        </div>

        <div className="card">
          <div className="section-title">Recent Transactions</div>
          {recent.length===0
            ? <div style={{textAlign:'center',padding:'24px 0',color:'var(--text2)',fontSize:13}}>No transactions yet</div>
            : recent.map((w,i) => {
                const emp = employees.find(e=>e.id===w.employee_id);
                return (
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                    {(() => {
                      const rSplits = parseArr(w.commission_splits);
                      const isTeamTx = rSplits.length > 1;
                      const dispName = isTeamTx ? w.employee_name : (emp?.full_name||w.employee_name);
                      const dispEmp  = isTeamTx ? {full_name:w.employee_name, avatar_color:'#D4AF37'} : (emp||{full_name:w.employee_name});
                      return (<>
                        <Av emp={dispEmp} size={32} fs={12} />
                        <div style={{flex:1}}>
                          <div style={{fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:5}}>
                            {dispName}
                            {isTeamTx && <span style={{fontSize:9,fontWeight:800,background:'rgba(212,175,55,0.18)',color:'var(--gold)',border:'1px solid rgba(212,175,55,0.4)',borderRadius:4,padding:'1px 5px'}}>TEAM</span>}
                          </div>
                          <div style={{fontSize:11,color:'var(--text2)'}}>{manilaDate(w.transaction_date||w.created_date)} · {parseArr(w.services).length||0} svc</div>
                        </div>
                        <div style={{fontSize:13,fontWeight:700,color:'var(--blue)'}}>{peso(w.total_amount)}</div>
                      </>);
                    })()}
                  </div>
                );
              })}
          <button className="btn btn-blue btn-sm" style={{width:'100%',marginTop:10}} onClick={()=>setPage('transactions')}>View All →</button>
        </div>
      </div>

      {campaign?.is_active && (
        <div style={{marginTop:16,background:'rgba(212,175,55,.08)',border:'1px solid rgba(212,175,55,.25)',borderRadius:16,padding:18}}>
          <div style={{fontWeight:800,color:'var(--gold)',marginBottom:10,fontSize:14}}>Active Campaign — {campaign.campaign_name}</div>
          <div style={{display:'flex',gap:10}}>
            {[{pos:'1st',r:campaign.first_place_reward,c:'var(--gold)'},{pos:'2nd',r:campaign.second_place_reward,c:'var(--silver)'},{pos:'3rd',r:campaign.third_place_reward,c:'var(--bronze)'}].map((x,i)=>(
              <div key={i} style={{flex:1,background:'rgba(255,255,255,.04)',border:`1px solid ${x.c}30`,borderRadius:10,padding:12,textAlign:'center'}}>
                <div style={{fontWeight:800,color:x.c,fontSize:16}}>{peso(x.r)}</div>
                <div style={{fontSize:11,color:'var(--text2)'}}>{x.pos} Place</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{marginTop:16,textAlign:'center'}}>
        <button className="btn btn-primary btn-lg" onClick={()=>setPage('record')} style={{gap:10}}>
          {Ic.plus} Record New Car Wash
        </button>
      </div>
    </div>
  );
}
/* ═══════════════════════════════════════════
   RECORD CAR WASH
═══════════════════════════════════════════ */
function RecordCarWash({ employees, services, vlcProducts=[], onSave, showToast }) {
  const [selectedSvcs, setSelectedSvcs] = useState([]);
  const [selectedEmps, setSelectedEmps] = useState([]); // array of emp objects, max 3
  const [productsUsed, setProductsUsed] = useState([]); // [{id,name,price,cost}]
  const [custName,     setCustName]     = useState('');
  const [plate,        setPlate]        = useState('');
  const [amtPaid,      setAmtPaid]      = useState('');
  const [saving,       setSaving]       = useState(false);
  const [showOK,       setShowOK]       = useState(false);
  const [lastSaved,    setLastSaved]    = useState(null);
  const [isPaid,       setIsPaid]       = useState(true);

  const activeSvcs  = services.filter(s=>s.is_active&&(!s.business_type||s.business_type==='carwash'));
  const activeEmps  = employees.filter(e=>e.is_active&&(!e.business_type||e.business_type==='carwash'));
  // Carwash can also use vulcanizing products (consumables like wax, soap, etc.)
  const activeProds = (vlcProducts||[]).filter(p=>p.is_active);

  const total        = selectedSvcs.reduce((s,v)=>s+(v.price||0),0);
  const totalProdCost = productsUsed.reduce((s,p)=>s+(parseFloat(p.cost)||0),0);
  const netForComm   = Math.max(0, total - totalProdCost); // commission base = total - product costs

  const addProduct = prod => {
    setProductsUsed(p=>[...p,{id:prod.id,name:prod.name,price:parseFloat(prod.price)||0,cost:parseFloat(prod.default_cost||prod.cost)||0}]);
  };
  const removeProduct = i => setProductsUsed(p=>p.filter((_,idx)=>idx!==i));
  const updateProd = (i,field,val) => setProductsUsed(p=>p.map((item,idx)=>idx===i?{...item,[field]:parseFloat(val)||0}:item));

  // Split commission evenly across all selected employees — based on NET amount
  const splitCommission = () => {
    if (!selectedEmps.length) return [];
    return selectedEmps.map(emp => {
      const rate = emp.commission_percentage || 0;
      const share = (netForComm * rate / 100) / selectedEmps.length;
      return { emp, rate, share };
    });
  };
  const commSplits  = splitCommission();
  const totalComm   = commSplits.reduce((s,c)=>s+c.share,0);

  const toggleEmp = (emp) => {
    setSelectedEmps(prev => {
      const exists = prev.find(e=>e.id===emp.id);
      if (exists) return prev.filter(e=>e.id!==emp.id);
      if (prev.length >= 3) { showToast('Max 3 employees per wash','warning'); return prev; }
      return [...prev, emp];
    });
  };

  const toggleSvc = svc => setSelectedSvcs(p => p.find(s=>s.id===svc.id) ? p.filter(s=>s.id!==svc.id) : [...p,svc]);
  const reset = () => { setSelectedSvcs([]); setSelectedEmps([]); setProductsUsed([]); setCustName(''); setPlate(''); setAmtPaid(''); setLastSaved(null); setIsPaid(true); };

  const handleSave = async () => {
    if (!selectedEmps.length)   return showToast('Select at least one employee','warning');
    if (!selectedSvcs.length)   return showToast('Select at least one service','warning');
    setSaving(true);
    try {
      const splits   = splitCommission();
      const txDate   = new Date().toISOString();
      const paid     = parseFloat(amtPaid)||total;
      const empNames = splits.map(c=>c.emp.full_name).join(', ');
      const totalCommissionAmt = splits.reduce((s,c)=>s+c.share,0);

      // Save ONE record per car wash (not per employee)
      // Array fields stored as JSON strings (Base44 requirement)
      const empsSplit   = splits.map(({emp,rate,share})=>({
        id: emp.id, name: emp.full_name,
        commission_rate: rate, commission_amount: share
      }));
      const commsSplit  = splits.map(({emp,rate,share})=>({
        employee_id: emp.id, employee_name: emp.full_name,
        rate, amount: share
      }));
      const saved = await api('create','CarWash',{data:{
        customer_name:      custName,
        plate_number:       plate,
        employee_id:        splits[0].emp.id,
        employee_name:      empNames,
        services:           selectedSvcs.map(s=>JSON.stringify(s)),
        products_used:      productsUsed.map(p=>JSON.stringify(p)),
        total_amount:       total,
        amount_paid:        paid,
        payment_status:     isPaid ? 'paid' : 'unpaid',
        commission_rate:    splits[0].rate,
        commission_amount:  totalCommissionAmt,
        transaction_date:   txDate,
        notes:              splits.length > 1 ? `Team wash: ${empNames}` : '',
        employees:          empsSplit.map(e=>JSON.stringify(e)),
        commission_splits:  commsSplit.map(c=>JSON.stringify(c)),
      }});

      logEvent({
        event_type:  'wash_recorded',
        title:       `Wash recorded — ${empNames}`,
        description: `${selectedSvcs.map(s=>s.name).join(', ')}${plate?' | '+plate:''}${custName?' | '+custName:''}`,
        actor_name:  splits[0].emp.full_name,
        entity_id:   saved?.id||'',
        amount:      total,
      });

      setLastSaved({ total, splits, svcs: selectedSvcs, paid, netForComm, totalProdCost, prods: productsUsed });
      onSave(saved);  // single record
      setShowOK(true);
      setTimeout(()=>{setShowOK(false);reset();},900);
    } catch(e) { showToast('Error: '+e.message,'error'); }
    finally { setSaving(false); }
  };

  if (showOK && lastSaved) return (
    <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:9999,pointerEvents:'none'}}>
      <div style={{
        background:'var(--bg2)',
        border:'2px solid var(--success)',
        borderRadius:20,
        padding:'24px 36px',
        textAlign:'center',
        boxShadow:'0 8px 40px rgba(34,197,94,0.25)',
        animation:'popIn .15s ease-out',
        pointerEvents:'auto',
        minWidth:220,
      }}>
        <div style={{fontSize:40,marginBottom:6}}>✅</div>
        <div style={{fontSize:18,fontWeight:900,color:'var(--success)',marginBottom:4}}>Job Order Created!</div>
        <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:2}}>
          {lastSaved.svcs.map(s=>s.name).join(' · ')||'Car Wash'}
        </div>
        <div style={{fontSize:14,fontWeight:800,color:'var(--blue)',marginTop:4}}>{peso(lastSaved.total)}</div>
      </div>
    </div>
  );

  const timeStr = new Date().toLocaleString('en-PH',{month:'long',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'Asia/Manila'});

  return (
    <div>
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:14,marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontWeight:700,fontSize:14}}>Quick Entry</div>
        <div style={{fontSize:11,color:'var(--text2)'}}>{timeStr}</div>
      </div>

      {/* Customer Info */}
      <div className="card mb-4">
        <div style={{fontWeight:700,fontSize:11,marginBottom:12,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.5px'}}>Customer Info <span style={{fontWeight:400,textTransform:'none'}}>(optional)</span></div>
        <div className="grid-2">
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Customer Name</label>
            <input className="form-input" placeholder="Juan dela Cruz" value={custName} onChange={e=>setCustName(e.target.value)} />
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Plate Number</label>
            <input className="form-input" placeholder="ABC 1234" value={plate} onChange={e=>setPlate(e.target.value.toUpperCase())} />
          </div>
        </div>
      </div>

      {/* Services */}
      <div className="card mb-4">
        <div style={{fontWeight:700,fontSize:11,marginBottom:12,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.5px'}}>Select Services</div>
        <div className="service-grid">
          {activeSvcs.map(svc => {
            const sel = selectedSvcs.find(s=>s.id===svc.id);
            return (
              <div key={svc.id} className={`service-item ${sel?'selected':''}`} onClick={()=>toggleSvc(svc)}>
                <div className="svc-check">{sel && Ic.check}</div>
                <div style={{flex:1}}>
                  <div className="svc-name">{svc.name}</div>
                  <div className="svc-price">{peso(svc.price)}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Products Used (optional) */}
      {activeProds.length>0 && (
        <div className="card mb-4" style={{border:'1px solid rgba(34,197,94,0.18)',background:'rgba(34,197,94,0.02)'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
            <div style={{fontWeight:700,fontSize:11,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'1px'}}>
              🧴 Products Used <span style={{fontWeight:400,textTransform:'none',color:'var(--text2)',fontSize:10}}>(deducted from commission)</span>
            </div>
            {productsUsed.length>0&&<div style={{fontSize:11,fontWeight:700,color:'var(--red)',background:'rgba(217,74,74,0.1)',padding:'2px 8px',borderRadius:20,border:'1px solid rgba(217,74,74,0.2)'}}>-{peso(totalProdCost)} cost</div>}
          </div>
          {/* Product chips */}
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:productsUsed.length>0?10:0}}>
            {activeProds.map(prod=>(
              <button key={prod.id} onClick={()=>addProduct(prod)}
                style={{padding:'8px 12px',borderRadius:20,border:'1px solid var(--border)',fontSize:12,fontWeight:600,
                  background:'rgba(255,255,255,0.04)',color:'var(--text)',cursor:'pointer',transition:'all .2s',
                  minHeight:38,display:'flex',alignItems:'center',gap:5}}
                onMouseOver={e=>{e.currentTarget.style.borderColor='var(--success)';e.currentTarget.style.background='rgba(34,197,94,0.08)';}}
                onMouseOut={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='rgba(255,255,255,0.04)';}}>
                <span style={{color:'var(--success)',fontWeight:900}}>+</span> {prod.name}
                <span style={{color:'var(--red)',fontSize:11}}>₱{prod.default_cost||prod.cost||0}</span>
              </button>
            ))}
          </div>
          {/* Added products */}
          {productsUsed.length>0 && (
            <div style={{borderTop:'1px solid var(--border)',paddingTop:8}}>
              {productsUsed.map((p,i)=>(
                <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 80px 32px',gap:6,alignItems:'center',
                  marginBottom:6,background:'rgba(255,255,255,0.04)',borderRadius:8,padding:'8px 10px',border:'1px solid rgba(255,255,255,0.06)'}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:700}}>{p.name}</div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:4}}>
                    <span style={{fontSize:10,color:'var(--text2)'}}>Cost ₱</span>
                    <input type="number" value={p.cost} onChange={e=>updateProd(i,'cost',e.target.value)}
                      style={{width:'100%',background:'var(--bg)',border:'2px solid rgba(217,74,74,0.5)',borderRadius:6,
                        padding:'5px 6px',color:'var(--red)',fontSize:13,textAlign:'center',fontWeight:800,boxSizing:'border-box'}}/>
                  </div>
                  <button onClick={()=>removeProduct(i)}
                    style={{width:30,height:30,background:'rgba(217,74,74,0.1)',border:'1px solid rgba(217,74,74,0.25)',
                      borderRadius:7,color:'var(--red)',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',
                      justifyContent:'center',padding:0}}>×</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Multi-employee selector */}
      <div className="card mb-4">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:11,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'1px'}}>
            Who did the wash?
          </div>
          <div style={{fontSize:11,color: selectedEmps.length>0?'var(--gold)':'var(--text2)',fontWeight:700}}>
            {selectedEmps.length === 0 ? 'Tap to select (max 3)' :
             selectedEmps.length === 1 ? '1 person selected' :
             `${selectedEmps.length} people — commission split`}
          </div>
        </div>

        {/* Team badge strip */}
        {selectedEmps.length > 1 && (
          <div style={{display:'flex',gap:6,marginBottom:12,padding:'8px 10px',background:'rgba(212,175,55,.08)',borderRadius:10,border:'1px solid rgba(212,175,55,.2)',flexWrap:'wrap'}}>
            <span style={{fontSize:11,color:'var(--gold)',fontWeight:700,marginRight:4}}>Team:</span>
            {selectedEmps.map((emp,i)=>(
              <span key={emp.id} style={{fontSize:11,color:'var(--text)',background:'rgba(255,255,255,.07)',borderRadius:6,padding:'2px 8px'}}>
                {emp.full_name.split(' ')[0]}
                {selectedEmps.length > 0 && <span style={{color:'var(--success)',marginLeft:4}}>({peso((netForComm*(emp.commission_percentage||0)/100)/selectedEmps.length)})</span>}
              </span>
            ))}
          </div>
        )}

        <div className="emp-grid">
          {activeEmps.map(emp => {
            const selIdx = selectedEmps.findIndex(e=>e.id===emp.id);
            const isSelected = selIdx >= 0;
            const orderNum = isSelected ? selIdx + 1 : null;
            return (
              <div key={emp.id}
                className={`emp-card ${isSelected?'selected':''}`}
                onClick={()=>toggleEmp(emp)}
                style={{position:'relative'}}>
                {isSelected && (
                  <div style={{position:'absolute',top:6,right:6,width:18,height:18,background:'var(--gold)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:900,color:'#1E1E22',zIndex:2}}>
                    {orderNum}
                  </div>
                )}
                <Av emp={emp} size={48} fs={17} />
                <div className="emp-name">{emp.full_name.split(' ')[0]}</div>
                <div className="emp-comm" style={{color:isSelected?'var(--gold)':'var(--text2)'}}>
                  {isSelected && selectedEmps.length > 1
                    ? `${peso((netForComm*(emp.commission_percentage||0)/100)/selectedEmps.length)}`
                    : isSelected
                    ? `${peso(netForComm*(emp.commission_percentage||0)/100)}`
                    : `${emp.commission_percentage}%`}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Summary */}
      {(selectedSvcs.length>0 || selectedEmps.length>0) && (
        <div className="summary-box mb-4">
          <div style={{fontWeight:700,fontSize:11,marginBottom:10,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.5px'}}>Summary</div>
          {selectedSvcs.map(s=>(
            <div key={s.id} className="summary-row">
              <span className="lbl">{s.name}</span><span className="val">{peso(s.price)}</span>
            </div>
          ))}
          <hr className="divider" />
          <div className="summary-row">
            <span className="lbl">Total</span>
            <span className="val" style={{fontSize:18,color:'var(--blue)'}}>{peso(total)}</span>
          </div>
          {totalProdCost>0&&(
            <div className="summary-row">
              <span className="lbl" style={{color:'var(--red)'}}>Product Cost</span>
              <span className="val" style={{color:'var(--red)'}}>- {peso(totalProdCost)}</span>
            </div>
          )}
          {totalProdCost>0&&(
            <div className="summary-row" style={{paddingBottom:8,borderBottom:'1px solid var(--border)',marginBottom:4}}>
              <span className="lbl" style={{fontWeight:700}}>Commission Base</span>
              <span className="val" style={{color:'var(--text)',fontWeight:800}}>{peso(netForComm)}</span>
            </div>
          )}
          {commSplits.map(({emp,rate,share},i)=>(
            <div key={i} className="summary-row">
              <span className="lbl">
                {emp.full_name.split(' ')[0]} {rate}% comm.
                {commSplits.length>1 && <span style={{color:'var(--text2)',fontSize:10}}> (÷{commSplits.length})</span>}
              </span>
              <span className="val" style={{color:'var(--success)'}}>{peso(share)}</span>
            </div>
          ))}
          {commSplits.length > 1 && (
            <div className="summary-row" style={{marginTop:6,paddingTop:6,borderTop:'1px solid var(--border)'}}>
              <span className="lbl" style={{fontWeight:700}}>Total Commission</span>
              <span className="val" style={{color:'var(--gold)',fontWeight:800}}>{peso(totalComm)}</span>
            </div>
          )}
        </div>
      )}

      {/* Amount Paid + Payment Status */}
      <div className="card mb-4">
        <div className="form-group" style={{marginBottom:12}}>
          <label className="form-label">Amount Paid</label>
          <input className="form-input" type="number" placeholder={total||'0'} value={amtPaid} onChange={e=>setAmtPaid(e.target.value)} style={{fontSize:24,fontWeight:800,textAlign:'center',padding:16}} />
        </div>
        {/* Payment status toggle */}
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setIsPaid(true)}
            style={{flex:1,padding:'10px 0',borderRadius:10,border:'none',cursor:'pointer',fontWeight:800,fontSize:13,transition:'all .2s',
              background: isPaid ? 'rgba(34,197,94,0.18)' : 'rgba(255,255,255,0.05)',
              color:       isPaid ? 'var(--success)'       : 'var(--text2)',
              outline:     isPaid ? '2px solid var(--success)' : '2px solid transparent'}}>
            ✅ PAID
          </button>
          <button onClick={()=>setIsPaid(false)}
            style={{flex:1,padding:'10px 0',borderRadius:10,border:'none',cursor:'pointer',fontWeight:800,fontSize:13,transition:'all .2s',
              background: !isPaid ? 'rgba(217,74,74,0.18)' : 'rgba(255,255,255,0.05)',
              color:       !isPaid ? 'var(--red)'           : 'var(--text2)',
              outline:     !isPaid ? '2px solid var(--red)' : '2px solid transparent'}}>
            ❌ UNPAID
          </button>
        </div>
      </div>

      <button className="btn btn-success btn-xl" onClick={handleSave} disabled={saving}>
        {saving ? 'Saving...' : selectedEmps.length > 1 ? `Record — Team of ${selectedEmps.length}` : 'Record Car Wash'}
      </button>
    </div>
  );
}

/* ═══════════════════════════════════════════
   TRANSACTIONS
═══════════════════════════════════════════ */
function Transactions({ carWashes, employees, services=[], onDelete, onRefresh, showToast, isAdmin=true }) {
  const [filter,     setFilter]     = useState('today');
  const [customFrom, setCustomFrom] = useState('');
  const [customTo,   setCustomTo]   = useState('');
  const [search,  setSearch]  = useState('');
  const [showSuggestions, setShowSuggestions] = useState(false);
  const [confirm, setConfirm] = useState(null);
  const [editWash, setEditWash] = useState(null);
  const [editForm, setEditForm] = useState(null);
  const [saving,   setSaving]  = useState(false);
  const now=new Date();
  const manilaDate = dt => { const d=typeof dt==='string'&&!dt.endsWith('Z')&&!dt.includes('+') ? new Date(dt+'Z') : new Date(dt); return d.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}); };
  const activeEmps = employees.filter(e=>e.is_active&&(!e.business_type||e.business_type==='carwash'));
  const activeSvcs = services.filter(s=>s.is_active&&(!s.business_type||s.business_type==='carwash'));

  const applyPeriod = list => {
    // Always compute fresh — avoids stale date if page open overnight
    const todayStr   = new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
    const nowDate    = new Date();
    if (filter==='today') return list.filter(w => manilaDate(w.transaction_date||w.created_date)===todayStr);
    if (filter==='yesterday') {
      const y=new Date(); y.setDate(y.getDate()-1);
      const yStr=y.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
      return list.filter(w => manilaDate(w.transaction_date||w.created_date)===yStr);
    }
    if (filter==='7days') {
      // Use Manila-aware cutoff: start of 7 days ago in Manila time
      const cut = new Date(); cut.setDate(cut.getDate()-6);
      const cutStr = cut.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
      return list.filter(w => manilaDate(w.transaction_date||w.created_date)>=cutStr);
    }
    if (filter==='14days') {
      const cut = new Date(); cut.setDate(cut.getDate()-13);
      const cutStr = cut.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
      return list.filter(w => manilaDate(w.transaction_date||w.created_date)>=cutStr);
    }
    if (filter==='month') return list.filter(w => {
      const d=utcDate(w.transaction_date||w.created_date);
      return d.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}).slice(0,7)===todayStr.slice(0,7);
    });
    if (filter==='custom'&&customFrom&&customTo) return list.filter(w => {
      const s=manilaDate(w.transaction_date||w.created_date); return s>=customFrom&&s<=customTo;
    });
    return list;
  };

  const filtered = applyPeriod(carWashes.filter(w => {
    if (!search) return true;
    const q = search.toLowerCase().trim();
    // 1. Direct text matches
    if ((w.employee_name||'').toLowerCase().includes(q)) return true;
    if ((w.plate_number||'').toLowerCase().includes(q))  return true;
    if ((w.customer_name||'').toLowerCase().includes(q)) return true;
    // 2. Check employees array for name or id match
    try {
      const emps = parseArr(w.employees);
      if (emps.some(e=>(e.name||'').toLowerCase().includes(q))) return true;
    } catch(e) {}
    // 3. Check commission_splits for name match
    try {
      const splits = parseArr(w.commission_splits);
      if (splits.some(s=>(s.employee_name||'').toLowerCase().includes(q))) return true;
    } catch(e) {}
    // 4. Match by employee ID (if exact employee found by name)
    const matchedEmp = employees.find(e => e.full_name.toLowerCase().includes(q));
    if (matchedEmp) {
      if (w.employee_id === matchedEmp.id) return true;
      try {
        const splits = parseArr(w.commission_splits);
        if (splits.some(s => s.employee_id===matchedEmp.id || s.id===matchedEmp.id)) return true;
      } catch(e) {}
      try {
        const emps = parseArr(w.employees);
        if (emps.some(e => e.id===matchedEmp.id)) return true;
      } catch(e) {}
    }
    return false;
  })).sort((a,b)=>new Date(b.transaction_date||b.created_date)-new Date(a.transaction_date||a.created_date));

  const tSales=filtered.reduce((s,w)=>s+(w.total_amount||0),0);
  const tComm=filtered.reduce((s,w)=>s+(w.commission_amount||0),0);

  /* ── Edit helpers ── */
  const openEdit = w => {
    const emps = parseArr(w.employees);
    const splits = parseArr(w.commission_splits);
    // build selected employees list: [{id, name, rate, amount}]
    let selEmps = [];
    if (emps.length > 0) {
      selEmps = emps.map(e => {
        const sp = splits.find(s => s.employee_id===e.id||s.id===e.id);
        const emp = employees.find(x=>x.id===(e.id||e));
        return { id: e.id||e, name: e.name||e.full_name||emp?.full_name||'', rate: sp?.rate||emp?.commission_percentage||40, amount: sp?.amount||0 };
      });
    } else if (w.employee_id) {
      selEmps = [{ id: w.employee_id, name: w.employee_name||'', rate: w.commission_rate||40, amount: w.commission_amount||0 }];
    }
    const selSvcs = parseArr(w.services).map(s=>({ id:s.id||s, name:s.name||s, price:s.price||0 }));
    setEditForm({
      plate_number:     w.plate_number||'',
      customer_name:    w.customer_name||'',
      notes:            w.notes||'',
      payment_status:   w.payment_status||'paid',
      selEmps,
      selSvcs,
    });
    setEditWash(w);
  };

  const toggleEditEmp = emp => {
    setEditForm(f => {
      const exists = f.selEmps.find(e=>e.id===emp.id);
      if (exists) return {...f, selEmps: f.selEmps.filter(e=>e.id!==emp.id)};
      if (f.selEmps.length >= 3) { showToast('Max 3 employees','warning'); return f; }
      return {...f, selEmps:[...f.selEmps,{id:emp.id,name:emp.full_name,rate:emp.commission_percentage||40,amount:0}]};
    });
  };
  const toggleEditSvc = svc => {
    setEditForm(f => {
      const exists = f.selSvcs.find(s=>s.id===svc.id);
      return {...f, selSvcs: exists ? f.selSvcs.filter(s=>s.id!==svc.id) : [...f.selSvcs, {id:svc.id,name:svc.name,price:svc.price||0}]};
    });
  };

  const editTotal = editForm ? editForm.selSvcs.reduce((s,sv)=>s+(sv.price||0),0) : 0;
  const editSplits = editForm ? editForm.selEmps.map(e => {
    const rate = e.rate||40;
    const amount = Math.round(editTotal * rate / 100 / (editForm.selEmps.length||1));
    return { employee_id:e.id, name:e.name, rate, amount };
  }) : [];
  const editTotalComm = editSplits.reduce((s,sp)=>s+sp.amount,0);
  const primaryEmp = editForm?.selEmps[0] || null;

  const handleUpdate = async () => {
    if (!editForm.selEmps.length) { showToast('Select at least one employee','error'); return; }
    if (!editForm.selSvcs.length) { showToast('Select at least one service','error'); return; }
    setSaving(true);
    try {
      const data = {
        plate_number:     editForm.plate_number||'',
        customer_name:    editForm.customer_name||'',
        notes:            editForm.notes||'',
        employee_id:      primaryEmp?.id||'',
        employee_name:    primaryEmp?.name||'',
        employees:        editForm.selEmps.map(e=>JSON.stringify({id:e.id,name:e.name})),
        services:         editForm.selSvcs.map(s=>JSON.stringify(s)),
        total_amount:     editTotal,
        amount_paid:      editTotal,
        commission_rate:  primaryEmp?.rate||40,
        commission_amount: editTotalComm,
        commission_splits: editSplits.map(s=>JSON.stringify(s)),
        payment_status:    editForm.payment_status||'paid',
      };
      await api('update','CarWash',{id:editWash.id, data});
      await logEvent({event_type:'wash_edited',title:'Transaction Edited',
        description:`${editForm.selEmps.map(e=>e.name).join(' + ')} · ${editForm.selSvcs.map(s=>s.name).join(', ')} · ${peso(editTotal)}`,
        actor_name:primaryEmp?.name||'', entity_id:editWash.id, amount:editTotal});
      await onRefresh();
      setEditWash(null); setEditForm(null);
      showToast('Transaction updated!','success');
    } catch(e){ showToast('Update failed: '+e.message,'error'); }
    finally{ setSaving(false); }
  };

  const handleDelete = async id => {
    try {
      const w = carWashes.find(x=>x.id===id);
      await api('delete','CarWash',{id});
      await logEvent({event_type:'wash_deleted',title:'Transaction Deleted',
        description:`${w?.employee_name||'—'} · ${peso(w?.total_amount||0)}`,
        actor_name:w?.employee_name||'', entity_id:id, amount:w?.total_amount||0});
      onDelete(id); showToast('Deleted','success'); setConfirm(null);
    }
    catch(e){showToast('Error: '+e.message,'error');}
  };

  return (
    <div>
      <div className="flex-between mb-4">
        <div className="section-title" style={{marginBottom:0}}>Transactions</div>
        <div style={{fontSize:12,color:'var(--text2)'}}>{filtered.length} records · {peso(tSales)}</div>
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
        {[{k:'today',l:'Today'},{k:'yesterday',l:'Yesterday'},{k:'7days',l:'7 Days'},{k:'14days',l:'14 Days'},{k:'month',l:'Month'},{k:'all',l:'All'},{k:'custom',l:'Custom'}].map(t=>(
          <button key={t.k} onClick={()=>setFilter(t.k)}
            style={{padding:'6px 14px',borderRadius:20,fontSize:12,fontWeight:700,cursor:'pointer',border:'none',transition:'all .15s',
              background: filter===t.k ? 'var(--blue)' : 'rgba(255,255,255,0.06)',
              color:       filter===t.k ? '#fff'        : 'var(--text2)'}}>
            {t.l}
          </button>
        ))}
      </div>
      {filter==='custom'&&(
        <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
          <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)}
            style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontSize:12}}/>
          <span style={{color:'var(--text2)',fontSize:12,fontWeight:700}}>–</span>
          <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)}
            style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 10px',color:'var(--text)',fontSize:12}}/>
        </div>
      )}
      <div className="form-group mb-4" style={{position:'relative'}}>
        <div style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--text2)',width:15,height:15,zIndex:2}}>{Ic.search}</div>
        <input
          className="form-input"
          placeholder="Search employee or plate..."
          value={search}
          onChange={e=>{ setSearch(e.target.value); setShowSuggestions(true); }}
          onFocus={()=>setShowSuggestions(true)}
          onBlur={()=>setTimeout(()=>setShowSuggestions(false),180)}
          style={{paddingLeft:34, paddingRight: search ? 32 : 12}}
        />
        {search && (
          <button onClick={()=>{setSearch('');setShowSuggestions(false);}} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:16,lineHeight:1,padding:2}}>✕</button>
        )}
        {showSuggestions && search.length > 0 && (() => {
          const q = search.toLowerCase();
          const matched = activeEmps.filter(e => e.full_name.toLowerCase().includes(q));
          if (!matched.length) return null;
          return (
            <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:999,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,marginTop:4,boxShadow:'0 8px 24px rgba(0,0,0,0.4)',overflow:'hidden'}}>

            <tbody>

                    const emp=employees.find(e=>e.id===w.employee_id);
                    const isPaid = !w.payment_status || w.payment_status==='paid';
                    const txSplits = parseArr(w.commission_splits);
                    const isTeamTx = txSplits.length > 1;
                    const dispName = isTeamTx ? w.employee_name : (emp?.full_name||w.employee_name);

                        <td className='hide-xs' style={{color:'var(--text)',fontWeight:500}}>{parseArr(w.services).map(s=>s.name).join(', ')||'—'}</td>

      {/* ── Edit Modal ── */}
      {editWash&&editForm&&(
        <div className="modal-overlay" onClick={()=>{setEditWash(null);setEditForm(null);}}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:520,padding:0,overflow:'hidden',maxHeight:'92vh',display:'flex',flexDirection:'column'}}>
            <div style={{background:'var(--bg2)',padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>

              <button onClick={()=>{setEditWash(null);setEditForm(null);}} style={{background:'none',border:'none',color:'var(--text2)',fontSize:22,cursor:'pointer',lineHeight:1}}>×</button>

            <div style={{padding:'16px 20px',overflowY:'auto',flex:1}}>

              {/* Employees */}
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',marginBottom:8}}>EMPLOYEE(S) <span style={{fontWeight:400}}>(max 3)</span></div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {activeEmps.map(e=>{
                    const sel=editForm.selEmps.find(x=>x.id===e.id);
                    return(
                      <button key={e.id} onClick={()=>toggleEditEmp(e)}
                        style={{padding:'6px 12px',borderRadius:20,border:'2px solid',fontSize:11,fontWeight:700,cursor:'pointer',transition:'all .15s',

                          background:sel?'rgba(77,166,255,0.12)':'transparent',

                    );

              </div>

              {/* Details */}
              <div style={{marginBottom:14}}>

                <input placeholder="Plate number" value={editForm.plate_number}
                  onChange={e=>setEditForm(f=>({...f,plate_number:e.target.value}))}

                    borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13,boxSizing:'border-box'}}/>
                <input placeholder="Customer name (optional)" value={editForm.customer_name}
                  onChange={e=>setEditForm(f=>({...f,customer_name:e.target.value}))}
                  style={{width:'100%',marginBottom:8,background:'var(--bg)',border:'1px solid var(--border)',
                    borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13,boxSizing:'border-box'}}/>
                <input placeholder="Notes (optional)" value={editForm.notes}
                  onChange={e=>setEditForm(f=>({...f,notes:e.target.value}))}
                  style={{width:'100%',background:'var(--bg)',border:'1px solid var(--border)',
                    borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13,boxSizing:'border-box'}}/>
                {/* Payment status */}
                <div style={{display:'flex',gap:8,marginTop:10}}>
                  {[{v:'paid',label:'✅ PAID',active:'rgba(34,197,94,0.18)',activeC:'var(--success)',activeB:'rgba(34,197,94,0.4)'},
                    {v:'unpaid',label:'❌ UNPAID',active:'rgba(217,74,74,0.18)',activeC:'var(--red)',activeB:'rgba(217,74,74,0.4)'}].map(opt=>{
                    const sel=editForm.payment_status===opt.v;
                    return(
                      <button key={opt.v} onClick={()=>setEditForm(f=>({...f,payment_status:opt.v}))}
                        style={{flex:1,padding:'9px 0',borderRadius:10,border:'none',cursor:'pointer',fontWeight:800,fontSize:12,transition:'all .2s',
                          background: sel ? opt.active       : 'rgba(255,255,255,0.05)',

                          outline:     sel ? `2px solid ${opt.activeB}` : '2px solid transparent'}}>
                        {opt.label}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Live Summary */}
              {editForm.selSvcs.length>0&&editForm.selEmps.length>0&&(
                <div style={{background:'rgba(212,175,55,0.06)',border:'1px solid rgba(212,175,55,0.2)',borderRadius:12,padding:'12px 16px',marginBottom:6}}>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom: editSplits.length>1?8:0}}>
                    {[
                      {l:'Total Amount', v:peso(editTotal),     c:'var(--text)'},
                      {l:'Total Commission', v:peso(editTotalComm), c:'var(--success)'},
                    ].map((x,i)=>(
                      <div key={i} style={{textAlign:'center',padding:'6px 4px'}}>
                        <div style={{fontSize:16,fontWeight:900,color:x.c}}>{x.v}</div>
                        <div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>{x.l}</div>
                      </div>
                    ))}
                  </div>
                  {editSplits.length>1&&(
                    <div style={{borderTop:'1px solid var(--border)',paddingTop:8,marginTop:4}}>
                      {editSplits.map((sp,i)=>(
                        <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}}>
                          <span style={{color:'var(--text2)'}}>{sp.name}</span>
                          <span style={{color:'var(--success)',fontWeight:700}}>{peso(sp.amount)} ({sp.rate}%)</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
            <div style={{padding:'12px 20px',borderTop:'1px solid var(--border)',display:'flex',gap:10,background:'var(--bg2)',flexShrink:0}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>{setEditWash(null);setEditForm(null);}}>Cancel</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={handleUpdate} disabled={saving}>
                {saving?'Saving…':'Save Changes'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Delete Confirm ── */}
      {confirm && (
        <div className="modal-overlay" onClick={()=>setConfirm(null)}>
          <div className="modal" style={{maxWidth:320}} onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Delete this transaction?</div>
            <p style={{color:'var(--text2)',fontSize:13,marginBottom:18}}>This cannot be undone.</p>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setConfirm(null)}>Cancel</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={()=>handleDelete(confirm)}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
