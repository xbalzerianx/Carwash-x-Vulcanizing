<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CarWash Pro — Sales Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red:      #D94A4A;
      --red-h:    #C63E3E;
      --gold:     #D4AF37;
      --silver:   #B8BCC2;
      --bronze:   #B87333;
      --bg:       #1E1E22;
      --bg2:      #2B2B31;
      --bg3:      #36363D;
      --border:   rgba(255,255,255,0.08);
      --text:     #F7F7F7;
      --text2:    #7A7A85;
      --success:  #3DBE6E;
      --danger:   #D94A4A;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:2px; }

    @keyframes fadeUp   { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pop      { 0% { transform:scale(.85); opacity:0; } 60% { transform:scale(1.04); } 100% { transform:scale(1); opacity:1; } }
    @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    @keyframes spin     { to { transform:rotate(360deg); } }

    /* ── LAYOUT ── */
    .app { display:flex; min-height:100vh; }
    .sidebar {
      width:240px; background:var(--bg2); border-right:1px solid var(--border);
      display:flex; flex-direction:column; position:fixed; height:100vh; z-index:100;
      transition:transform .25s ease;
    }
    .sidebar.closed { transform:translateX(-240px); }
    .sidebar-logo {
      padding:20px 18px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:10px;
    }
    .logo-mark {
      width:36px; height:36px; background:var(--red); border-radius:10px;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .logo-mark svg { width:20px; height:20px; fill:white; }
    .logo-name { font-size:15px; font-weight:800; letter-spacing:-.3px; }
    .logo-sub  { font-size:10px; color:var(--text2); font-weight:500; margin-top:1px; }

    .nav { flex:1; padding:12px 10px; overflow-y:auto; }
    .nav-label { font-size:10px; font-weight:700; color:var(--text2); letter-spacing:1px; padding:10px 8px 4px; text-transform:uppercase; }
    .nav-item {
      display:flex; align-items:center; gap:10px;
      padding:9px 10px; border-radius:8px; cursor:pointer;
      color:var(--text2); font-size:13px; font-weight:500;
      transition:background .15s, color .15s; margin-bottom:1px;
    }
    .nav-item:hover { background:rgba(255,255,255,0.05); color:var(--text); }
    .nav-item.active { background:var(--red); color:#fff; }
    .nav-icon { width:18px; height:18px; flex-shrink:0; }
    .nav-icon svg { width:18px; height:18px; }

    .sidebar-footer { padding:14px 10px; border-top:1px solid var(--border); }

    .main { flex:1; margin-left:240px; min-height:100vh; display:flex; flex-direction:column; transition:margin-left .25s ease; }
    .main.full { margin-left:0; }

    .topbar {
      background:var(--bg2); border-bottom:1px solid var(--border);
      padding:0 20px; height:56px; display:flex; align-items:center;
      justify-content:space-between; position:sticky; top:0; z-index:50;
    }
    .topbar-left  { display:flex; align-items:center; gap:12px; }
    .topbar-right { display:flex; align-items:center; gap:10px; }
    .menu-btn {
      width:32px; height:32px; background:var(--bg3); border-radius:7px;
      display:flex; align-items:center; justify-content:center; cursor:pointer;
      transition:background .15s;
    }
    .menu-btn:hover { background:rgba(255,255,255,0.1); }
    .menu-btn svg { width:16px; height:16px; stroke:var(--text2); }
    .page-title { font-size:16px; font-weight:700; }

    .live-badge {
      display:flex; align-items:center; gap:5px;
      background:rgba(61,190,110,0.12); border:1px solid rgba(61,190,110,0.25);
      border-radius:20px; padding:4px 10px; font-size:11px; font-weight:600; color:var(--success);
    }
    .live-dot { width:6px; height:6px; background:var(--success); border-radius:50%; animation:pulse 1.5s infinite; }

    .page-content { flex:1; padding:20px; max-width:1400px; width:100%; }

    /* ── CARDS ── */
    .card {
      background:var(--bg2); border:1px solid var(--border); border-radius:12px;
      padding:18px; animation:fadeUp .3s ease;
    }
    .card-flat { background:var(--bg3); border-radius:12px; padding:16px; }

    /* ── STAT CARDS ── */
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:20px; }
    .stat-card {
      background:var(--bg2); border:1px solid var(--border); border-radius:12px;
      padding:18px; transition:border-color .2s;
    }
    .stat-card:hover { border-color:rgba(255,255,255,0.15); }
    .stat-label { font-size:11px; color:var(--text2); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
    .stat-value { font-size:24px; font-weight:800; letter-spacing:-.5px; }
    .stat-sub   { font-size:11px; color:var(--text2); margin-top:4px; }
    .stat-stripe { height:3px; border-radius:2px; margin-bottom:14px; }

    /* ── BUTTONS ── */
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:7px;
      padding:9px 16px; border-radius:8px; font-size:13px; font-weight:600;
      cursor:pointer; border:none; outline:none; transition:background .15s, opacity .15s;
      font-family:inherit;
    }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .btn-primary { background:var(--red); color:#fff; }
    .btn-primary:hover:not(:disabled) { background:var(--red-h); }
    .btn-success { background:var(--success); color:#fff; }
    .btn-success:hover:not(:disabled) { background:#34a85e; }
    .btn-danger  { background:rgba(217,74,74,0.15); color:var(--red); border:1px solid rgba(217,74,74,0.25); }
    .btn-danger:hover:not(:disabled) { background:rgba(217,74,74,0.25); }
    .btn-ghost   { background:var(--bg3); color:var(--text2); }
    .btn-ghost:hover:not(:disabled)  { background:rgba(255,255,255,0.08); color:var(--text); }
    .btn-sm  { padding:6px 12px; font-size:12px; border-radius:6px; }
    .btn-xl  { padding:14px 20px; font-size:15px; font-weight:700; border-radius:10px; width:100%; }
    .btn svg { width:15px; height:15px; }

    /* ── FORMS ── */
    .form-group { margin-bottom:14px; }
    .form-label { font-size:11px; font-weight:700; color:var(--text2); margin-bottom:5px; display:block; letter-spacing:.3px; text-transform:uppercase; }
    .form-input {
      width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px;
      padding:10px 12px; color:var(--text); font-size:13px; font-family:inherit;
      transition:border-color .15s; outline:none;
    }
    .form-input:focus { border-color:var(--red); }
    .form-input::placeholder { color:var(--text2); }
    select.form-input { cursor:pointer; }
    select.form-input option { background:var(--bg2); }

    /* ── SERVICE SELECTOR ── */
    .service-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .service-item {
      background:var(--bg3); border:1.5px solid var(--border); border-radius:10px;
      padding:12px; cursor:pointer; transition:border-color .15s, background .15s;
      display:flex; align-items:center; gap:10px;
    }
    .service-item:hover   { border-color:rgba(217,74,74,0.4); }
    .service-item.selected { border-color:var(--red); background:rgba(217,74,74,0.08); }
    .svc-check {
      width:18px; height:18px; border:1.5px solid var(--border); border-radius:5px;
      display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s;
    }
    .service-item.selected .svc-check { background:var(--red); border-color:var(--red); }
    .svc-check svg { width:11px; height:11px; stroke:#fff; display:none; }
    .service-item.selected .svc-check svg { display:block; }
    .svc-name  { font-size:13px; font-weight:600; }
    .svc-price { font-size:12px; color:var(--gold); font-weight:700; }

    /* ── EMPLOYEE PICKER ── */
    .emp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; }
    .emp-card {
      background:var(--bg3); border:1.5px solid var(--border); border-radius:10px;
      padding:14px 10px; cursor:pointer; text-align:center; transition:all .15s;
    }
    .emp-card:hover { border-color:rgba(255,255,255,0.2); }
    .emp-card.selected { border-color:var(--red); background:rgba(217,74,74,0.08); }
    .emp-avatar {
      width:48px; height:48px; border-radius:50%; display:flex; align-items:center;
      justify-content:center; font-size:16px; font-weight:800; margin:0 auto 8px;
      overflow:hidden; position:relative;
    }
    .emp-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .emp-name { font-size:12px; font-weight:700; }
    .emp-comm { font-size:11px; color:var(--gold); font-weight:600; margin-top:2px; }

    /* ── SUMMARY BOX ── */
    .summary-box {
      background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:14px;
    }
    .summary-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; }
    .summary-row + .summary-row { border-top:1px solid rgba(255,255,255,0.05); }
    .summary-row .lbl { font-size:12px; color:var(--text2); }
    .summary-row .val { font-size:13px; font-weight:700; }

    /* ── TABLE ── */
    .table-wrap { overflow-x:auto; border-radius:10px; }
    table { width:100%; border-collapse:collapse; }
    thead tr { background:rgba(255,255,255,0.03); }
    th { padding:10px 14px; text-align:left; font-size:10px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; }
    td { padding:11px 14px; font-size:12px; border-top:1px solid var(--border); }
    tr:hover td { background:rgba(255,255,255,0.02); }

    /* ── RANKING ── */
    .rank-card {
      display:flex; align-items:center; gap:12px; background:var(--bg3);
      border:1px solid var(--border); border-radius:10px; padding:14px 16px;
      margin-bottom:8px; transition:border-color .15s; cursor:default;
    }
    .rank-card.rank-pos-1 { border-color:rgba(212,175,55,0.5); }
    .rank-card.rank-pos-2 { border-color:rgba(184,188,194,0.4); }
    .rank-card.rank-pos-3 { border-color:rgba(184,115,51,0.4); }
    .rank-num  { font-size:13px; font-weight:800; min-width:28px; text-align:center; color:var(--text2); }
    .rank-pos-1 .rank-num { color:var(--gold); }
    .rank-pos-2 .rank-num { color:var(--silver); }
    .rank-pos-3 .rank-num { color:var(--bronze); }
    .rank-avatar { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; flex-shrink:0; overflow:hidden; }
    .rank-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .rank-info  { flex:1; }
    .rank-name  { font-size:14px; font-weight:700; }
    .rank-stat  { font-size:11px; color:var(--text2); }
    .rank-cars  { font-size:18px; font-weight:800; color:var(--text); }
    .rank-label { font-size:10px; color:var(--text2); }

    /* ── BADGES ── */
    .badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; }
    .badge-green  { background:rgba(61,190,110,0.15); color:var(--success); }
    .badge-red    { background:rgba(217,74,74,0.15);  color:var(--red); }
    .badge-gold   { background:rgba(212,175,55,0.15); color:var(--gold); }
    .badge-gray   { background:rgba(255,255,255,0.06); color:var(--text2); }

    /* ── TABS ── */
    .tabs { display:flex; gap:3px; background:var(--bg3); border-radius:9px; padding:3px; margin-bottom:16px; }
    .tab  { flex:1; padding:7px 8px; text-align:center; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; color:var(--text2); transition:all .15s; }
    .tab.active { background:var(--red); color:#fff; }

    /* ── MODAL ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.65); display:flex; align-items:center; justify-content:center; z-index:200; padding:16px; }
    .modal { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:22px; width:100%; max-width:460px; max-height:90vh; overflow-y:auto; animation:pop .25s ease; }
    .modal-title { font-size:16px; font-weight:800; margin-bottom:18px; display:flex; align-items:center; gap:8px; }

    /* ── SUCCESS OVERLAY ── */
    .success-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:center; justify-content:center; z-index:1000; }
    .success-card {
      background:var(--bg2); border:1px solid var(--border); border-radius:20px;
      padding:36px 32px; text-align:center; max-width:300px; width:90%;
      animation:pop .4s cubic-bezier(.175,.885,.32,1.275);
    }

    /* ── TOAST ── */
    .toast {
      position:fixed; bottom:20px; right:20px; z-index:500;
      background:var(--bg2); border:1px solid var(--border); border-radius:10px;
      padding:12px 16px; font-size:12px; font-weight:600;
      display:flex; align-items:center; gap:8px;
      animation:fadeUp .25s ease; box-shadow:0 8px 30px rgba(0,0,0,.4);
    }
    .toast-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

    /* ── PROGRESS ── */
    .progress-bar  { height:5px; background:var(--bg3); border-radius:3px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--red); border-radius:3px; transition:width .5s ease; }

    /* ── HERO HEADER ── */
    .hero-header { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; animation:fadeUp .3s ease; }

    /* ── AVATAR UPLOAD ── */
    .avatar-upload-ring {
      width:72px; height:72px; border-radius:50%; border:2px dashed var(--border);
      display:flex; align-items:center; justify-content:center; cursor:pointer;
      transition:border-color .2s; position:relative; overflow:hidden;
    }
    .avatar-upload-ring:hover { border-color:var(--red); }
    .avatar-upload-ring img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .avatar-upload-ring input { position:absolute; inset:0; opacity:0; cursor:pointer; }
    .avatar-upload-ring svg { width:24px; height:24px; stroke:var(--text2); }

    /* ── MISC ── */
    .divider    { border:none; border-top:1px solid var(--border); margin:12px 0; }
    .section-title { font-size:15px; font-weight:800; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    .mb-3 { margin-bottom:12px; }
    .mb-4 { margin-bottom:16px; }
    .flex-between { display:flex; justify-content:space-between; align-items:center; }
    .text-muted { color:var(--text2); }
    .text-sm    { font-size:12px; }
    .text-xs    { font-size:11px; }
    .font-bold  { font-weight:700; }
    .text-red   { color:var(--red); }
    .text-green { color:var(--success); }
    .text-gold  { color:var(--gold); }

    /* ── SIDEBAR OVERLAY MOBILE ── */
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:99; }

    /* ── RESPONSIVE ── */
    @media (max-width:768px) {
      .sidebar { transform:translateX(-240px); }
      .sidebar.open { transform:translateX(0); }
      .sidebar-overlay.visible { display:block; }
      .main { margin-left:0 !important; }
      .stats-grid { grid-template-columns:1fr 1fr; }
      .grid-2 { grid-template-columns:1fr; }
      .grid-3 { grid-template-columns:1fr 1fr; }
      .service-grid { grid-template-columns:1fr; }
      .page-content { padding:14px; }
      table { font-size:11px; }
      th,td { padding:8px 10px; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API_URL = 'https://superagent-f43a5097.base44.app/functions/apiHandler';
const APP_ID  = '6a1c42f697e43e4ff43a5097';

async function api(action, entity, extra = {}) {
  try {
    const res  = await fetch(API_URL, {
      method:'POST', headers:{'Content-Type':'application/json','x-base44-app-id':APP_ID},
      body: JSON.stringify({ action, entity, ...extra })
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'API error');
    return json.data;
  } catch(e) { console.error(e); throw e; }
}

const peso     = n => `₱${(n||0).toLocaleString('en-PH',{minimumFractionDigits:0,maximumFractionDigits:0})}`;
const today    = () => new Date().toISOString().split('T')[0];
const initials = name => name ? name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?';
const fmt      = d  => d ? new Date(d).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'}) : '';
const fmtTime  = d  => d ? new Date(d).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'}) : '';

/* ── SVG Icons ── */
const Ic = {

  list:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="8" y1="6"  x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6"  x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
  trophy: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4a2 2 0 01-2-2V5h4"/><path d="M18 9h2a2 2 0 002-2V5h-4"/><path d="M12 17v4"/><path d="M8 21h8"/><path d="M6 5h12v6a6 6 0 01-12 0z"/></svg>,
  chart:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6"  y1="20" x2="6"  y2="14"/></svg>,
  users:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>,

/* ── Avatar Component ── */
function Avatar({ employee, size=40, fontSize=15 }) {
  const [imgErr, setImgErr] = useState(false);
  const hasImg = employee?.avatar_url && !imgErr;
  return (
    <div style={{
      width:size, height:size, borderRadius:'50%',
      background: hasImg ? 'transparent' : (employee?.avatar_color || '#D94A4A'),
      display:'flex', alignItems:'center', justifyContent:'center',
      color:'white', fontWeight:800, fontSize, overflow:'hidden', flexShrink:0
    }}>
      {hasImg
        ? <img src={employee.avatar_url} alt={employee.full_name} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={()=>setImgErr(true)} />
        : initials(employee?.full_name)
      }
    </div>
  );
}

/* ── Toast ── */
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const colors = { success:'#3DBE6E', error:'#D94A4A', warning:'#D4AF37', info:'#7A7A85' };
  return (
    <div className="toast">
      <div className="toast-dot" style={{background: colors[type]||colors.info}}></div>
      {msg}
    </div>
  );
}

/* ── DASHBOARD ── */
function Dashboard({ carWashes, employees, campaign, setPage }) {
  const todayStr   = today();
  const now        = new Date();
  const todayW     = carWashes.filter(w => (w.transaction_date||w.created_date||'').startsWith(todayStr));
  const monthW     = carWashes.filter(w => {
    const d = new Date(w.transaction_date||w.created_date);
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  });
  const todaySales = todayW.reduce((s,w) => s+(w.total_amount||0), 0);
  const todayComm  = todayW.reduce((s,w) => s+(w.commission_amount||0), 0);
  const monthSales = monthW.reduce((s,w) => s+(w.total_amount||0), 0);
  const avgSale    = todayW.length > 0 ? todaySales/todayW.length : 0;

  const empMap = {};
  todayW.forEach(w => {
    if (!empMap[w.employee_id]) empMap[w.employee_id] = { name:w.employee_name, cars:0, sales:0, id:w.employee_id };
    empMap[w.employee_id].cars++;
    empMap[w.employee_id].sales += (w.total_amount||0);
  });
  const topEmp  = Object.values(empMap).sort((a,b) => b.cars-a.cars||b.sales-a.sales)[0];
  const ranking = Object.values(empMap).sort((a,b) => b.cars-a.cars||b.sales-a.sales).slice(0,3);
  const recent  = [...carWashes].sort((a,b) => new Date(b.created_date)-new Date(a.created_date)).slice(0,5);

  const timeNow = now.toLocaleString('en-PH',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  return (
    <div>
      <div className="hero-header mb-4">
        <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}>{timeNow}</div>
        <div style={{fontSize:22,fontWeight:900,marginBottom:2}}>Welcome back!</div>
        <div style={{fontSize:13,color:'var(--text2)'}}>Here's your business at a glance.</div>
      </div>

      <div className="stats-grid">
        {[
          { label:'Cars Today',       value:todayW.length,   sub:`${monthW.length} this month`,   color:'var(--red)',     stripe:'#D94A4A' },
          { label:'Sales Today',      value:peso(todaySales),sub:peso(monthSales)+' this month',  color:'var(--success)', stripe:'#3DBE6E' },
          { label:'Commission Today', value:peso(todayComm), sub:`avg ${peso(avgSale)} / car`,    color:'var(--gold)',    stripe:'#D4AF37' },
          { label:'Top Today',        value:topEmp?topEmp.name.split(' ')[0]:'—', sub:topEmp?`${topEmp.cars} cars · ${peso(topEmp.sales)}`:'No data yet', color:'var(--silver)', stripe:'#B8BCC2' },
        ].map((s,i) => (
          <div key={i} className="stat-card">
            <div className="stat-stripe" style={{background:s.stripe}}></div>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value" style={{color:s.color}}>{s.value}</div>
            <div className="stat-sub">{s.sub}</div>
          </div>
        ))}
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="section-title">Today's Ranking</div>
          {ranking.length === 0
            ? <div style={{textAlign:'center',padding:'20px 0',color:'var(--text2)',fontSize:13}}>No transactions today yet</div>
            : ranking.map((r,i) => {
                const emp = employees.find(e => e.id === r.id);
                return (
                  <div key={i} className={`rank-card rank-pos-${i+1}`}>
                    <div className="rank-num">{i===0?'1ST':i===1?'2ND':'3RD'}</div>
                    <Avatar employee={emp||{full_name:r.name,avatar_color:'#D94A4A'}} size={38} fontSize={14} />
                    <div className="rank-info">
                      <div className="rank-name">{r.name}</div>
                      <div className="rank-stat">{peso(r.sales)}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div className="rank-cars">{r.cars}</div>
                      <div className="rank-label">cars</div>
                    </div>
                  </div>
                );
              })
          }
          <button className="btn btn-ghost btn-sm" style={{width:'100%',marginTop:8}} onClick={()=>setPage('ranking')}>Full Rankings</button>
        </div>

        <div className="card">
          <div className="section-title">Recent Transactions</div>
          {recent.length === 0
            ? <div style={{textAlign:'center',padding:'20px 0',color:'var(--text2)',fontSize:13}}>No transactions yet.</div>
            : recent.map((w,i) => {
                const emp = employees.find(e => e.id === w.employee_id);
                return (
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                    <Avatar employee={emp||{full_name:w.employee_name,avatar_color:'#D94A4A'}} size={34} fontSize={12} />
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:600}}>{w.employee_name}</div>
                      <div style={{fontSize:11,color:'var(--text2)'}}>{fmtTime(w.created_date)} · {w.services?.length||0} svc</div>
                    </div>
                    <div style={{fontSize:13,fontWeight:700,color:'var(--red)'}}>{peso(w.total_amount)}</div>
                  </div>
                );
              })
          }
          <button className="btn btn-ghost btn-sm" style={{width:'100%',marginTop:10}} onClick={()=>setPage('transactions')}>View All</button>
        </div>
      </div>

      {campaign?.is_active && (
        <div style={{marginTop:14,background:'var(--bg2)',border:'1px solid rgba(212,175,55,0.3)',borderRadius:12,padding:16}}>
          <div style={{fontWeight:800,color:'var(--gold)',marginBottom:4,fontSize:13}}>Active Campaign — {campaign.campaign_name}</div>
          <div style={{display:'flex',gap:20,fontSize:12,color:'var(--text2)'}}>
            <span>1st: <b style={{color:'var(--gold)'}}>{peso(campaign.first_place_reward)}</b></span>
            <span>2nd: <b style={{color:'var(--silver)'}}>{peso(campaign.second_place_reward)}</b></span>
            <span>3rd: <b style={{color:'var(--bronze)'}}>{peso(campaign.third_place_reward)}</b></span>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── RECORD CAR WASH ── */
function RecordCarWash({ employees, services, onSave, showToast }) {
  const [customerName,   setCustomerName]   = useState('');
  const [plateNumber,    setPlateNumber]    = useState('');
  const [selectedSvcs,   setSelectedSvcs]   = useState([]);
  const [selectedEmp,    setSelectedEmp]    = useState(null);
  const [amountPaid,     setAmountPaid]     = useState('');
  const [saving,         setSaving]         = useState(false);
  const [showSuccess,    setShowSuccess]    = useState(false);

  const activeSvcs = services.filter(s => s.is_active);
  const activeEmps = employees.filter(e => e.is_active);
  const total      = selectedSvcs.reduce((s,v) => s+(v.price||0), 0);
  const commRate   = selectedEmp?.commission_percentage || 0;
  const commAmt    = (total * commRate) / 100;

  const toggle = svc => setSelectedSvcs(prev =>
    prev.find(s=>s.id===svc.id) ? prev.filter(s=>s.id!==svc.id) : [...prev,svc]
  );

  const reset = () => {
    setCustomerName(''); setPlateNumber('');
    setSelectedSvcs([]); setSelectedEmp(null); setAmountPaid('');
  };

  const handleSave = async () => {
    if (!selectedEmp)          return showToast('Select an employee', 'warning');
    if (!selectedSvcs.length)  return showToast('Select at least one service', 'warning');
    setSaving(true);
    try {
      const data = {
        customer_name:    customerName,
        plate_number:     plateNumber,
        employee_id:      selectedEmp.id,
        employee_name:    selectedEmp.full_name,
        services:         selectedSvcs,
        total_amount:     total,
        amount_paid:      parseFloat(amountPaid) || total,
        commission_rate:  commRate,
        commission_amount:commAmt,
        transaction_date: new Date().toISOString(),
      };
      const saved = await api('create','CarWash',{data});
      onSave(saved);
      setShowSuccess(true);
      setTimeout(() => { setShowSuccess(false); reset(); }, 2800);
    } catch(e) { showToast('Error: '+e.message,'error'); }
    finally { setSaving(false); }
  };

  if (showSuccess) return (
    <div className="success-overlay">
      <div className="success-card">
        <div style={{width:64,height:64,background:'rgba(61,190,110,.15)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--success)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" width="32" height="32"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div style={{fontSize:20,fontWeight:900,marginBottom:6}}>Wash Recorded!</div>
        <div style={{color:'var(--text2)',fontSize:13,marginBottom:20}}>Transaction saved successfully.</div>
        <div style={{background:'var(--bg3)',borderRadius:10,padding:14}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
            <span style={{color:'var(--text2)',fontSize:12}}>Total</span>
            <span style={{fontWeight:800,color:'var(--text)',fontSize:16}}>{peso(total)}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            <span style={{color:'var(--text2)',fontSize:12}}>Commission</span>
            <span style={{fontWeight:700,color:'var(--success)',fontSize:14}}>{peso(commAmt)}</span>
          </div>
        </div>
        <div style={{color:'var(--text2)',fontSize:11,marginTop:12}}>Ready for next customer...</div>
      </div>
    </div>
  );

  const timeStr = new Date().toLocaleString('en-PH',{month:'long',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});

  return (
    <div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,padding:14,marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontWeight:700,fontSize:14}}>Quick Entry</div>
        <div style={{fontSize:11,color:'var(--text2)'}}>{timeStr}</div>
      </div>

      <div className="card mb-4">
        <div className="section-title" style={{fontSize:13,marginBottom:10}}>Customer Info <span style={{fontWeight:400,color:'var(--text2)',fontSize:11}}>(optional)</span></div>
        <div className="grid-2">
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Customer Name</label>
            <input className="form-input" placeholder="Juan dela Cruz" value={customerName} onChange={e=>setCustomerName(e.target.value)} />
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label className="form-label">Plate Number</label>
            <input className="form-input" placeholder="ABC 1234" value={plateNumber} onChange={e=>setPlateNumber(e.target.value.toUpperCase())} />
          </div>
        </div>
      </div>

      <div className="card mb-4">
        <div className="section-title" style={{fontSize:13,marginBottom:10}}>Select Services</div>
        <div className="service-grid">
          {activeSvcs.map(svc => {
            const sel = selectedSvcs.find(s=>s.id===svc.id);
            return (
              <div key={svc.id} className={`service-item ${sel?'selected':''}`} onClick={()=>toggle(svc)}>
                <div className="svc-check">{Ic.check}</div>
                <div style={{flex:1}}>
                  <div className="svc-name">{svc.name}</div>
                  <div className="svc-price">{peso(svc.price)}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="card mb-4">
        <div className="section-title" style={{fontSize:13,marginBottom:10}}>Who did the wash?</div>
        <div className="emp-grid">
          {activeEmps.map(emp => (
            <div key={emp.id} className={`emp-card ${selectedEmp?.id===emp.id?'selected':''}`} onClick={()=>setSelectedEmp(emp)}>
              <Avatar employee={emp} size={48} fontSize={17} />
              <div className="emp-name">{emp.full_name.split(' ')[0]}</div>
              <div className="emp-comm">{emp.commission_percentage}%</div>
            </div>
          ))}
        </div>
      </div>

      {(selectedSvcs.length > 0 || selectedEmp) && (
        <div className="summary-box mb-4">
          <div style={{fontWeight:700,fontSize:12,marginBottom:10,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.5px'}}>Summary</div>
          {selectedSvcs.map(s => (
            <div key={s.id} className="summary-row">
              <span className="lbl">{s.name}</span>
              <span className="val">{peso(s.price)}</span>
            </div>
          ))}
          <hr className="divider" />
          <div className="summary-row">
            <span className="lbl">Total</span>
            <span className="val" style={{fontSize:17,color:'var(--red)'}}>{peso(total)}</span>
          </div>
          {selectedEmp && (
            <div className="summary-row">
              <span className="lbl">Commission ({commRate}%)</span>
              <span className="val" style={{color:'var(--success)'}}>{peso(commAmt)}</span>
            </div>
          )}
        </div>
      )}

      <div className="card mb-4">
        <div className="form-group" style={{marginBottom:0}}>
          <label className="form-label">Amount Paid</label>
          <input className="form-input" type="number" placeholder={total||0} value={amountPaid} onChange={e=>setAmountPaid(e.target.value)}
            style={{fontSize:22,fontWeight:800,textAlign:'center',padding:14}} />
        </div>
      </div>

      <button className="btn btn-success btn-xl" onClick={handleSave} disabled={saving}>
        {saving ? 'Saving...' : 'Record Car Wash'}
      </button>
    </div>
  );
}

/* ── TRANSACTIONS ── */
function Transactions({ carWashes, employees, onDelete, showToast }) {
  const [filter,  setFilter]  = useState('today');
  const [search,  setSearch]  = useState('');
  const [confirm, setConfirm] = useState(null);
  const now      = new Date();
  const todayStr = today();

  const filtered = carWashes.filter(w => {
    const d       = new Date(w.transaction_date||w.created_date);
    const dateStr = (w.transaction_date||w.created_date||'').substring(0,10);
    let pass = filter==='today' ? dateStr===todayStr
             : filter==='week'  ? d >= new Date(now - 7*86400000)
             : filter==='month' ? (d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear())
             : true;
    if (search) {
      const q = search.toLowerCase();
      pass = pass && (w.employee_name?.toLowerCase().includes(q)||w.customer_name?.toLowerCase().includes(q)||w.plate_number?.toLowerCase().includes(q));
    }
    return pass;
  }).sort((a,b) => new Date(b.created_date)-new Date(a.created_date));

  const totalSales = filtered.reduce((s,w) => s+(w.total_amount||0), 0);
  const totalComm  = filtered.reduce((s,w) => s+(w.commission_amount||0), 0);

  const handleDelete = async id => {
    try {
      await api('delete','CarWash',{id});
      onDelete(id);
      showToast('Transaction deleted','success');
      setConfirm(null);
    } catch(e) { showToast('Error: '+e.message,'error'); }
  };

  return (
    <div>
      <div className="flex-between mb-4">
        <div className="section-title" style={{marginBottom:0}}>Transactions</div>
        <div style={{fontSize:12,color:'var(--text2)'}}>{filtered.length} records · {peso(totalSales)}</div>
      </div>

      <div className="tabs">
        {['today','week','month','all'].map(t => (
          <div key={t} className={`tab ${filter===t?'active':''}`} onClick={()=>setFilter(t)}>
            {t.charAt(0).toUpperCase()+t.slice(1)}
          </div>
        ))}
      </div>

      <div className="form-group mb-4" style={{position:'relative'}}>
        <div style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',width:15,height:15,color:'var(--text2)'}}>{Ic.search}</div>
        <input className="form-input" placeholder="Search employee, customer, plate..." value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:34}} />
      </div>

      <div className="grid-3 mb-4">
        {[
          { label:'Cars',       value:filtered.length,    color:'var(--red)' },
          { label:'Revenue',    value:peso(totalSales),   color:'var(--success)' },
          { label:'Commission', value:peso(totalComm),    color:'var(--gold)' },
        ].map((s,i) => (
          <div key={i} className="stat-card" style={{padding:12}}>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value" style={{fontSize:18,color:s.color}}>{s.value}</div>
          </div>
        ))}
      </div>

      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>Date / Time</th><th>Employee</th><th>Plate</th><th>Services</th><th>Total</th><th>Comm.</th><th></th>
            </tr></thead>
            <tbody>
              {filtered.length === 0
                ? <tr><td colSpan={7} style={{textAlign:'center',padding:28,color:'var(--text2)'}}>No transactions found.</td></tr>
                : filtered.map(w => {
                    const emp = employees.find(e=>e.id===w.employee_id);
                    return (
                      <tr key={w.id}>
                        <td style={{fontSize:11}}>
                          <div>{fmt(w.transaction_date||w.created_date)}</div>
                          <div style={{color:'var(--text2)'}}>{fmtTime(w.transaction_date||w.created_date)}</div>
                        </td>
                        <td>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <Avatar employee={emp||{full_name:w.employee_name}} size={28} fontSize={10} />
                            <span style={{fontWeight:600}}>{w.employee_name}</span>
                          </div>
                        </td>
                        <td style={{fontWeight:600}}>{w.plate_number||'—'}</td>
                        <td style={{color:'var(--text2)'}}>{(w.services||[]).map(s=>s.name).join(', ')||'—'}</td>
                        <td style={{fontWeight:700,color:'var(--red)'}}>{peso(w.total_amount)}</td>
                        <td style={{color:'var(--success)'}}>{peso(w.commission_amount)}</td>
                        <td>
                          <button className="btn btn-danger btn-sm" onClick={()=>setConfirm(w.id)} style={{padding:'5px 8px'}}>
                            {Ic.trash}
                          </button>
                        </td>
                      </tr>
                    );
                  })
              }
            </tbody>
          </table>
        </div>
      </div>

      {confirm && (
        <div className="modal-overlay" onClick={()=>setConfirm(null)}>
          <div className="modal" style={{maxWidth:340}} onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Delete Transaction?</div>
            <p style={{color:'var(--text2)',fontSize:13,marginBottom:20}}>This action cannot be undone.</p>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setConfirm(null)}>Cancel</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={()=>handleDelete(confirm)}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>

/* ── RANKING ── */
function Ranking({ carWashes, employees, campaign }) {
  const [mode, setMode] = useState('daily');
  const now      = new Date();
  const todayStr = today();

  const filtered = mode === 'daily'
    ? carWashes.filter(w => (w.transaction_date||w.created_date||'').startsWith(todayStr))
    : carWashes.filter(w => {
        const d = new Date(w.transaction_date||w.created_date);
        return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
      });

  const empMap = {};
  employees.filter(e=>e.is_active).forEach(e => {
    empMap[e.id] = { id:e.id, name:e.full_name, cars:0, sales:0, commission:0 };
  });
  filtered.forEach(w => {
    if (empMap[w.employee_id]) {
      empMap[w.employee_id].cars++;
      empMap[w.employee_id].sales      += (w.total_amount||0);
      empMap[w.employee_id].commission += (w.commission_amount||0);
    }
  });
  const ranked = Object.values(empMap).sort((a,b) => b.cars-a.cars||b.sales-a.sales);
  const maxCars = ranked[0]?.cars || 1;

  const posColors = ['var(--gold)','var(--silver)','var(--bronze)'];
  const posLabels = ['1ST','2ND','3RD'];

  return (
    <div>
      <div className="flex-between mb-4">
        <div className="section-title" style={{marginBottom:0}}>Rankings</div>
        {campaign?.is_active && <span className="badge badge-gold">{campaign.campaign_name}</span>}
      </div>

      <div className="tabs" style={{maxWidth:300}}>
        <div className={`tab ${mode==='daily'?'active':''}`}   onClick={()=>setMode('daily')}>Today</div>
        <div className={`tab ${mode==='monthly'?'active':''}`} onClick={()=>setMode('monthly')}>This Month</div>
      </div>

      {ranked.map((r,i) => {
        const emp = employees.find(e=>e.id===r.id);
        const pct = maxCars > 0 ? (r.cars/maxCars)*100 : 0;
        return (
          <div key={r.id} className={`rank-card${i<3?' rank-pos-'+(i+1):''}`} style={{animation:`fadeUp ${.1+i*.06}s ease`}}>
            <div className="rank-num" style={{fontSize:11,fontWeight:800,color:i<3?posColors[i]:'var(--text2)'}}>
              {i<3 ? posLabels[i] : `#${i+1}`}
            </div>
            <Avatar employee={emp||{full_name:r.name}} size={42} fontSize={15} />
            <div style={{flex:1}}>
              <div className="rank-name">{r.name}</div>
              <div className="rank-stat" style={{marginBottom:4}}>{peso(r.sales)} · comm {peso(r.commission)}</div>
              <div className="progress-bar"><div className="progress-fill" style={{width:pct+'%',background:i<3?posColors[i]:'var(--bg3)'}}></div></div>
            </div>
            <div style={{textAlign:'right',minWidth:40}}>
              <div className="rank-cars">{r.cars}</div>
              <div className="rank-label">cars</div>
            </div>
          </div>
        );
      })}

      {ranked.length===0 && <div style={{textAlign:'center',padding:'32px 0',color:'var(--text2)',fontSize:13}}>No data yet for this period.</div>}
    </div>
  );
}

  const openEdit = emp => { setEditing(emp); setForm({...emp}); setPreviewUrl(emp.avatar_url||''); setShowModal(true); };

  const handleImgChange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { setPreviewUrl(ev.target.result); setForm(f=>({...f, avatar_url:ev.target.result})); };
    reader.readAsDataURL(file);
  };

    if (!form.full_name.trim()) return showToast('Enter employee name','warning');
    setSaving(true);
    try {
      if (editing) await api('update','Employee',{id:editing.id, data:form});
      else         await api('create','Employee',{data:form});
      await onRefresh();
      setShowModal(false);
      showToast(editing?'Employee updated!':'Employee added!','success');

    const ws = carWashes.filter(w=>w.employee_id===id);
    const now = new Date();
    return {
      total: ws.length,
      today: ws.filter(w=>(w.transaction_date||w.created_date||'').startsWith(today())).length,
      month: ws.filter(w=>{ const d=new Date(w.transaction_date||w.created_date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); }).length,
      sales: ws.reduce((s,w)=>s+(w.total_amount||0),0),

            <div key={emp.id} className="card" style={{cursor:'pointer'}} onClick={()=>setViewEmp(emp)}>
              <div className="flex-between mb-3">
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <Avatar employee={emp} size={46} fontSize={16} />
                  <div>
                    <div style={{fontWeight:800,fontSize:14}}>{emp.full_name}</div>
                    <div style={{fontSize:11,color:'var(--text2)'}}>{emp.contact_number||'—'}</div>
                  </div>
                </div>
                <span className={`badge ${emp.is_active?'badge-green':'badge-red'}`}>{emp.is_active?'Active':'Inactive'}</span>
              </div>
              <div className="grid-3 mb-3" style={{gap:8}}>
                {[{l:'Today',v:s.today,c:'var(--red)'},{l:'Month',v:s.month,c:'var(--success)'},{l:'Comm%',v:emp.commission_percentage+'%',c:'var(--gold)'}].map((x,i)=>(
                  <div key={i} style={{background:'var(--bg3)',borderRadius:8,padding:8,textAlign:'center'}}>
                    <div style={{fontSize:15,fontWeight:800,color:x.c}}>{x.v}</div>
                    <div style={{fontSize:10,color:'var(--text2)'}}>{x.l}</div>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={e=>{e.stopPropagation();openEdit(emp)}}>{Ic.edit} Edit</button>
                <button className={`btn btn-sm ${emp.is_active?'btn-danger':'btn-success'}`} style={{flex:1}} onClick={e=>{e.stopPropagation();toggleActive(emp)}}>
                  {emp.is_active?'Deactivate':'Activate'}
                </button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Add / Edit Modal */}
      {showModal && (
        <div className="modal-overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">{editing?'Edit Employee':'Add Employee'}</div>

            {/* Avatar Upload */}
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',marginBottom:18}}>
              <div style={{position:'relative',marginBottom:8}}>

                  width:72, height:72, borderRadius:'50%',
                  background: previewUrl ? 'transparent' : form.avatar_color,

                      width:28, height:28, borderRadius:'50%', background:c, cursor:'pointer',

              {['first','second','third'].map((p,i)=>(
                <div key={p} className="form-group">
                  <label className="form-label">{['1st','2nd','3rd'][i]} Reward</label>
                  <input className="form-input" type="number" value={form[`${p}_place_reward`]} onChange={e=>setForm({...form,[`${p}_place_reward`]:parseFloat(e.target.value)})} />
                </div>
              ))}
            </div>
            <div className="form-group">
              <label className="form-label">Description</label>
              <input className="form-input" value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Optional description" />
            </div>
            <div className="form-group">
              <label className="form-label">Status</label>
              <select className="form-input" value={form.is_active} onChange={e=>setForm({...form,is_active:e.target.value==='true'})}>
                <option value="false">Inactive</option>
                <option value="true">Active</option>
              </select>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={handleSave} disabled={saving}>{saving?'Saving...':'Save'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── REPORTS ── */
function Reports({ carWashes, employees, showToast }) {
  const [period, setPeriod] = useState('month');
  const now = new Date();

  const filtered = period==='today'
    ? carWashes.filter(w=>(w.transaction_date||w.created_date||'').startsWith(today()))
    : carWashes.filter(w=>{ const d=new Date(w.transaction_date||w.created_date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });

  const totalSales = filtered.reduce((s,w)=>s+(w.total_amount||0),0);
  const totalComm  = filtered.reduce((s,w)=>s+(w.commission_amount||0),0);
  const totalPaid  = filtered.reduce((s,w)=>s+(w.amount_paid||0),0);

  const empMap = {};
  filtered.forEach(w=>{
    if (!empMap[w.employee_id]) empMap[w.employee_id]={name:w.employee_name,cars:0,sales:0,comm:0,id:w.employee_id};
    empMap[w.employee_id].cars++;
    empMap[w.employee_id].sales+=(w.total_amount||0);
    empMap[w.employee_id].comm+=(w.commission_amount||0);
  });
  const empRows = Object.values(empMap).sort((a,b)=>b.cars-a.cars);

  const svcMap = {};
  filtered.forEach(w=>(w.services||[]).forEach(s=>{
    if (!svcMap[s.id]) svcMap[s.id]={name:s.name,count:0,revenue:0};
    svcMap[s.id].count++;
    svcMap[s.id].revenue+=(s.price||0);
  }));
  const svcRows = Object.values(svcMap).sort((a,b)=>b.count-a.count);

  const exportCSV = () => {
    const rows = [
      ['Date','Employee','Customer','Plate','Services','Total','Commission','Paid'],
      ...filtered.map(w=>[
        fmt(w.transaction_date||w.created_date),
        w.employee_name, w.customer_name||'', w.plate_number||'',
        (w.services||[]).map(s=>s.name).join('; '),
        w.total_amount, w.commission_amount, w.amount_paid
      ])
    ];
    const csv = rows.map(r=>r.join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download = `carwash-report-${today()}.csv`;
    a.click();
    showToast('CSV exported!','success');
  };

  return (
    <div>
      <div className="flex-between mb-4">
        <div className="section-title" style={{marginBottom:0}}>Reports</div>
        <div style={{display:'flex',gap:8}}>
          <div className="tabs" style={{marginBottom:0}}>
            <div className={`tab ${period==='today'?'active':''}`}  onClick={()=>setPeriod('today')}>Today</div>
            <div className={`tab ${period==='month'?'active':''}`}  onClick={()=>setPeriod('month')}>Month</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={exportCSV}>Export CSV</button>
        </div>
      </div>

      <div className="stats-grid mb-4">
        {[
          {label:'Total Cars',  value:filtered.length,    color:'var(--red)',     stripe:'#D94A4A'},
          {label:'Revenue',     value:peso(totalSales),   color:'var(--success)', stripe:'#3DBE6E'},
          {label:'Commission',  value:peso(totalComm),    color:'var(--gold)',    stripe:'#D4AF37'},
          {label:'Collected',   value:peso(totalPaid),    color:'var(--silver)',  stripe:'#B8BCC2'},
        ].map((s,i)=>(
          <div key={i} className="stat-card">
            <div className="stat-stripe" style={{background:s.stripe}}></div>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value" style={{color:s.color}}>{s.value}</div>
          </div>
        ))}
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="section-title" style={{fontSize:13}}>Performance by Employee</div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Employee</th><th>Cars</th><th>Sales</th><th>Comm.</th></tr></thead>
              <tbody>
                {empRows.map((r,i)=>{
                  const emp = employees.find(e=>e.id===r.id);
                  return (
                    <tr key={i}>
                      <td>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <Avatar employee={emp||{full_name:r.name}} size={26} fontSize={10} />
                          <span style={{fontWeight:600}}>{r.name}</span>
                        </div>
                      </td>
                      <td style={{fontWeight:700,color:'var(--red)'}}>{r.cars}</td>
                      <td>{peso(r.sales)}</td>
                      <td style={{color:'var(--success)'}}>{peso(r.comm)}</td>
                    </tr>
                  );
                })}
                {empRows.length===0 && <tr><td colSpan={4} style={{textAlign:'center',padding:20,color:'var(--text2)'}}>No data.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>

        <div className="card">
          <div className="section-title" style={{fontSize:13}}>Top Services</div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Service</th><th>Count</th><th>Revenue</th></tr></thead>
              <tbody>
                {svcRows.map((s,i)=>(
                  <tr key={i}>
                    <td style={{fontWeight:600}}>{s.name}</td>
                    <td style={{color:'var(--red)',fontWeight:700}}>{s.count}</td>
                    <td style={{color:'var(--gold)'}}>{peso(s.revenue)}</td>
                  </tr>
                ))}
                {svcRows.length===0 && <tr><td colSpan={3} style={{textAlign:'center',padding:20,color:'var(--text2)'}}>No data.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── MAIN APP ── */
function App() {
  const [page,        setPage]        = useState('dashboard');
  const [sidebarOpen, setSidebarOpen] = useState(window.innerWidth > 768);
  const [employees,   setEmployees]   = useState([]);
  const [services,    setServices]    = useState([]);
  const [carWashes,   setCarWashes]   = useState([]);
  const [campaigns,   setCampaigns]   = useState([]);
  const [loading,     setLoading]     = useState(true);
  const [toast,       setToast]       = useState(null);

  const showToast = (msg, type='info') => setToast({ msg, type });

  const loadAll = async () => {
    try {
      const [emps,svcs,washes,camps] = await Promise.all([
        api('list','Employee'), api('list','Service'),
        api('list','CarWash'),  api('list','RewardCampaign'),
      ]);
      setEmployees(emps||[]); setServices(svcs||[]);
      setCarWashes(washes||[]); setCampaigns(camps||[]);
    } catch(e) { showToast('Failed to load data: '+e.message,'error'); }
    finally { setLoading(false); }
  };

  useEffect(() => { loadAll(); }, []);
  useEffect(() => {
    const fn = () => setSidebarOpen(window.innerWidth > 768);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);

  const navItems = [
    { id:'dashboard',    icon:Ic.home,   label:'Dashboard',    section:'Main' },
    { id:'record',       icon:Ic.car,    label:'Record Wash',  section:'Main' },
    { id:'transactions', icon:Ic.list,   label:'Transactions', section:'Main' },
    { id:'ranking',      icon:Ic.trophy, label:'Rankings',     section:'Analytics' },
    { id:'reports',      icon:Ic.chart,  label:'Reports',      section:'Analytics' },
    { id:'employees',    icon:Ic.users,  label:'Employees',    section:'Admin' },
    { id:'services',     icon:Ic.wrench, label:'Services',     section:'Admin' },
    { id:'rewards',      icon:Ic.gift,   label:'Rewards',      section:'Admin' },
  ];
  const sections       = [...new Set(navItems.map(n=>n.section))];
  const activeCampaign = campaigns.find(c=>c.is_active);
  const pageLabel      = navItems.find(n=>n.id===page)?.label || page;
  const isMobile       = window.innerWidth <= 768;

  if (loading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:14}}>
      <div style={{width:48,height:48,background:'var(--red)',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center'}}>
        {Ic.drop}
      </div>
      <div style={{fontSize:18,fontWeight:800}}>CarWash Pro</div>
      <div style={{color:'var(--text2)',fontSize:13}}>Loading...</div>
      <div style={{width:160,height:3,background:'var(--bg3)',borderRadius:2,overflow:'hidden'}}>
        <div style={{height:'100%',width:'60%',background:'var(--red)',borderRadius:2,animation:'slideLoad 1s ease-in-out infinite alternate'}}></div>
      </div>
    </div>
  );

  return (
    <div className="app">
      {isMobile && sidebarOpen && <div className="sidebar-overlay visible" onClick={()=>setSidebarOpen(false)}></div>}

      <div className={`sidebar ${sidebarOpen?'open':'closed'}`}>
        <div className="sidebar-logo">
          <div className="logo-mark">{Ic.drop}</div>
          <div>
            <div className="logo-name">CarWash Pro</div>
            <div className="logo-sub">Sales Tracker</div>
          </div>
        </div>

        <nav className="nav">
          {sections.map(sec => (
            <div key={sec}>
              <div className="nav-label">{sec}</div>
              {navItems.filter(n=>n.section===sec).map(item => (
                <div key={item.id} className={`nav-item ${page===item.id?'active':''}`}
                  onClick={()=>{ setPage(item.id); if(isMobile) setSidebarOpen(false); }}>
                  <span className="nav-icon">{item.icon}</span>
                  {item.label}
                </div>
              ))}
            </div>
          ))}
        </nav>

        <div className="sidebar-footer">
          {activeCampaign && (
            <div style={{background:'rgba(212,175,55,0.1)',border:'1px solid rgba(212,175,55,0.2)',borderRadius:8,padding:10,fontSize:11}}>
              <div style={{fontWeight:700,color:'var(--gold)',marginBottom:2}}>Active Campaign</div>
              <div style={{color:'var(--text2)'}}>{activeCampaign.campaign_name}</div>
            </div>
          )}
        </div>
      </div>

      <div className="main" style={{marginLeft: !isMobile && sidebarOpen ? 240 : 0}}>
        <div className="topbar">
          <div className="topbar-left">
            <div className="menu-btn" onClick={()=>setSidebarOpen(!sidebarOpen)}>{Ic.menu}</div>
            <div className="page-title">{pageLabel}</div>
          </div>
          <div className="topbar-right">
            <div className="live-badge"><div className="live-dot"></div>Live</div>
            <button className="btn btn-primary btn-sm" onClick={()=>setPage('record')}>
              {Ic.plus} New Wash
            </button>
          </div>
        </div>

        <div className="page-content">
          {page==='dashboard'    && <Dashboard    carWashes={carWashes} employees={employees} campaign={activeCampaign} setPage={setPage} />}
          {page==='record'       && <RecordCarWash employees={employees} services={services} onSave={w=>{setCarWashes(p=>[w,...p]);loadAll();}} showToast={showToast} />}
          {page==='transactions' && <Transactions  carWashes={carWashes} employees={employees} onDelete={id=>setCarWashes(p=>p.filter(w=>w.id!==id))} showToast={showToast} />}
          {page==='ranking'      && <Ranking       carWashes={carWashes} employees={employees} campaign={activeCampaign} />}
          {page==='reports'      && <Reports       carWashes={carWashes} employees={employees} showToast={showToast} />}
          {page==='employees'    && <Employees     employees={employees} carWashes={carWashes} showToast={showToast} onRefresh={loadAll} />}
          {page==='services'     && <Services      services={services} showToast={showToast} onRefresh={loadAll} />}
          {page==='rewards'      && <Rewards       campaigns={campaigns} carWashes={carWashes} employees={employees} showToast={showToast} onRefresh={loadAll} />}
        </div>
      </div>

      {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
