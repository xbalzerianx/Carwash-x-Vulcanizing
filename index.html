/* ── Employee Profile Modal (separate component to satisfy hooks rules) ── */
function EmpProfileModal({ viewEmp, carWashes, payouts, parseArr, peso, Av, onClose, onEdit, onDeletePayout }) {
  const [empTab,     setEmpTab]     = React.useState('washes');
  const [filter,     setFilter]     = React.useState('all');
  const [customFrom, setCustomFrom] = React.useState('');
  const [customTo,   setCustomTo]   = React.useState('');

  const now = new Date();

  /* --- Manila date helpers --- */
  const manilaDate  = dt => utcDate(dt).toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
  const manilaToday = ()  => new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});

  /* --- all car washes for this employee (incl. multi-split) --- */
  const allEmpWashes = carWashes.filter(w => {
    if (w.employee_id === viewEmp.id) return true;
    const splits = parseArr(w.commission_splits);
    return splits.some(sp => sp.employee_id === viewEmp.id || sp.id === viewEmp.id);
  }).sort((a,b) => new Date(b.transaction_date||b.created_date) - new Date(a.transaction_date||a.created_date));

  /* --- filter washes by period --- */
  const applyFilter = list => {
    const todayStr = manilaToday();
    if (filter==='today') return list.filter(w => manilaDate(w.transaction_date||w.created_date)===todayStr);
    if (filter==='yesterday') {
      const yest = new Date(); yest.setDate(yest.getDate()-1);
      const yestStr = yest.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
      return list.filter(w => manilaDate(w.transaction_date||w.created_date)===yestStr);
    }
    if (filter==='7days') {
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-6); cutoff.setHours(0,0,0,0);
      return list.filter(w => new Date(w.transaction_date||w.created_date)>=cutoff);
    }
    if (filter==='14days') {
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-13); cutoff.setHours(0,0,0,0);
      return list.filter(w => new Date(w.transaction_date||w.created_date)>=cutoff);
    }
    if (filter==='month') {
      return list.filter(w => {
        const d = new Date(w.transaction_date||w.created_date);
        return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
      });
    }
    if (filter==='custom' && customFrom && customTo) {
      return list.filter(w => { const s=manilaDate(w.transaction_date||w.created_date); return s>=customFrom&&s<=customTo; });
    }
    return list; // 'all'
  };

  const empWashes  = applyFilter(allEmpWashes);

  /* --- payouts for this employee --- */
  const empPayouts = (payouts||[]).filter(p => p.employee_id === viewEmp.id)
    .sort((a,b) => new Date(b.payout_date||b.created_date) - new Date(a.payout_date||a.created_date));

  /* --- this emp's commission from a wash --- */
  const getEmpComm = w => {
    const splits = parseArr(w.commission_splits);
    const sp = splits.find(s => s.employee_id === viewEmp.id || s.id === viewEmp.id);
    if (sp) return sp.amount||0;
    if (w.employee_id === viewEmp.id) return w.commission_amount||0;
    return 0;
  };

  /* --- stats (based on filtered list) --- */
  const totalCars  = empWashes.length;
  const getNetAmt  = w => { const c=parseArr(w.products_used).reduce((s,p)=>s+(typeof p==='object'?p.cost||0:0),0); const n=Math.max(0,(w.total_amount||0)-c); return n>0?n:w.total_amount||0; };
  const totalSales = empWashes.reduce((s,w) => s+getNetAmt(w), 0);
  const totalComm  = empWashes.reduce((s,w) => s+getEmpComm(w), 0);

  const filterLabels = {today:'Today',yesterday:'Yesterday','7days':'7 Days','14days':'14 Days',month:'Month',all:'All Time',custom:'Custom'};
  const periodLabel  = filterLabels[filter]||'';

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:520,padding:0,overflow:'hidden'}}>

        {/* Header */}
        <div style={{background:'var(--bg2)',padding:'24px 24px 16px',textAlign:'center',borderBottom:'1px solid var(--border)'}}>
          <Av emp={viewEmp} size={72} fs={26} center={true} />
          <div style={{fontSize:18,fontWeight:900,marginTop:10}}>{viewEmp.full_name}</div>
          <div style={{color:'var(--text2)',fontSize:12,marginTop:2}}>{viewEmp.contact_number||'No contact'}</div>
          <span className={`badge ${viewEmp.is_active?'badge-green':'badge-red'}`} style={{marginTop:6,display:'inline-block'}}>
            {viewEmp.is_active?'Active':'Inactive'}
          </span>
        </div>

        {/* Period filter pills */}
        <div style={{padding:'10px 16px 0',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
          <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:8}}>
            {[{k:'today',l:'Today'},{k:'yesterday',l:'Yesterday'},{k:'7days',l:'7 Days'},{k:'14days',l:'14 Days'},{k:'month',l:'Month'},{k:'all',l:'All'},{k:'custom',l:'Custom'}].map(t=>(
              <button key={t.k} onClick={()=>setFilter(t.k)}
                style={{padding:'5px 11px',borderRadius:20,fontSize:11,fontWeight:700,cursor:'pointer',border:'none',
                  background: filter===t.k ? 'var(--blue)' : 'rgba(255,255,255,0.06)',
                  color:       filter===t.k ? '#fff'        : 'var(--text2)',
                  transition:'all .15s'}}>
                {t.l}
              </button>
            ))}
          </div>
          {filter==='custom'&&(
            <div style={{display:'flex',gap:6,marginBottom:8,alignItems:'center'}}>
              <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)}
                style={{flex:1,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,padding:'5px 8px',color:'var(--text)',fontSize:12}}/>
              <span style={{color:'var(--text2)',fontSize:11}}>–</span>
              <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)}
                style={{flex:1,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,padding:'5px 8px',color:'var(--text)',fontSize:12}}/>
            </div>
          )}
        </div>

        {/* Stats row */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',borderBottom:'1px solid var(--border)'}}>
          {[
            {l:'Cars',       v:totalCars,          c:'var(--blue)'},
            {l:periodLabel,  v:empWashes.length,   c:'var(--success)'},
            {l:'Revenue',    v:peso(totalSales),   c:'var(--gold)'},
            {l:'Commission', v:peso(totalComm),    c:'var(--silver)'}
          ].map((x,i)=>(
            <div key={i} style={{padding:'12px 6px',textAlign:'center',borderRight:i<3?'1px solid var(--border)':'none'}}>
              <div style={{fontSize:14,fontWeight:800,color:x.c}}>{x.v}</div>
              <div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>{x.l}</div>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{display:'flex',borderBottom:'1px solid var(--border)',background:'var(--bg)'}}>
          {[
            {k:'washes',  label:`🚗 Car Washes (${empWashes.length})`},
            {k:'payouts', label:`💰 Payouts (${empPayouts.length})`}
          ].map(t=>(
            <button key={t.k} onClick={()=>setEmpTab(t.k)}
              style={{flex:1,padding:'12px 8px',fontSize:12,fontWeight:700,background:'none',border:'none',
                borderBottom:empTab===t.k?'2px solid var(--blue)':'2px solid transparent',
                color:empTab===t.k?'var(--blue)':'var(--text2)',cursor:'pointer',transition:'all .2s'}}>
              {t.label}
            </button>
          ))}
        </div>

        {/* Tab content */}
        <div style={{maxHeight:280,overflowY:'auto'}}>

          {/* Car Washes */}
          {empTab==='washes' && (
            empWashes.length===0
              ? <div style={{padding:32,textAlign:'center',color:'var(--text2)'}}>
                  <div style={{fontSize:32,marginBottom:8}}>🚗</div>
                  <div style={{fontSize:13}}>No car washes yet</div>
                </div>
              : empWashes.map((w,i) => {
                  const comm = getEmpComm(w);
                  const splits = parseArr(w.commission_splits);
                  const isTeam = splits.length > 1;
                  const mySplit = splits.find(s=>s.employee_id===viewEmp.id||s.id===viewEmp.id);
                  const commRate = mySplit?.rate || w.commission_rate || viewEmp.commission_percentage || 0;

                  // Helper: parse name from a raw/stringified item
                  const parseName = s => {
                    if (!s) return null;
                    if (typeof s === 'string') {
                      try { const p = JSON.parse(s); return p.name || p.service_name || null; } catch { return s.trim() || null; }
                    }
                    return s.name || s.service_name || null;
                  };

                  // Services (what was done)
                  const svcs = parseArr(w.services);
                  const svcList = svcs.map(parseName).filter(Boolean);

                  // Products used (materials deducted from commission)
                  const prods = parseArr(w.products_used);
                  const prodList = prods.map(p => {
                    const name = parseName(p);
                    const cost = (typeof p === 'object' && p !== null) ? (p.cost||0) : 0;
                    return name ? (cost>0 ? `${name} (-₱${cost})` : name) : null;
                  }).filter(Boolean);

                  const txDate = new Date(w.transaction_date||w.created_date);
                  return (
                    <div key={w.id} style={{display:'flex',alignItems:'flex-start',gap:12,padding:'13px 20px',
                      borderBottom:'1px solid var(--border)',background:i%2===0?'var(--bg)':'var(--bg2)'}}>
                      <div style={{width:38,height:38,borderRadius:10,background:'rgba(77,166,255,0.1)',
                        display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0,marginTop:2}}>🚗</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:700,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                          {w.plate_number||'No Plate'}
                          {isTeam && <span style={{fontSize:9,background:'rgba(212,175,55,0.2)',color:'var(--gold)',
                            padding:'2px 6px',borderRadius:20,fontWeight:800}}>TEAM</span>}
                        </div>

                        {/* Services + Products combined */}
                        {(svcList.length>0||prodList.length>0)
                          ? <div style={{fontSize:11,color:'var(--blue)',marginTop:3,fontWeight:600,lineHeight:1.6,
                              overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'100%'}}>
                              {[...svcList, ...prodList].join(' · ')}
                            </div>
                          : null
                        }

                        <div style={{fontSize:10,color:'var(--text2)',marginTop:3}}>
                          {txDate.toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric',timeZone:'Asia/Manila'})} · {txDate.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Manila'})}
                          {isTeam && <span style={{marginLeft:6,color:'var(--gold)'}}>· split {splits.length} ways</span>}
                        </div>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0}}>
                        {/* For team jobs, show this employee's share of the total */}
                        <div style={{fontSize:14,fontWeight:800,color:'var(--gold)'}}>
                          {isTeam && mySplit ? peso(Math.round((w.total_amount||0) / splits.length)) : peso(w.total_amount||0)}
                        </div>
                        {isTeam && <div style={{fontSize:10,color:'var(--text2)',marginTop:1}}>of {peso(w.total_amount||0)} total</div>}
                        <div style={{fontSize:11,color:'var(--success)',marginTop:2,fontWeight:700}}>+{peso(comm)} comm</div>
                        <div style={{fontSize:10,color:'var(--text2)',marginTop:1}}>{commRate}% rate</div>
                      </div>
                    </div>
                  );
                })
          )}

          {/* Payouts */}
          {empTab==='payouts' && (
            empPayouts.length===0
              ? <div style={{padding:32,textAlign:'center',color:'var(--text2)'}}>
                  <div style={{fontSize:32,marginBottom:8}}>💰</div>
                  <div style={{fontSize:13}}>No payouts recorded yet</div>
                </div>
              : empPayouts.map((p,i) => {
                  const pd = new Date(p.payout_date||p.created_date);
                  const isAdvance = p.is_advance === true;
                  return (
                    <div key={p.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',
                      borderBottom:'1px solid var(--border)',background:i%2===0?'var(--bg)':'var(--bg2)'}}>
                      <div style={{width:36,height:36,borderRadius:10,
                        background: isAdvance ? 'rgba(77,166,255,0.12)' : 'rgba(212,175,55,0.12)',
                        display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>
                        {isAdvance ? '💵' : '💳'}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                          <span style={{fontSize:13,fontWeight:700}}>{isAdvance ? (p.note||'Cash Advance') : 'Earned Payout'}</span>
                          {isAdvance && <span style={{fontSize:9,fontWeight:800,background:'rgba(77,166,255,0.18)',color:'#4DA6FF',padding:'2px 7px',borderRadius:20,border:'1px solid rgba(77,166,255,0.3)',letterSpacing:.5}}>ADVANCE</span>}
                        </div>
                        <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginTop:3}}>
                          {pd.toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric',timeZone:'Asia/Manila'})} <span style={{color:'var(--text2)',fontWeight:400}}>·</span> {pd.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Manila'})}
                        </div>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0,display:'flex',alignItems:'center',gap:8}}>
                        <div>
                          <div style={{fontSize:14,fontWeight:800,color: isAdvance ? '#4DA6FF' : 'var(--gold)'}}>{peso(p.amount||0)}</div>
                          <div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>{isAdvance ? 'Advance' : 'Earned Payout'}</div>
                        </div>
                        {onDeletePayout && (
                          <button onClick={()=>onDeletePayout(p)} title='Delete payout'
                            style={{background:'rgba(217,74,74,0.12)',border:'1px solid rgba(217,74,74,0.25)',
                              borderRadius:8,padding:'6px 8px',cursor:'pointer',color:'#D94A4A',
                              display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}
                            onMouseEnter={e=>e.currentTarget.style.background='rgba(217,74,74,0.3)'}
                            onMouseLeave={e=>e.currentTarget.style.background='rgba(217,74,74,0.12)'}>
                            <svg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='currentColor' strokeWidth='2.2'>
                              <polyline points='3 6 5 6 21 6'/><path d='M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6'/>
                              <path d='M10 11v6'/><path d='M14 11v6'/><path d='M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2'/>
                            </svg>
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })
          )}
        </div>

        {/* Footer */}
        <div style={{display:'flex',gap:10,padding:'16px 20px',borderTop:'1px solid var(--border)',background:'var(--bg2)'}}>
          <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>Close</button>
          <button className="btn btn-primary" style={{flex:1}} onClick={onEdit}>Edit</button>
        </div>
      </div>
    </div>
  );
}

function Employees({ employees, carWashes, payouts=[], showToast, onRefresh, bizType='carwash', isAdmin=true }) {
  const emptyEmpForm = {full_name:'',contact_number:'',commission_percentage:40,is_active:true,avatar_color:'#D94A4A',avatar_url:'',business_type:bizType};
  const [showModal,setShowModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [viewEmp,setViewEmp]=useState(null);
  const [saving,setSaving]=useState(false);
  const [form,setForm]=useState(emptyEmpForm);
  const [preview,setPreview]=useState('');
  const [showPayoutModal,setShowPayoutModal]=useState(false);
  const [payoutEmp,setPayoutEmp]=useState(null);
  const [payoutAmt,setPayoutAmt]=useState('');
  const [payoutNote,setPayoutNote]=useState('');
  const [payoutSaving,setPayoutSaving]=useState(false);
  const [showAdvanceModal,setShowAdvanceModal]=useState(false);
  const [advanceEmp,setAdvanceEmp]=useState(null);
  const [advanceAmt,setAdvanceAmt]=useState('');
  const [advanceNote,setAdvanceNote]=useState('');
  const [advanceSaving,setAdvanceSaving]=useState(false);
  const [confirmDeleteEmp,setConfirmDeleteEmp]=useState(null);
  const fileRef=useRef();
  const COLORS=['#D94A4A','#22C55E','#D4AF37','#B8BCC2','#B87333','#6C63FF','#E91E8C','#00BCD4'];
  // Filter employees by business type
  const displayEmployees = employees.filter(e=>bizType==='vulcanizing'?(e.business_type==='vulcanizing'):(e.business_type==='carwash'||!e.business_type));

  // Commission math
  const getCommStats = (empId) => {
    // ✅ ALL-TIME: commission earned and balance never reset — carries across months
    const allWashes = carWashes.filter(w => {
      if (w.employee_id===empId) return true;
      try { const sp=parseArr(w.commission_splits); return sp.some(s=>s.employee_id===empId||s.id===empId); } catch(e){}
      return false;
    });
    const earned = allWashes.reduce((s,w)=>{
      try { const sp=parseArr(w.commission_splits); const my=sp.find(s=>s.employee_id===empId||s.id===empId); if(my) return s+(my.amount||0); } catch(e){}
      return s+(w.commission_amount||0);
    },0);
    // All-time payouts (no monthly filter)
    const paid = (payouts||[])
      .filter(p => p.employee_id===empId)
      .reduce((s,p)=>s+(p.amount||0),0);
    const remaining = Math.round((earned - paid) * 100) / 100;
    return { earned, paid, remaining };
  };

  const handlePayout = async () => {
    const amt = parseFloat(payoutAmt);
    if (!amt || amt <= 0) return showToast('Enter a valid amount','warning');
    const stats = getCommStats(payoutEmp.id);
    if (amt > Math.ceil(stats.remaining)) return showToast(`Max available: ${peso(stats.remaining)}`,'warning');
    setPayoutSaving(true);
    try {
      await api('create','CommissionPayout',{data:{
        employee_id:   payoutEmp.id,
        employee_name: payoutEmp.full_name,
        amount:        amt,
        note:          payoutNote || 'Earned Payout',
        payout_date:   new Date().toISOString(),
      }});
      logEvent({event_type:'commission_paid',title:`Commission paid — ${payoutEmp.full_name}`,description:`${payoutNote||'Earned Payout'} | Remaining after: ${peso(getCommStats(payoutEmp.id).remaining - amt)}`,actor_name:payoutEmp.full_name,entity_id:payoutEmp.id,amount:amt});
      await onRefresh();
      setShowPayoutModal(false);
      setPayoutAmt(''); setPayoutNote('');
      showToast(`Payout of ${peso(amt)} recorded for ${payoutEmp.full_name}`,'success');
    } catch(e){showToast('Error: '+e.message,'error');}
    finally{setPayoutSaving(false);}
  };

  const handleAdvance = async () => {
    const amt = parseFloat(advanceAmt);
    if (!amt || amt <= 0) return showToast('Enter a valid amount','warning');
    setAdvanceSaving(true);
    try {
      await api('create','CommissionPayout',{data:{
        employee_id:   advanceEmp.id,
        employee_name: advanceEmp.full_name,
        amount:        amt,
        note:          advanceNote || 'Cash Advance',
        payout_date:   new Date().toISOString(),
        is_advance:    true,
      }});
      logEvent({event_type:'cash_advance',title:`Cash Advance — ${advanceEmp.full_name}`,description:`${advanceNote||'Cash Advance'} · ${peso(amt)}`,actor_name:advanceEmp.full_name,entity_id:advanceEmp.id,amount:amt});
      await onRefresh();
      setShowAdvanceModal(false);
      setAdvanceAmt(''); setAdvanceNote('');
      showToast(`Cash advance of ${peso(amt)} recorded for ${advanceEmp.full_name}`,'success');
    } catch(e){showToast('Error: '+e.message,'error');}
    finally{setAdvanceSaving(false);}
  };

  const openAdd =()=>{setEditing(null);setForm(emptyEmpForm);setPreview('');setShowModal(true);};
  const openEdit=emp=>{
    const localAv = emp?.id ? (()=>{ try { return localStorage.getItem('kgcar_avatar_'+emp.id)||''; } catch(e){ return ''; } })() : '';
    const av = emp.avatar_url||localAv||'';
    setEditing(emp);setForm({...emp,avatar_url:av});setPreview(av);setShowModal(true);
  };

  const handleImg=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      // Compress to 80x80 jpeg to keep payload small
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        canvas.width=80; canvas.height=80;
        const ctx=canvas.getContext('2d');
        // crop to square
        const sz=Math.min(img.width,img.height);
        const ox=(img.width-sz)/2, oy=(img.height-sz)/2;
        ctx.drawImage(img,ox,oy,sz,sz,0,0,80,80);
        const compressed=canvas.toDataURL('image/jpeg',0.75);
        setPreview(compressed);
        setForm(x=>({...x,avatar_url:compressed}));
      };
      img.src=ev.target.result;
    };
    r.readAsDataURL(f);
  };

  const handleSave=async()=>{
    if (!form.full_name.trim()) return showToast('Enter employee name','warning');
    setSaving(true);
    try {
      const {avatar_url:avatarBase64, ...saveData} = form;
      let savedId = editing?.id;
      const nameChanged = editing && editing.full_name !== form.full_name.trim();
      if(editing) {
        await api('update','Employee',{id:editing.id,data:saveData});
        // If name changed, backfill all CarWash + VulcanizingJob records
        if (nameChanged) {
          const newName = form.full_name.trim();
          const oldName = editing.full_name;
          // Fetch all records belonging to this employee
          const [allWashes, allJobs] = await Promise.all([
            api('filter','CarWash',{query:{employee_id:editing.id}}),
            api('filter','VulcanizingJob',{query:{employee_id:editing.id}}),
          ]);
          const washList = allWashes?.data || [];
          const jobList  = allJobs?.data  || [];
          // Update each record with new employee_name
          await Promise.all([
            ...washList.map(w => api('update','CarWash',{id:w.id,data:{employee_name:newName}})),
            ...jobList.map(j  => api('update','VulcanizingJob',{id:j.id,data:{employee_name:newName}})),
          ]);
          if (washList.length + jobList.length > 0) {
            showToast(`Updated name in ${washList.length + jobList.length} transaction(s)`,'info');
          }
        }
        logEvent({event_type:'employee_updated',title:`Employee updated — ${form.full_name}`,description:`Commission: ${form.commission_percentage}% | Status: ${form.is_active?'Active':'Inactive'}`,actor_name:form.full_name,entity_id:editing.id});
      } else {
        const created = await api('create','Employee',{data:saveData});
        savedId = created?.id;
        logEvent({event_type:'employee_added',title:`New employee added — ${form.full_name}`,description:`Commission rate: ${form.commission_percentage}%`,actor_name:form.full_name,entity_id:savedId||''});
      }
      // Save avatar → Supabase Storage via backend, store permanent public URL in DB
      if (savedId && avatarBase64 && avatarBase64.startsWith('data:')) {
        showToast('Uploading photo…','info');
        const cdnUrl = await uploadAvatar(avatarBase64, savedId);
        if (cdnUrl) {
          await api('update','Employee',{id:savedId, data:{avatar_url:cdnUrl}});
          try { localStorage.setItem('kgcar_avatar_'+savedId, cdnUrl); } catch(e){}
        }
      } else if (savedId && avatarBase64 && avatarBase64.startsWith('http')) {
        // Already a CDN URL — keep as-is, no re-upload needed
      } else if (savedId && !avatarBase64) {
        // Cleared — remove from DB and localStorage
        await api('update','Employee',{id:savedId, data:{avatar_url:''}});
        try { localStorage.removeItem('kgcar_avatar_'+savedId); } catch(e){}
      }
      await onRefresh(); setShowModal(false);
      showToast(editing?'Employee updated!':'Employee added!','success');
    } catch(e){showToast('Error: '+e.message,'error');}
    finally{setSaving(false);}
  };

  const toggleActive=async emp=>{
    try{await api('update','Employee',{id:emp.id,data:{is_active:!emp.is_active}});await onRefresh();showToast(`${emp.full_name} ${emp.is_active?'deactivated':'activated'}`,'success');}
    catch(e){showToast('Error','error');}
  };
  const deleteEmp=async()=>{
    if(!confirmDeleteEmp) return;
    try{
      await api('delete','Employee',{id:confirmDeleteEmp.id});
      logEvent({event_type:'employee_deleted',title:`Employee removed — ${confirmDeleteEmp.full_name}`,description:'',actor_name:confirmDeleteEmp.full_name,entity_id:confirmDeleteEmp.id});
      await onRefresh(); setConfirmDeleteEmp(null);
      showToast(`${confirmDeleteEmp.full_name} removed`,'success');
    }catch(e){showToast('Error: '+e.message,'error');}
  };

  const getStats=id=>{
    // ✅ FIX: Include jobs where employee is PRIMARY (employee_id) OR TEAM MEMBER (commission_splits)
    const ws=carWashes.filter(w=>{
      if(w.employee_id===id) return true;
      const splits=parseArr(w.commission_splits);
      return splits.some(sp=>sp.employee_id===id||sp.id===id);
    });
    const now=new Date();
    const manilaToday=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
    const manilaDate=dt=>{ const d=typeof dt==='string'&&!dt.endsWith('Z')&&!dt.includes('+') ? new Date(dt+'Z') : new Date(dt); return d.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}); };
    return {
      total:ws.length,
      today:ws.filter(w=>manilaDate(w.transaction_date||w.created_date)===manilaToday).length,
      month:ws.filter(w=>{ const d=manilaDate(w.transaction_date||w.created_date); return d.slice(0,7)===manilaToday.slice(0,7); }).length,
      sales:ws.reduce((s,w)=>s+(w.total_amount||0),0),
      comm:ws.reduce((s,w)=>s+(w.commission_amount||0),0),
    };
  };

  return (
    <div>
      <div className="flex-between mb-4">
        <div className="section-title" style={{marginBottom:0}}>{bizType==='vulcanizing'?'🔧 Vulcanizing Employees':'🚗 Car Wash Employees'}</div>
        <button className="btn btn-primary btn-sm" onClick={openAdd}>{Ic.plus} Add Employee</button>
      </div>
      <div className="grid-2">
        {displayEmployees.map(emp=>{
          const s=getStats(emp.id);

            <div key={emp.id} className="card" style={{cursor:'pointer'}} onClick={()=>setViewEmp(emp)}>
              <div className="flex-between mb-4">

                </div>
                <span className={`badge ${emp.is_active?'badge-green':'badge-red'}`}>{emp.is_active?'Active':'Inactive'}</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
                {[{l:'Today',v:s.today,c:'var(--blue)'},{l:'Month',v:s.month,c:'var(--success)'},{l:'Comm%',v:emp.commission_percentage+'%',c:'var(--gold)'}].map((x,i)=>(
                  <div key={i} style={{textAlign:'center',background:'var(--glass)',borderRadius:8,padding:8}}>
                    <div style={{fontSize:15,fontWeight:800,color:x.c}}>{x.v}</div>
                    <div style={{fontSize:10,color:'var(--text2)'}}>{x.l}</div>
                  </div>
                ))}

              {(() => {
                const cs = getCommStats(emp.id);
                return cs.earned > 0 ? (
                  <div style={{background:'rgba(255,255,255,.04)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 12px',marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontSize:11,color:'var(--text2)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.3px'}}>Commission Earned</span>
                      <div style={{display:'flex',gap:6}}>
                        <button className="btn btn-sm" style={{padding:'3px 10px',fontSize:11,background:'rgba(77,166,255,0.15)',color:'#4DA6FF',border:'1px solid rgba(77,166,255,0.3)'}} onClick={e=>{e.stopPropagation();setAdvanceEmp(emp);setAdvanceAmt('');setAdvanceNote('');setShowAdvanceModal(true);}}>💵 Advance</button>
                        <button className="btn btn-sm btn-primary" style={{padding:'3px 10px',fontSize:11}} onClick={e=>{e.stopPropagation();setPayoutEmp(emp);setPayoutAmt('');setPayoutNote('');setShowPayoutModal(true);}}>Pay Out</button>
                      </div>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginTop:6}}>
                      {[{l:'Earned',v:peso(cs.earned),c:'var(--gold)'},{l:'Paid',v:peso(cs.paid),c:'var(--success)'},{l:'Balance',v:peso(cs.remaining),c:cs.remaining>0?'var(--red)':'var(--text2)'}].map((x,i)=>(
                        <div key={i} style={{textAlign:'center',background:'var(--glass)',borderRadius:7,padding:'6px 4px'}}>
                          <div style={{fontSize:13,fontWeight:800,color:x.c}}>{x.v}</div>
                          <div style={{fontSize:10,color:'var(--text2)'}}>{x.l}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : null;
              })()}
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {isAdmin && <button className="btn btn-ghost btn-sm" style={{flex:'1 1 60px',minWidth:0}} onClick={e=>{e.stopPropagation();openEdit(emp);}}>{Ic.edit} Edit</button>}
                {isAdmin && <button className={`btn btn-sm ${emp.is_active?'btn-danger':''}`} style={{flex:'1 1 80px',minWidth:0,background:emp.is_active?undefined:'rgba(34,197,94,.15)',color:emp.is_active?undefined:'var(--success)',border:emp.is_active?undefined:'1px solid rgba(34,197,94,.2)'}} onClick={e=>{e.stopPropagation();toggleActive(emp);}}>
                  {emp.is_active?'Deactivate':'Activate'}
                </button>}
                {isAdmin && <button className="btn btn-sm" style={{background:'rgba(217,74,74,0.12)',color:'var(--red)',border:'1px solid rgba(217,74,74,0.25)',minWidth:36}} onClick={e=>{e.stopPropagation();setConfirmDeleteEmp(emp);}}>🗑</button>}
              </div>
            </div>
          );
        })}
      </div>

      {showModal && (
        <div className="modal-overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">{editing?'Edit Employee':bizType==='vulcanizing'?'Add Vulcanizing Employee':'Add Car Wash Employee'}</div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',marginBottom:18}}>
              <div style={{position:'relative',marginBottom:6}}>
                <div style={{width:72,height:72,borderRadius:'50%',background:preview?'transparent':form.avatar_color,display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:800,fontSize:24,overflow:'hidden',cursor:'pointer',border:'2px dashed rgba(255,255,255,.15)'}} onClick={()=>fileRef.current?.click()}>
                  {preview ? <img src={preview} style={{width:'100%',height:'100%',objectFit:'cover'}} /> : initials(form.full_name||'?')}
                </div>
                <div style={{position:'absolute',bottom:0,right:0,width:22,height:22,background:'var(--red)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}} onClick={()=>fileRef.current?.click()}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" width="12" height="12"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
                </div>
                <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleImg} />

            </div>
            {!preview && (
              <div className="form-group">
                <label className="form-label">Avatar Color</label>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {COLORS.map(c=>(
                    <div key={c} onClick={()=>setForm({...form,avatar_color:c})} style={{width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',outline:form.avatar_color===c?'2px solid white':'2px solid transparent',outlineOffset:2,transition:'all .15s'}}></div>
                  ))}
                </div>
              </div>
            )}
            {preview && <div className="form-group"><button className="btn btn-ghost btn-sm" onClick={()=>{setPreview('');setForm(f=>({...f,avatar_url:''}));}}>Remove photo</button></div>}
            <div className="form-group"><label className="form-label">Full Name *</label><input className="form-input" value={form.full_name} onChange={e=>setForm({...form,full_name:e.target.value})} placeholder="Juan dela Cruz" /></div>
            <div className="form-group"><label className="form-label">Contact Number</label><input className="form-input" value={form.contact_number} onChange={e=>setForm({...form,contact_number:e.target.value})} placeholder="09XXXXXXXXX" /></div>
            <div className="form-group"><label className="form-label">Commission %</label><input className="form-input" type="number" min="0" max="100" value={form.commission_percentage} onChange={e=>setForm({...form,commission_percentage:parseFloat(e.target.value)})} /></div>
            <div className="form-group"><label className="form-label">Status</label><select className="form-input" value={form.is_active} onChange={e=>setForm({...form,is_active:e.target.value==='true'})}><option value="true">Active</option><option value="false">Inactive</option></select></div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={handleSave} disabled={saving}>{saving?'Saving...':'Save'}</button>
            </div>
          </div>
        </div>
      )}

      {/* PAYOUT MODAL */}
      {showPayoutModal && payoutEmp && (() => {
        const cs = getCommStats(payoutEmp.id);
        return (
          <div className="modal-overlay" onClick={()=>setShowPayoutModal(false)}>
            <div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
              <div className="modal-title">Pay Commission</div>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:18,background:'var(--glass)',border:'1px solid var(--border)',borderRadius:12,padding:14}}>
                <Av emp={payoutEmp} size={46} fs={17} />
                <div>
                  <div style={{fontWeight:800,fontSize:15}}>{payoutEmp.full_name}</div>
                  <div style={{fontSize:12,color:'var(--text2)'}}>This month</div>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:18}}>
                {[{l:'Earned',v:peso(cs.earned),c:'var(--gold)'},{l:'Already Paid',v:peso(cs.paid),c:'var(--success)'},{l:'Available',v:peso(cs.remaining),c:'var(--red)'}].map((x,i)=>(
                  <div key={i} style={{textAlign:'center',background:'var(--glass)',border:'1px solid var(--border)',borderRadius:10,padding:10}}>
                    <div style={{fontSize:16,fontWeight:900,color:x.c}}>{x.v}</div>
                    <div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>{x.l}</div>
                  </div>
                ))}
              </div>
              <div className="form-group">
                <label className="form-label">Amount to Pay Out (max {peso(cs.remaining)})</label>
                <input className="form-input" type="number" min="1" max={cs.remaining} placeholder="e.g. 1000" value={payoutAmt} onChange={e=>setPayoutAmt(e.target.value)} style={{fontSize:22,fontWeight:800,textAlign:'center'}} />
              </div>
              <div className="form-group">
                <label className="form-label">Note (optional)</label>
                <input className="form-input" placeholder="e.g. Advance, Full payout..." value={payoutNote} onChange={e=>setPayoutNote(e.target.value)} />
              </div>
              {parseFloat(payoutAmt) > 0 && (
                <div style={{background:'rgba(34,197,94,.08)',border:'1px solid rgba(34,197,94,.2)',borderRadius:10,padding:12,marginBottom:14,fontSize:13}}>
                  After this payout: <strong style={{color:'var(--success)'}}>{peso(cs.remaining - (parseFloat(payoutAmt)||0))}</strong> remaining balance
                </div>
              )}
              <div style={{display:'flex',gap:10}}>
                <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setShowPayoutModal(false)}>Cancel</button>
                <button className="btn btn-success" style={{flex:1}} onClick={handlePayout} disabled={payoutSaving||!payoutAmt||parseFloat(payoutAmt)<=0}>{payoutSaving?'Saving...':'Confirm Payout'}</button>
              </div>
            </div>
          </div>
        );
      })()}

      {showAdvanceModal && advanceEmp && (
        <div className="modal-overlay" onClick={()=>setShowAdvanceModal(false)}>
          <div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
            <div className="modal-title">💵 Cash Advance</div>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:18,background:'var(--glass)',border:'1px solid var(--border)',borderRadius:12,padding:14}}>
              <Av emp={advanceEmp} size={46} fs={17} />
              <div>
                <div style={{fontWeight:800,fontSize:15}}>{advanceEmp.full_name}</div>
                <div style={{fontSize:12,color:'var(--text2)'}}>Cash advance — separate from earned commission</div>
              </div>
            </div>
            <div style={{background:'rgba(77,166,255,0.08)',border:'1px solid rgba(77,166,255,0.2)',borderRadius:10,padding:'10px 14px',marginBottom:16,fontSize:12,color:'#4DA6FF',lineHeight:1.5}}>
              ℹ️ This records a cash advance against the employee. It will appear in their payout history.
            </div>
            <div className="form-group">
              <label className="form-label">Advance Amount (₱)</label>
              <input className="form-input" type="number" min="1" placeholder="e.g. 500" value={advanceAmt} onChange={e=>setAdvanceAmt(e.target.value)} style={{fontSize:22,fontWeight:800,textAlign:'center'}} />
            </div>
            <div className="form-group">
              <label className="form-label">Note (optional)</label>
              <input className="form-input" placeholder="e.g. Cash advance June 15..." value={advanceNote} onChange={e=>setAdvanceNote(e.target.value)} />
            </div>
            {parseFloat(advanceAmt) > 0 && (
              <div style={{background:'rgba(77,166,255,0.08)',border:'1px solid rgba(77,166,255,0.2)',borderRadius:10,padding:12,marginBottom:14,fontSize:13}}>
                Recording advance of <strong style={{color:'#4DA6FF'}}>{peso(parseFloat(advanceAmt)||0)}</strong> for {advanceEmp.full_name}
              </div>
            )}
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setShowAdvanceModal(false)}>Cancel</button>
              <button className="btn" style={{flex:1,background:'#4DA6FF',color:'#fff',fontWeight:800}} onClick={handleAdvance} disabled={advanceSaving||!advanceAmt||parseFloat(advanceAmt)<=0}>{advanceSaving?'Saving...':'Record Advance'}</button>
            </div>
          </div>
        </div>
      )}

      {viewEmp && (
        <EmpProfileModal
          viewEmp={employees.find(e=>e.id===viewEmp.id)||viewEmp}
          carWashes={carWashes}
          payouts={payouts}
          parseArr={parseArr}
          peso={peso}
          Av={Av}
          onClose={()=>setViewEmp(null)}
          onEdit={isAdmin ? ()=>{setViewEmp(null);openEdit(employees.find(e=>e.id===viewEmp.id)||viewEmp);} : null}
          onDeletePayout={isAdmin ? async(p)=>{
            if(!window.confirm(`Delete this ${p.is_advance?'Cash Advance':'Earned Payout'} of ${peso(p.amount||0)} for ${p.employee_name}? This cannot be undone.`)) return;
            try {
              await api('delete','CommissionPayout',{id:p.id});
              await logEvent({event_type:'payout_deleted',
                title:`Payout Deleted — ${p.employee_name}`,
                description:`${p.is_advance?'Cash Advance':'Earned Payout'} of ${peso(p.amount||0)} deleted (was ${new Date(p.payout_date||p.created_date).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric',timeZone:'Asia/Manila'})})`,
                actor_name:p.employee_name, entity_id:p.id, amount:p.amount||0});
              await loadAll();
              showToast('Payout deleted','success');
            } catch(e){ showToast('Delete failed: '+e.message,'error'); }
          } : null}
        />
      )}
      {confirmDeleteEmp && (
        <div className="modal-overlay" onClick={()=>setConfirmDeleteEmp(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:380,textAlign:'center'}}>
            <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
            <div className="modal-title" style={{marginBottom:8}}>Remove Employee?</div>
            <p style={{color:'var(--text2)',fontSize:14,marginBottom:24}}>Are you sure you want to remove <strong style={{color:'var(--text)'}}>{confirmDeleteEmp.full_name}</strong>? Their transaction history will remain but they will no longer appear in new records.</p>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setConfirmDeleteEmp(null)}>Cancel</button>
              <button className="btn btn-danger" style={{flex:1}} onClick={deleteEmp}>Yes, Remove</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   SERVICES
═══════════════════════════════════════════ */
function Services({ services, showToast, onRefresh, bizFilter=null }) {
  const [showModal,setShowModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const emptyForm = {name:'',description:'',price:0,is_active:true,business_type:bizFilter||'carwash'};
  const [form,setForm]=useState(emptyForm);
  const [confirmDelete,setConfirmDelete]=useState(null);
  // Filter services by business type if bizFilter is set
  const displayServices = bizFilter ? services.filter(s=>s.business_type===bizFilter||(bizFilter==='carwash'&&!s.business_type)) : services.filter(s=>!s.business_type||s.business_type==='carwash');
  const openAdd=()=>{setEditing(null);setForm(emptyForm);setShowModal(true);};
  const openEdit=svc=>{setEditing(svc);setForm({...svc});setShowModal(true);};
  const handleSave=async()=>{
    if(!form.name.trim()) return showToast('Enter service name','warning');
    setSaving(true);
    try{
      const saveData={...form,business_type:bizFilter||'carwash'};
      if(editing) {
        await api('update','Service',{id:editing.id,data:saveData});
        logEvent({event_type:'service_updated',title:`Service updated — ${form.name}`,description:`Price: ${peso(form.price)} | ${form.is_active?'Active':'Inactive'}`,entity_id:editing.id});
      } else {
        const created = await api('create','Service',{data:saveData});
        logEvent({event_type:'service_added',title:`New service added — ${form.name}`,description:`Price: ${peso(form.price)}`,entity_id:created?.id||''});
      }
      await onRefresh();setShowModal(false);
      showToast(editing?'Service updated!':'Service added!','success');
    }catch(e){showToast('Error: '+e.message,'error');}
    finally{setSaving(false);}
  };
  const toggle=async svc=>{try{await api('update','Service',{id:svc.id,data:{is_active:!svc.is_active}});await onRefresh();}catch(e){showToast('Error','error');}};
  const deleteSvc=async()=>{
    if(!confirmDelete) return;
    try{
      await api('delete','Service',{id:confirmDelete.id});
      logEvent({event_type:'service_deleted',title:`Service removed — ${confirmDelete.name}`,description:`Price was ${peso(confirmDelete.price)}`,entity_id:confirmDelete.id});
      await onRefresh(); setConfirmDelete(null);
      showToast(`"${confirmDelete.name}" removed`,'success');
    }catch(e){showToast('Error: '+e.message,'error');}
  };;
  return (
    <div>
      <div className="flex-between mb-4">
        <div className="section-title" style={{marginBottom:0}}>{bizFilter==='vulcanizing'?'🔧 Vulcanizing Services':'🚗 Car Wash Services'}</div>
        <button className="btn btn-primary btn-sm" onClick={openAdd}>{Ic.plus} Add Service</button>
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Name</th><th className='hide-xs'>Description</th><th>Price</th><th>Status</th><th></th></tr></thead>
            <tbody>
              {displayServices.map(svc=>(
                <tr key={svc.id}>
                  <td style={{fontWeight:700}}>{svc.name}</td>
                  <td className='hide-xs' style={{color:'var(--text2)'}}>{svc.description||'—'}</td>
                  <td style={{fontWeight:700,color:'var(--gold)'}}>{peso(svc.price)}</td>
                  <td><span className={`badge ${svc.is_active?'badge-green':'badge-red'}`}>{svc.is_active?'Active':'Inactive'}</span></td>
                  <td><div style={{display:'flex',gap:4,flexWrap:'wrap',justifyContent:'flex-end'}}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(svc)}>{Ic.edit}</button>
                    <button className={`btn btn-sm ${svc.is_active?'btn-danger':''}`} style={{fontSize:11,...(!svc.is_active?{background:'rgba(34,197,94,.15)',color:'var(--success)',border:'1px solid rgba(34,197,94,.2)'}:{})}} onClick={()=>toggle(svc)}>{svc.is_active?'Deactivate':'Activate'}</button>
                    <button className="btn btn-sm" style={{fontSize:11,background:'rgba(217,74,74,0.12)',color:'var(--red)',border:'1px solid rgba(217,74,74,0.25)'}} onClick={()=>setConfirmDelete(svc)}>🗑</button>
                  </div></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      {showModal && (
        <div className="modal-overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">{editing?'Edit Service':'Add Service'}</div>
            <div className="form-group"><label className="form-label">Name *</label><input className="form-input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="e.g. Premium Wash" /></div>
            <div className="form-group"><label className="form-label">Description</label><input className="form-input" value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Short description" /></div>
            <div className="form-group"><label className="form-label">Price (₱) *</label><input className="form-input" type="number" min="0" value={form.price} onChange={e=>setForm({...form,price:parseFloat(e.target.value)})} /></div>
            <div className="form-group"><label className="form-label">Status</label><select className="form-input" value={form.is_active} onChange={e=>setForm({...form,is_active:e.target.value==='true'})}><option value="true">Active</option><option value="false">Inactive</option></select></div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" style={{flex:1}} onClick={handleSave} disabled={saving}>{saving?'Saving...':'Save'}</button>
            </div>
          </div>
        </div>
      )}
      {confirmDelete && (
        <div className="modal-overlay" onClick={()=>setConfirmDelete(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:380,textAlign:'center'}}>
            <div style={{fontSize:40,marginBottom:12}}>🗑️</div>
            <div className="modal-title" style={{marginBottom:8}}>Remove Service?</div>
            <p style={{color:'var(--text2)',fontSize:14,marginBottom:24}}>Are you sure you want to remove <strong style={{color:'var(--text)'}}>{confirmDelete.name}</strong>? This cannot be undone.</p>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setConfirmDelete(null)}>Cancel</button>
              <button className="btn btn-danger" style={{flex:1}} onClick={deleteSvc}>Yes, Remove</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   REWARDS
═══════════════════════════════════════════ */
function Rewards({ campaigns, carWashes, employees, showToast, onRefresh }) {
  const [showModal,setShowModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [form,setForm]=useState({campaign_name:'',month:new Date().getMonth()+1,year:new Date().getFullYear(),first_place_reward:3000,second_place_reward:2000,third_place_reward:1000,is_active:false,description:''});
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const openAdd=()=>{setEditing(null);setForm({campaign_name:'',month:new Date().getMonth()+1,year:new Date().getFullYear(),first_place_reward:3000,second_place_reward:2000,third_place_reward:1000,is_active:false,description:''});setShowModal(true);};
  const openEdit=c=>{setEditing(c);setForm({...c});setShowModal(true);};
  const handleSave=async()=>{
    if(!form.campaign_name.trim()) return showToast('Enter campaign name','warning');
    setSaving(true);
    try{
      if(editing) await api('update','RewardCampaign',{id:editing.id,data:form});
      else await api('create','RewardCampaign',{data:form});
      await onRefresh();setShowModal(false);showToast('Campaign saved!','success');
    }catch(e){showToast('Error: '+e.message,'error');}
    finally{setSaving(false);}
  };
  const getLeaders=c=>{

              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span className={`badge ${c.is_active?'badge-gold':'badge-gray'}`}>{c.is_active?'Active':'Inactive'}</span>

              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:12}}>
              {[{pos:'1ST',r:c.first_place_reward,c:posColor[0]},{pos:'2ND',r:c.second_place_reward,c:posColor[1]},{pos:'3RD',r:c.third_place_reward,c:posColor[2]}].map((x,i)=>(
                <div key={i} style={{background:'var(--glass)',border:`1px solid ${x.c}30`,borderRadius:10,padding:12,textAlign:'center'}}>
                  <div style={{fontSize:11,fontWeight:700,color:x.c,marginBottom:4}}>{x.pos} Place</div>
                  <div style={{fontSize:16,fontWeight:800,color:x.c}}>{peso(x.r)}</div>
                  {leaders[i] && <div style={{fontSize:10,color:'var(--text2)',marginTop:4}}>{leaders[i].name.split(' ')[0]} · {leaders[i].cars} cars</div>}
                </div>

            {c.description && <div style={{fontSize:12,color:'var(--text2)'}}>{c.description}</div>}
          </div>
        );
      })}
      {campaigns.length===0 && <div style={{textAlign:'center',padding:'32px 0',color:'var(--text2)',fontSize:13}}>No campaigns yet.</div>}
      {showModal && (
        <div className="modal-overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">{editing?'Edit Campaign':'New Campaign'}</div>
            <div className="form-group"><label className="form-label">Campaign Name *</label><input className="form-input" value={form.campaign_name} onChange={e=>setForm({...form,campaign_name:e.target.value})} placeholder="e.g. June 2026 Champions" /></div>
            <div className="grid-2">
              <div className="form-group"><label className="form-label">Month</label><select className="form-input" value={form.month} onChange={e=>setForm({...form,month:parseInt(e.target.value)})}>{months.map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select></div>
              <div className="form-group"><label className="form-label">Year</label><input className="form-input" type="number" value={form.year} onChange={e=>setForm({...form,year:parseInt(e.target.value)})} /></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
              {['first','second','third'].map((p,i)=>(<div key={p} className="form-group"><label className="form-label">{['1st','2nd','3rd'][i]} Reward</label><input className="form-input" type="number" value={form[`${p}_place_reward`]} onChange={e=>setForm({...form,[`${p}_place_reward`]:parseFloat(e.target.value)})} /></div>))}
            </div>
            <div className="form-group"><label className="form-label">Description</label><input className="form-input" value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Optional" /></div>
            <div className="form-group"><label className="form-label">Status</label><select className="form-input" value={form.is_active} onChange={e=>setForm({...form,is_active:e.target.value==='true'})}><option value="false">Inactive</option><option value="true">Active</option></select></div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setShowModal(false)}>Cancel</button>

/* CommissionSummary — extracted from Reports to avoid IIFE crashes */
function CommissionSummary({ filtered, payouts, employees, period, customFrom, customTo, now, periodLabel }) {
  if (!Array.isArray(payouts) || payouts.length === 0) return null;

  const getPayoutsInPeriod = (empId) => {
    return payouts.filter(p => {
      if (p.employee_id !== empId) return false;
      const d = new Date(p.payout_date||p.created_date||'');
      if (period==='today') return new Date(p.payout_date||p.created_date).toLocaleDateString('en-CA',{timeZone:'Asia/Manila'})===new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
      if (period==='7days') return d >= new Date((now||new Date()).getTime()-7*86400000);
      if (period==='month') {
        const n = now||new Date();
        return d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear();
      }
      if (period==='custom' && customFrom && customTo) {
        return d >= new Date(customFrom+'T00:00:00') && d <= new Date(customTo+'T23:59:59');
      }
      return true;
    });
  };

  const empComm = {};
  (filtered||[]).forEach(w => {
    if (!empComm[w.employee_id]) empComm[w.employee_id] = {name:w.employee_name, id:w.employee_id, earned:0};
    empComm[w.employee_id].earned += (w.commission_amount||0);
  });

  const rows = Object.values(empComm).map(e => {
    const empPayouts = getPayoutsInPeriod(e.id);
    const paid = empPayouts.reduce((s,p)=>s+(p.amount||0),0);
    return {...e, paid, remaining:e.earned-paid, payoutList:empPayouts};
  }).sort((a,b)=>b.earned-a.earned);

  if (rows.length === 0) return null;

  return (
    <div className="card" style={{marginTop:16}}>
      <div className="section-title" style={{fontSize:13,marginBottom:14}}>Commission Payouts — {periodLabel}</div>
      <div className="table-wrap">
        <table>
          <thead><tr><th>Employee</th><th>Earned</th><th>Paid Out</th><th>Balance</th><th>History</th></tr></thead>
          <tbody>
            {rows.map((r,i) => {
              const emp = (employees||[]).find(e=>e.id===r.id);
              return (
                <tr key={i}>
                  <td><div style={{display:'flex',alignItems:'center',gap:8}}><Av emp={emp||{full_name:r.name}} size={26} fs={10}/><span style={{fontWeight:600}}>{r.name}</span></div></td>
                  <td style={{fontWeight:700,color:'var(--gold)'}}>{peso(r.earned)}</td>
                  <td style={{color:'var(--success)'}}>{peso(r.paid)}</td>
                  <td><span style={{fontWeight:800,color:r.remaining>0?'var(--red)':'var(--text2)'}}>{peso(r.remaining)}</span></td>
                  <td style={{color:'var(--text2)',fontSize:11}}>{r.payoutList.map(p=>`${peso(p.amount)} (${p.note||'payout'})`).join(', ')||'—'}</td>
                </tr>
              );
            })}
            {rows.length===0 && <tr><td colSpan={5} style={{textAlign:'center',padding:20,color:'var(--text2)'}}>No commission data.</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Reports({ carWashes, employees, payouts=[], showToast }) {
  const [period, setPeriod] = useState('today');
  const [customFrom, setCustomFrom] = useState('');
  const [customTo,   setCustomTo]   = useState('');
  const now = new Date();

  const manilaDateRpt = dt => { const d=typeof dt==='string'&&!dt.endsWith('Z')&&!dt.includes('+') ? new Date(dt+'Z') : new Date(dt); return d.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}); };
  const todayStrRpt   = new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
  const yesterdayStrRpt = (()=>{ const y=new Date(); y.setDate(y.getDate()-1); return y.toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}); })();

  const getFiltered = () => {
    if (period === 'today') {
      return carWashes.filter(w => manilaDateRpt(w.transaction_date||w.created_date) === todayStrRpt);
    }
    if (period === 'yesterday') {
      return carWashes.filter(w => manilaDateRpt(w.transaction_date||w.created_date) === yesterdayStrRpt);
    }
    if (period === '7days') {
      const cut = new Date(); cut.setDate(cut.getDate()-6); cut.setHours(0,0,0,0);
      return carWashes.filter(w => new Date(w.transaction_date||w.created_date) >= cut);
    }
    if (period === '14days') {
      const cut = new Date(); cut.setDate(cut.getDate()-13); cut.setHours(0,0,0,0);
      return carWashes.filter(w => new Date(w.transaction_date||w.created_date) >= cut);
    }
    if (period === 'month') {
      return carWashes.filter(w => {
        const d = new Date(w.transaction_date||w.created_date);
        return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
      });
    }
    if (period === 'custom' && customFrom && customTo) {
      return carWashes.filter(w => {
        const s = manilaDateRpt(w.transaction_date||w.created_date);
        return s >= customFrom && s <= customTo;
      });
    }
    return carWashes;
  };

  const filtered = getFiltered();
  const tSales = filtered.reduce((s,w)=>s+(w.total_amount||0),0);
  const tComm  = filtered.reduce((s,w)=>s+(w.commission_amount||0),0);
  const tPaid  = filtered.reduce((s,w)=>s+(w.amount_paid||0),0);

  const empMap = {};
  filtered.forEach(w => {
    if (!empMap[w.employee_id]) empMap[w.employee_id]={name:w.employee_name,id:w.employee_id,cars:0,sales:0,comm:0};
    empMap[w.employee_id].cars++;
    empMap[w.employee_id].sales += (w.total_amount||0);
    empMap[w.employee_id].comm  += (w.commission_amount||0);
  });
  const empRows = Object.values(empMap).sort((a,b)=>b.cars-a.cars);

  const svcMap = {};
  filtered.forEach(w=>parseArr(w.services).forEach(s=>{
    if (!svcMap[s.id]) svcMap[s.id]={name:s.name,count:0,revenue:0};
    svcMap[s.id].count++;
    svcMap[s.id].revenue+=(s.price||0);
  }));
  const svcRows = Object.values(svcMap).sort((a,b)=>b.count-a.count);

  const exportCSV = () => {
    const rows = [
      ['Date','Employee','Customer','Plate','Services','Total','Commission','Paid'],
      ...filtered.map(w=>[fmt(w.transaction_date||w.created_date),w.employee_name,w.customer_name||'',w.plate_number||'',parseArr(w.services).map(s=>s.name).join('; '),w.total_amount,w.commission_amount,w.amount_paid])
    ];
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));
    a.download = `kgcar-report-${today()}.csv`;
    a.click();
    showToast('CSV exported!','success');
  };

  const periodLabel = {today:'Today', yesterday:'Yesterday', '7days':'Last 7 Days', '14days':'Last 14 Days', month:'This Month', custom:'Custom Range'}[period]||'All';

  return (
    <div>
      {/* Header */}
      <div className="flex-between mb-4" style={{flexWrap:'wrap',gap:10}}>
        <div className="section-title" style={{marginBottom:0}}>Reports</div>
        <button className="btn btn-ghost btn-sm" onClick={exportCSV}>Export CSV</button>
      </div>

      {/* Period Tabs */}
      <div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}}>
        {[
          {key:'today',     label:'Today'},
          {key:'yesterday', label:'Yesterday'},
          {key:'7days',     label:'7 Days'},
          {key:'14days',    label:'14 Days'},
          {key:'month',     label:'Month'},
          {key:'custom',    label:'Custom'},
        ].map(t => (
          <button key={t.key}
            className={`btn btn-sm ${period===t.key ? 'btn-primary' : 'btn-ghost'}`}
            onClick={()=>setPeriod(t.key)}
            style={{minWidth:72}}
          >{t.label}</button>
        ))}
      </div>

      {/* Custom date range picker */}
      {period === 'custom' && (
        <div className="card mb-4" style={{padding:'14px 16px'}}>
          <div className="grid-2" style={{gap:12}}>
            <div className="form-group" style={{marginBottom:0}}>
              <label className="form-label">From</label>
              <input className="form-input" type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)} />
            </div>
            <div className="form-group" style={{marginBottom:0}}>
              <label className="form-label">To</label>
              <input className="form-input" type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)} />
            </div>
          </div>
          {customFrom && customTo && (
            <div style={{fontSize:11,color:'var(--text2)',marginTop:10}}>
              Showing {filtered.length} transactions from {customFrom} to {customTo}
            </div>
          )}
        </div>
      )}

      {/* Stats */}
      <div className="stats-grid mb-4">
        {[
          {l:'Cars',       v:filtered.length,  c:'var(--blue)',   cls:'stat-blue'},
          {l:'Revenue',    v:peso(tSales),      c:'var(--success)',cls:'stat-green'},
          {l:'Commission', v:peso(tComm),       c:'var(--gold)',   cls:'stat-yellow'},
          {l:'Collected',  v:peso(tPaid),       c:'var(--silver)', cls:'stat-gray'},
        ].map((s,i)=>(
          <div key={i} className={`stat-card ${s.cls}`}>
            <div className="stat-label">{s.l}</div>
            <div className="stat-value" style={{color:s.c}}>{s.v}</div>
            <div className="stat-sub">{periodLabel}</div>
          </div>
        ))}
      </div>

      {filtered.length === 0 ? (
        <div className="card" style={{textAlign:'center',padding:'36px 24px',color:'var(--text2)'}}>
          <div style={{fontSize:32,marginBottom:10,opacity:.4}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" width="48" height="48"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div style={{fontWeight:700,fontSize:15}}>No data for this period</div>
          <div style={{fontSize:13,marginTop:4}}>{period==='custom'&&(!customFrom||!customTo)?'Select a date range above':'Try a different date range'}</div>
        </div>
      ) : (
        <div className="grid-2">
          <div className="card">
            <div className="section-title" style={{fontSize:13}}>By Employee</div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Employee</th><th>Cars</th><th>Sales</th><th>Comm.</th></tr></thead>
                <tbody>
                  {empRows.map((r,i)=>{
                    const emp=employees.find(e=>e.id===r.id);
                    return (
                      <tr key={i}>
                        <td><div style={{display:'flex',alignItems:'center',gap:8}}><Av emp={emp||{full_name:r.name}} size={26} fs={10}/><span style={{fontWeight:600}}>{r.name}</span></div></td>
                        <td style={{fontWeight:700,color:'var(--blue)'}}>{r.cars}</td>
                        <td>{peso(r.sales)}</td>
                        <td style={{color:'var(--success)'}}>{peso(r.comm)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          <div className="card">
            <div className="section-title" style={{fontSize:13}}>Top Services</div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Service</th><th>Count</th><th>Revenue</th></tr></thead>
                <tbody>
                  {svcRows.map((s,i)=>(
                    <tr key={i}>
                      <td style={{fontWeight:600}}>{s.name}</td>
                      <td style={{color:'var(--blue)',fontWeight:700}}>{s.count}</td>
                      <td style={{color:'var(--gold)'}}>{peso(s.revenue)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {/* Commission Payout Summary */}
      <CommissionSummary filtered={filtered} payouts={payouts} employees={employees} period={period} customFrom={customFrom} customTo={customTo} now={now} periodLabel={periodLabel} />
    </div>
  );
}

function ActivityLogs({ logs=[], employees=[], onRefresh }) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');

  const typeConfig = {
    wash_recorded:        { label:'New Wash',    color:'var(--red)',     bg:'rgba(217,74,74,.12)',   icon:'🚗' },
    wash_edited:          { label:'Wash Edit',   color:'#F59E0B',        bg:'rgba(245,158,11,.1)',   icon:'✏️' },
    wash_deleted:         { label:'Wash Del',    color:'var(--red)',     bg:'rgba(217,74,74,.08)',   icon:'🗑️' },
    commission_paid:      { label:'Payout',      color:'#22C55E',        bg:'rgba(34,197,94,.12)',   icon:'💳' },
    cash_advance:         { label:'Advance',     color:'#4DA6FF',        bg:'rgba(77,166,255,.12)',  icon:'💵' },
    commission_advance:   { label:'Advance',     color:'#4DA6FF',        bg:'rgba(77,166,255,.12)',  icon:'💵' },
    payout_deleted:       { label:'Payout Del',  color:'var(--red)',     bg:'rgba(217,74,74,.1)',    icon:'🗑️' },
    employee_added:       { label:'New Emp',     color:'var(--success)', bg:'rgba(34,197,94,.12)',   icon:'👤' },
    employee_updated:     { label:'Emp Edit',    color:'var(--success)', bg:'rgba(34,197,94,.08)',   icon:'✏️' },
    employee_deleted:     { label:'Emp Removed', color:'var(--red)',     bg:'rgba(217,74,74,.08)',   icon:'🗑️' },
    employee_deactivated: { label:'Deactivated', color:'var(--text2)',   bg:'rgba(255,255,255,.05)', icon:'⛔' },
    service_added:        { label:'New Svc',     color:'var(--gold)',    bg:'rgba(212,175,55,.12)',  icon:'🔧' },
    service_updated:      { label:'Svc Edit',    color:'var(--gold)',    bg:'rgba(212,175,55,.08)',  icon:'✏️' },
    service_deleted:      { label:'Svc Del',     color:'var(--red)',     bg:'rgba(217,74,74,.08)',   icon:'🗑️' },
    campaign_created:     { label:'Campaign',    color:'var(--gold)',    bg:'rgba(212,175,55,.1)',   icon:'🏆' },
    campaign_updated:     { label:'Campaign Ed', color:'var(--gold)',    bg:'rgba(212,175,55,.08)',  icon:'✏️' },
    vlc_job_created:      { label:'Vlc Job',     color:'#60A5FA',        bg:'rgba(96,165,250,.12)',  icon:'🔩' },
    vlc_job_updated:      { label:'Vlc Edit',    color:'#60A5FA',        bg:'rgba(96,165,250,.08)',  icon:'✏️' },
    vlc_job_deleted:      { label:'Vlc Del',     color:'var(--red)',     bg:'rgba(217,74,74,.08)',   icon:'🗑️' },
  };

  const sorted = [...logs].sort((a,b)=>new Date(b.created_date)-new Date(a.created_date));

  // Only CarWash-relevant events (exclude vlc_*)
  const cwLogs = sorted.filter(l=>!(l.event_type||'').startsWith('vlc_'));

  const filtered = cwLogs.filter(l => {
    if (filter !== 'all') {
      if (filter === 'wash')    return l.event_type === 'wash_recorded';
      if (filter === 'edits')   return l.event_type === 'wash_edited';
      if (filter === 'deleted') return l.event_type === 'wash_deleted';
      if (filter === 'payouts') return l.event_type === 'commission_paid' || l.event_type === 'cash_advance' || l.event_type === 'commission_advance' || l.event_type === 'payout_deleted';
      if (filter === 'staff')   return (l.event_type||'').startsWith('employee') || (l.event_type||'').startsWith('service');
      return l.event_type === filter;
    }
    if (search) {
      const q = search.toLowerCase();
      return (l.title||'').toLowerCase().includes(q) || (l.description||'').toLowerCase().includes(q) || (l.actor_name||'').toLowerCase().includes(q);
    }
    return true;
  });

  const fmtAgo = d => {
    if (!d) return '';
    // Force UTC parse — Base44 returns dates without Z suffix
    const utc = s => new Date(typeof s==='string'&&!s.endsWith('Z')&&!s.includes('+') ? s+'Z' : s);
    const diff = Date.now() - utc(d).getTime();
    const mins  = Math.floor(diff/60000);
    const hours = Math.floor(diff/3600000);
    const todayMNL  = new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
    const entryMNL  = utc(d).toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
    if (mins < 1)   return 'just now';
    if (mins < 60)  return `${mins}m ago`;
    if (todayMNL === entryMNL) return `${hours}h ago`;
    return utc(d).toLocaleString('en-PH',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Manila'});
  };

  const todayStr    = new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
  const todayCount  = cwLogs.filter(l=>utcDate(l.created_date||0).toLocaleDateString('en-CA',{timeZone:'Asia/Manila'})===todayStr).length;
  const washCount   = cwLogs.filter(l=>l.event_type==='wash_recorded').length;
  const editCount   = cwLogs.filter(l=>l.event_type==='wash_edited').length;
  const payoutTotal = cwLogs.filter(l=>l.event_type==='commission_paid').reduce((s,l)=>s+(l.amount||0),0);

  const categories = [
    {key:'all',      label:'All'},
    {key:'wash',     label:'New Washes'},
    {key:'edits',    label:'Edits'},
    {key:'deleted',  label:'Deleted'},
    {key:'payouts',  label:'Payouts'},
    {key:'staff',    label:'Staff & Services'},
  ];

  return (
    <div>
      <div className="flex-between mb-4">
        <div className="section-title" style={{marginBottom:0}}>🚗 Activity Log — Car Wash</div>
        <div style={{fontSize:12,color:'var(--text2)'}}>{filtered.length} of {cwLogs.length} events</div>
      </div>

      {/* Stats strip */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
        {[
          {l:'Today',     v:todayCount,        c:'var(--blue)'},
          {l:'Washes',    v:washCount,         c:'var(--success)'},

      {/* Search */}
      <div className="form-group mb-4" style={{position:'relative'}}>
        <div style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--text2)',width:15,height:15}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </div>
        <input className="form-input" placeholder="Search logs..." value={search}
          onChange={e=>setSearch(e.target.value)} style={{paddingLeft:34}}/>
      </div>

      {/* Log feed */}
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        {filtered.length===0 ? (
          <div style={{textAlign:'center',padding:'40px 24px',color:'var(--text2)'}}>
            <div style={{fontSize:40,marginBottom:10,opacity:.3}}>🚗</div>

            <div style={{fontSize:13,marginTop:4}}>Events are logged as washes are recorded, edited, or deleted</div>

        ) : filtered.map((log,i)=>{
          const cfg = typeConfig[log.event_type] || {label:log.event_type,color:'var(--text2)',bg:'rgba(255,255,255,.04)',icon:'📋'};
          return (
            <div key={log.id||i} style={{
              display:'flex',alignItems:'flex-start',gap:12,padding:'14px 16px',
              borderBottom:i<filtered.length-1?'1px solid var(--border)':'none',
              background:'transparent',transition:'background .15s',
            }}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.02)'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}
            >
              {/* Icon badge */}
              <div style={{width:36,height:36,borderRadius:10,background:cfg.bg,flexShrink:0,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>
                {cfg.icon}
              </div>
              {/* Content */}
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <span style={{fontWeight:700,fontSize:13}}>{log.title||log.event_type}</span>
                  <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:20,
                    background:cfg.bg,color:cfg.color}}>{cfg.label}</span>
                </div>
                {log.description&&<div style={{fontSize:12,color:'var(--text2)',marginTop:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{log.description}</div>}
                <div style={{display:'flex',gap:12,marginTop:4,flexWrap:'wrap'}}>
                  {log.actor_name&&<span style={{fontSize:11,color:'var(--text2)'}}>👷 {log.actor_name}</span>}
                  {log.amount>0&&<span style={{fontSize:11,color:'var(--gold)',fontWeight:700}}>{peso(log.amount)}</span>}
                  <span style={{fontSize:11,color:'var(--text2)'}}>{fmtAgo(log.created_date)}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {hasError:false,error:null}; }
  static getDerivedStateFromError(error) { return {hasError:true,error}; }
  componentDidCatch(error,info) { console.error('React Error:', error, info); }
  render() {
    if (this.state.hasError) return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:16,padding:24,background:'#1E1E22'}}>
        <div style={{width:56,height:56,background:'#D94A4A',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>!</div>
        <div style={{fontSize:18,fontWeight:800,color:'#F7F7F7'}}>Something went wrong</div>
        <div style={{fontSize:13,color:'#7A7A85',maxWidth:400,textAlign:'center'}}>{this.state.error?.message}</div>
        <button onClick={()=>window.location.reload()} style={{padding:'10px 24px',background:'#D94A4A',color:'white',border:'none',borderRadius:10,fontSize:13,fontWeight:700,cursor:'pointer'}}>Reload App</button>
      </div>
    );
    return this.props.children;
  }
}
